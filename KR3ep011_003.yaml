body:
  text: 卷之三積聚門附蟲積孫厥陰寒氣乘胃直犯中州蟲動不安腹痛如刀之刺口吐酸水清涎法宜辛溫佐以酸苦泄之通之川楝子延胡索川連青皮吳茱萸川椒焦楂炭烏藥使君子竹二青金少腹兩旁結塊漸大漸長靜則挾臍而居動則上攻至脘旁及兩脅已八九年矣據云始因積經半載疑其有孕及産多是汙水後遂結塊想是水寒血氣凝聚而成甘遂麵包煨三錢香附鹽水炒一兩三稜醋炒一兩蓬朮醋炒一兩桃仁炒五錢肉桂另研一錢川楝子五錢巴豆七粒合炒黃去巴豆五靈脂醋炒五錢地鱉蟲酒浸炙二十一個共研為末煉白蜜搗和為丸每服十丸日三服淵按水寒血氣凝聚衝脈之分果是實證此方必效金臍以上有塊一條直攻心下作痛痛連兩脅此屬伏梁為心之積乃氣血寒痰凝聚而成背脊熱而眩悸營氣內虧也法當和營化積當歸半夏瓦楞子香附丹參茯苓陳皮木香延胡索川楝子砂仁淵按眩悸亦寒痰為患未必即是營虛否則背脊之熱何來又投化積和營伏梁之攻痛稍緩背脊之熱亦減仍從前制前方去茯苓瓦楞子木香加茯神玫瑰花王腹中癖塊漸大如盤經事不來腰痠帶下此屬營虛氣滯瘀積內停近日水瀉傷於暑濕當先治其新病平胃散去甘草加芍藥香附吳茱萸焦六曲又腹塊如覆盤上攻則痛下伏則安足跗浮腫時時沃酸從肝脾胃三經主治川楝子延胡索吳茱萸川椒木香蓬莪朮制香附陳皮茯苓川連薑汁炒又腹中結塊內熱微寒四肢無力口沃酸水肝脾氣鬱營衛兩虧勞損之象黨參香附當歸丹參川楝子川椒延胡索冬朮乾薑青蒿梗神麯大棗淵按內熱微寒乃肝脾鬱結肺金治節不行營衛不調也宜參逍遙左金法丁肝之積在左脅下名曰肥氣日久撑痛川楝子延胡索川連青皮五靈脂山楂炭當歸鬚蓬莪朮荊三稜茯苓木香砂仁又左脅之痛已緩夜增咳嗽寒痰走於肺絡宜肺肝同治旋覆花杏仁川楝子荊三稜茯苓款冬花半夏新會皮蓬莪朮新絳青蔥管蔣少腹結塊漸大如盤此屬腸覃氣血凝滯而成擬兩疏氣血香附五靈脂紅花當歸澤蘭桃仁延胡索丹參陳皮砂仁大黃蟅蟲丸每服二十粒開水送金氣從少腹上衝咽嗌則心中跳脅中痛初起寒熱而嘔此奔豚氣之挾肝邪者也半月以來寒熱雖止氣仍上逆脈沉弦小宜宗金匱法二陳湯去甘草加當歸白芍吳茱萸香附川朴檳榔蘇梗沉香薑汁東行李根又奔豚之氣漸平脘中之氣未靜當從肝胃求治淡吳萸半夏香附川楝子延胡索茯苓焦六曲陳皮白芍蔻仁丁久患休息痢止數日後氣攻胸脘板痛上下不通幾至發厥須大便通始減其痛匝月大便僅通三次板痛者聚而成塊偏於右部是脾之積也脈沉緊而細當與溫通熟附子淡乾薑川朴陳皮茯苓香附大腹皮延胡索沉香化氣丸東垣五積丸米右關尺牢弦腰腹有塊攻痛是肝腎之積在下焦也用緩消止痛法肉桂雄黃尖檳榔共研細末用獨頭蒜搗丸早晚服各五丸開水送淵按雄黃散結檳榔破滯肉桂溫散下焦沉寒痼冷又能溫脾疏肝丸以獨蒜以濁攻濁深得制方之妙唐經停十月腹微滿脈沉細澀臍上心下塊長數寸是屬伏梁因七情恚怒氣鬱痰凝所致經曰大積大聚其可犯也衰其大半而止潔古謂養正積自除不得過用克伐今擬開鬱正元散法理氣行血和脾化痰寓消於補之中二陳湯加歸身川芎冬朮山楂炭延胡索香附麥芽蘇梗砂仁茺蔚子錢少腹有塊痛則經來如注氣升如喘衝脈久傷肝木肆橫香附醋炒紫石英當歸白芍酒炒木香三稜醋炒大熟地牛膝小茴香鹽水炒青皮醋炒某前年秋季伏暑症中即結癥瘕居左脅下春來下午必發微熱晨必吐痰食麵必溏泄此當時熱邪未清早進油膩麵食與痰熱互相結聚於肺胃之絡當以攻消為主柴胡三錢酒炒青皮一兩巴豆五錢同炒去豆三稜五錢醋炒蓬朮五錢醋炒雄精一兩大黃一兩皂莢子三粒合炒去皂莢子上藥為丸每服一錢下午服六君子丸三錢淵按柴胡青皮疏肝膽而升清莪稜破滯氣而消塊大黃攻熱積巴豆逐寒積皂子去油膩之積雄精開結化痰也無堅不破無攻不利正氣不虛者可用陳病起逢食則厄食入則脹今臍上至心下一條脹痛坐久則知飢行動則飽脹此屬伏梁胃為心之子故胃亦病也仿東垣五積治例川連吳茱萸乾薑陳皮香附半夏茯苓丁香延胡索五靈脂淵按所謂食厄也病在腸胃錢脈微細陰之象也少腹有塊上攻及脘自脘至嗌一條氣塞發作則大痛欲厥頭汗如雨用方大法固宜以溫通為主矣惟舌有黃膩濁苔便泄臭穢必兼濕熱而塊痛得按稍減中氣又虛方法極難周顧尚祈斟酌是荷川楝子烏藥肉桂烏梅木香淡吳萸澤瀉延胡索茯苓川連酒炒又下焦濁陰之氣上干清陽之位少腹胸脅有塊攻撑作痛痛甚發厥昨用溫通病勢稍減脈仍微細泄仍臭穢惡谷厭納中氣大虧陰氣凝結當臍硬痛恐屬臟結攻之不可補之亦難誠為棘手肉桂吳茱萸炮薑枸杞子烏藥木香延胡索金鈴子白芍茯苓澤瀉萱花金橘餅丁小腸遺熱於大腸為伏瘕腹中微痛用巠濟檳榔丸檳榔炒桃仁當歸酒炒青皮酒炒沉香火麻仁黨參元米炒茯苓烘木香烘烏藥烘大熟地砂仁拌炒白芍酒炒上藥為末用神麯三兩煮糊為丸每朝三錢開水送伍胸脘有塊大如碗每午後則痛甚於黃昏連及背脹時沃清水諸藥無效枳殼九枚納入阿魏三錢炙焦牡蠣二兩肉桂三錢白螄螺殼二兩共炙為末每痛發時服一錢開水送淵按枳殼破氣阿魏佐肉桂散寒以濁攻濁牡蠣軟堅白螄螺殼始用於丹溪云化伏痰消宿水周食填太陰肝氣欲升而不得胃氣欲降而不能氣塞於中與食相併脘脅疼痛氣攻有塊湯飲輒嘔上不得納下不得出法當疏運其中半夏橘紅青皮萊蔔子川朴薑汁炒吳茱萸赤苓白蔻仁研沖另蘇梗枳殼檳榔三味摩沖丁脈遲細脘中有塊納食撑脹腹中漉漉作聲噯腐吞酸大便堅結此脾胃有寒積也當以溫藥下之仿溫脾法附子制乾薑枳實大黃桂木陳皮半夏洪結癖纍纍久踞腹中年逾六旬元氣下虛中氣已弱肝氣肆橫腹漸脹滿脈沉弦細細而沉為虛為寒沉而弦為氣為郁病關情志非濕熱積滯可比攻消克伐難施擬商通補補者補其虛通者通其氣六君子湯加蘇梗肉桂香附川朴薑汁炒白芍生薑馮脈右關滑動舌苔黃白而膩是痰積在中焦也左關弦搏肝木氣旺故左肋斜至臍下有梗一條按之覺硬乃肝氣入絡所結尺寸脈俱微緩泄痢一載氣血兩虧補之無益攻之不可而病根終莫能拔根者何痰積濕熱肝氣也夫濕熱痰積須借元氣以運行潔古所謂養正積自除脾胃健則濕熱自化原指久病而言此病不謂不久然則攻消克伐何敢妄施茲擇性味不猛而能通能化者用之人參茯苓於朮青陳皮炙甘草澤瀉枳殼神麯茅朮當歸土炒黃耆白芍吳萸三分煎汁炒防風根又丸方製半夏三兩分六分一分木香二錢煎汁拌炒一分白芥子二錢煎汁拌炒一分烏藥三錢煎汁拌炒一分金鈴子三錢煎汁拌炒一分豬苓二錢煎汁拌炒一分醋拌炒炒畢去諸藥僅以半夏為末入雄精三錢研末射香一分獨頭蒜三個打爛用醋一茶杯打和為丸每晨服一錢五分開水送淵按製法極佳通化肺脾之痰疏理肝膽之結丸法亦有巧思諸凡與此證相類者皆可用之曹寒飲痰涎氣血凝結成癖踞於脘肋下及腰間久必成囊而為窠臼如賊伏於隱僻之處一時難以攻搗昔許學士有此論法當內和脾胃外用攻消今仿其意半夏茯苓烏藥白芥子當歸青皮澤瀉吳茱萸延胡索桂枝杜仲薑汁炒生木香生熟穀芽華脾虛胃弱則濕熱不運而生痰痰停中脘則食不化而成積胃脘結塊按之則痛面色青黃木乘中土飲食少納慮延脹滿黨參薑汁炒半夏陳皮川朴茯苓白芥子山楂肉砂仁六曲雞內金丁血虛木橫兩脅氣撑痛腹中有塊心蕩而寒熱病根日久損及奇經經云衝脈為病逆氣裡急任脈為病男疝女瘕陽維為病苦寒熱陰維為病苦心痛合而參之謂非奇經之病乎調之不易黃耆黨參茯神白薇枸杞子沙苑子白芍當歸陳皮香附紫石英又和營衛而調攝奇經病勢皆減惟腹中之塊未平仍從前法增損前方去枸杞子加砂仁冬朮孔病由肝氣橫逆營血不調腹中結瘕脘脅攻痛漸致食減內熱咳嗽痰多當臍動跳心悸少寐口乾腸燥而顯虛勞血痹之象極難醫治姑仿仲景法黨參茯苓棗仁乳香沒藥桃仁當歸川貝香附白蜜地鱉蟲酒炙又前方養營化瘀下得血塊兩枚腹滿稍軟內熱咳嗽未減今且和營啓胃退熱止咳再望轉機西黨參茯苓丹參廣皮血餘炭川貝母杏仁當歸阿膠地鱉蟲又氣滯血瘀腹滿有塊攻痛內熱已減咳嗽未平擬兩和氣血方法黨參香附鬱金茯苓山楂肉延胡索當歸杏仁阿膠桃仁沉香血餘炭又咳嗽不止腹仍滿痛肝肺同病久延不已終成勞損桃杏仁車前子川貝當歸丹皮阿膠蒲黃炒旋覆花蘇子茯苓新絳許腹痛大便泄出細蟲延來日久中氣漸虛此胃中寒積也法當溫中補中川連鹽水炒炮薑木香白芍白朮使君子吳茱萸烏藥川椒伏龍肝煎湯代水某閲病源是屬蟲病無疑蟲由濕熱所化脾土不運而生其發於月底之夜原有脾胃虛寒寒屬陰故夜發也寒久化熱土虛木強其發移於月初必嘔吐胸熱兩乳下跳蟲隨酸苦痰涎而出多寡不一或大便亦有腹中微痛雖口渴甚不能咽水水下復嘔嘔盡乃平至中旬則康泰無恙矣所以然者月初蟲頭向上且病久嘔多胃陰虧虛火上炎故胸中覺熱虛里跳動中氣虛也中氣者胸中大氣脾胃沖和之氣皆歸所統脾胃中氣虛甚故跳躍也病延一載有餘蟲屬盤踞未易一掃而除圖治之法和中調脾杜生蟲之源生津平肝治胸熱口渴化濕熱降逆氣以治嘔吐久服勿懈自可見功欲求速效恐不能耳川楝子蕪荑黨參元米炒白朮青皮製半夏白芍茯苓焦六曲乾薑陳皮棐子蔻仁使君子肉淵按病從脾胃寒濕而來濕鬱生熱熱鬱生蟲變成本寒標熱本寒則藏真傷而氣結生積標熱則濕熱阻而蟲屬內踞吳喜食生米積聚生蟲腹痛面黃口流涎沫蟲之見症無疑先擬健脾化蟲茅朮米泔水浸青皮鶴蝨棐子炒打蕪荑尖檳榔陳米炒黃共研為末每朝調服三錢略用砂糖少許馬心之積名曰伏梁得之憂思而氣結也居於心下胃脘之間其形豎直而長痛發則嘔吐酸水兼夾肝氣痰飲為患也開發心陽以化濁陰之凝結兼平肝氣而化胃之痰飲桂枝石菖蒲延胡索半夏川連吳萸炒茯苓川楝子陳皮蔻仁鬱金瓦楞子朱久有伏梁痞痛嘔酸之患是氣血寒痰凝結也自遭驚恐奔波遂至脘腹氣撑旁攻脅肋上至咽嗌血隨氣而上溢甚至盈碗盈盆兩載以來屢發屢止血雖時止而氣之撑脹終未全平近來發作不吐酸水而但吐血想久伏之寒化而為熱矣立方當從氣血凝積二字推求備候商用鬱金香附醋炒丹參茯苓炒黑丹皮蘇梗延胡索醋炒韭菜根汁一酒杯沖童便沖鮮藕另用雲南黑白棋子二枚研細末用白蜜調徐徐咽下淵按血從驚恐而來所謂驚則氣亂恐則氣下氣亂血逆必然之理棋子治何病未詳又肝鬱化火胃寒化熱氣滿於腹上攻脘脅則血亦上出前方疏理氣血之壅病情稍效今以化肝煎加減蓋肝胃之氣必以下降為順而瘀凝之血亦以下行為安氣降而血不復升是知氣降而火降瘀化而血安必相須為用也鬱金三稜醋炒延胡索川貝青皮桃仁澤瀉焦山梔茯苓蘇梗絲瓜絡鮮藕鮮苧麻連根葉範素有肝胃氣痛兼挾寒積脘腹脹滿痛及於腰咳不可忍舌苔白膩渴不欲飲大便似利不利脈沉弦而緊恐屬臟結頗為險候非溫不能通其陽非下不能破其結仿許學士溫脾法製附子乾薑肉桂川朴薑汁炒生大黃枳實淵按咳不可忍上焦之氣亦閉矣所謂五實證非耶又脘腹脹滿上至心下下連少腹中橫一紋如亞腰葫蘆之狀中宮痞塞陰陽結絶上下不通勢瀕於危勉進附子瀉心一法溫陽以泄濁陰冀其大便得通否則恐致喘汗厥脫難以挽回製附子川連薑汁炒川朴薑汁炒生大黃酒浸長流水煎再服備急丸七粒砂仁湯送下又兩投溫下大便仍然不通胸腹高突湯水下咽輒吐肢漸冷脈漸細鼻煽額汗厥脫可憂按結胸臟結之分在乎有寒熱無寒熱為別下之不通脹滿愈甚乃太陰脾臟受戕清陽失於轉運崔行功有枳實理中一法取其轉運中陽通便在是挽回厥脫亦在是惟高明裁酌之此證死仁淵曰五積六聚積屬臟而不移聚屬腑而無定又曰癥瘕癥者真也其塊不散瘕者假也聚散不常夫五積雖分屬五臟不過分其部位病形使學者有所遵循耳究在臟腑之外乃寒痰汁沫瘀血凝結於膜壑曲折之處因臟氣不能運化積年纍月受病非一途先宜觀其虛實即形氣實者亦不可專於攻伐況夫虛多實少且痞氣肥氣多於奔豚伏梁即今之癖塊居脘脅之下因久瘧而生者十七八又名瘧母由服藥不當或早用堵截或飲食不節致濕熱痰濁漫無出路鬱於膜原之分中氣不化日久成積初宜開化其邪兼調營衛中虛者先調其中濕熱化而塊自消中氣和而塊亦消養正逐邪各有分寸六聚較積輕淺病在氣分營衛不和氣聚有形必挾肝邪疏肝和脾以調氣機自效積聚之證大抵寒多熱少虛多實少桂枝肉桂吳茱萸為積聚之要藥能溫脾疏肝使氣機通暢故也蓋氣溫則行血寒則凝運行其氣流通其血為治積第一法有熱再佐連柏之類參以活變若蟲積乃由濕熱食滯而生或寒邪郁其濕熱腸胃之氣不化而九蟲生焉千金方分屬五臟不過分病形以定治法耳未免鑿空蓋無論何蟲不過伏在腸胃曲折之處如果伏於五臟必然五臟被咬其人尚能生乎蟲積既從濕熱食滯而生固多實證治無補法即久虛亦必先去其蟲而後調補之不可泥養正積除之説也脘腹痛門胡腹中雷鳴切痛痛甚則脹及兩腰嘔吐酸苦水此水寒之氣侮脾乃中土陽氣不足也溫而通之附子理中湯去草加川椒吳茱萸水紅花子又脾臟虛寒宿積痰水阻滯腹中時痛痛甚則嘔仿許學士法附子理中湯加當歸茯苓吳茱萸枳實大黃淵按溫下之法甚善惜以後易輒耳又腹痛下午則脹脈沉弦此屬虛寒挾積前用溫下痛勢稍減今以溫中化積川熟附黨參乾薑花檳榔茯苓當歸青皮陳皮烏藥又腹痛三年時作時止寒在中焦當與溫化無疑然脈小弦滑必有宿積前用溫下溫通兩法病雖減而未定據云每交午月其痛倍甚則兼濕熱故脈浮小而沉大按之有力此為陰中伏陽也當利少陰之樞溫厥陰之氣運太陰之滯更參滑以去著法柴胡白芍枳實甘草吳茱萸茯苓木香白朮另用黃鱔三段取中七寸炙脆共研末分三服淵按既知宿積何不再進溫下三年之病諒非久虛脈浮小沉大乃積伏下焦蓋痛則氣聚於下故脈見沉大此論似是而非又腹痛左脈弦木剋土也仲景云腹痛脈弦者小建中湯主之若不止者小柴胡湯所以疏土中之木也余前用四逆散即是此意然三年腹痛痛時得食稍安究屬中虛而漉漉有聲或兼水飲今擬建中法加椒目去其水飲再觀動靜老桂木白芍乾薑炙甘草黨參川椒目淵按此寒而有積為虛中實證與建中甘溫不合故服之痛反上攻以甘能滿中胃氣轉失順下也又用建中法痛勢上攻及胃脘連於心下左脈獨弦滑是肝邪乘胃也姑擬疏肝金鈴子延胡索吳茱萸香附高良薑木香白檀香沈肝胃氣痛發則嘔吐酸水治以溫通二陳湯去草加栝蔞皮吳茱萸白胡椒當歸香附川楝子時脘痛不時發作曾經吐蛔兼見鼻血女年二七天癸未通想由胃中有寒肝家有火金鈴子散加五靈脂香附乾薑川連使君子肉烏藥烏梅茯苓又肝胃不和脘脅痛得食乃安中氣虛擬泄肝和胃二陳湯去草加川連六神麯烏藥高良薑香附砂仁殷嘔而不食病在胃也食而腹痛病在脾也痛連胸脅肝亦病矣氣弱血枯病已深矣和胃養血生津益氣為治淡蓯蓉枸杞子歸身火麻仁大麥仁茯苓半夏陳皮沉香砂仁談脘痛欲嘔甚則防厥黨參陳皮茯苓川椒吳茱萸蔻仁生薑馮脾胃陽衰濁陰僭逆每至下午腹左有塊上攻則心嘈嘈則脘痛黃昏乃止大便常艱擬通胃陽而化濁陰和養血液以悅脾氣淡蓯蓉陳皮吳茱萸茯苓柏子仁郁李仁沙苑子烏梅川椒製半夏又脘痛嘔酸腹中亦痛非用辛溫何能散寒蠲飲二陳湯去草加淡蓯蓉當歸乾薑吳茱萸烏藥砂仁又溫腎通陽以散沉寒之氣久服腹痛自已前方去當歸加川熟附葫蘆巴顧當臍硬痛不食不便外似惡寒里無大熱渴不多飲寒食風熱互結於脾胃中用局方五積散合通聖散分頭解治五積合通聖共為末朝暮各用開水調服三錢又用五積合通聖溫通散寒便通而痛未止脈遲喜食甜味痛在當臍後連及腰身常懍懍惡寒此中虛陽弱寒積內停擬通陽以破其沉寒益火以消其陰翳四君去草加肉桂製附子木香元明粉烏藥蓯蓉又溫臟散寒腹痛已止今當溫補淡蓯蓉杞子熟地當歸茯苓陳皮吳茱萸製附子烏藥砂仁淵按尚嫌膩滯仍從四君加減為妙袁三四年來腹痛常發發則極甚必數日而平此脾臟有寒積肝經有濕熱故痛則腹中覺熱擬溫脾兼以涼肝金鈴子散加陳皮茯苓乾薑白朮川朴白芍神麯砂仁又腹中寒積錯雜而痛古今越桃散最妙變散為丸可耳淡吳萸乾薑黑山梔白芍炙甘草神麯末一兩煮糊為丸每朝服三錢開水送下夫越桃散惟薑梔二味吳萸白芍者復以戊己法加甘草取其調和也某中氣不足溲便為之變腹中結瘕亦氣之不運也二陳湯去草加白朮沙苑子焦神麯苡仁澤瀉砂仁通草又肝胃不和脘腹作痛嘔吐酸水痰涎經來則腹痛先與泄肝和胃川連半夏陳皮茯苓栝蔞皮薤白頭乾薑蔻仁猩絳旋覆花又腹中久有癖塊今因冷食傷中腹痛泄瀉嘔吐不止心中覺熱擬苦辛通降先止其嘔二陳湯去草加黃芩川連川朴蘇梗藿梗蔻仁澤瀉改方加神麯某自咸豐四年秋季飽食睡臥起病今已五載過投消積破氣之藥中氣傷戕脘間窒痛得食則安不能噯氣亦不易轉矢氣脈遲弦肝胃不和陽虛寒聚於中擬通陽泄木法苓桂朮甘湯加陳皮白芍吳茱萸乾薑大棗又胸背相引而痛症屬胸痹二陳湯去草加栝蔞仁製附子桂枝乾薑吳茱萸蔻仁竹茹孫中虛土不制水下焦陰氣上逆於胃胃脘作痛嘔吐清水得食則痛緩擬溫中固下佐以鎮逆四君子湯去草加乾薑烏藥白芍熟地紫石英代赭石橘餅淵按土虛水盛用熟地未合若欲扶土不去草可也秦懸飲居於脅下疼痛嘔吐清水用仲景法芫花大戟甘遂白芥子吳茱萸各三錢大棗二十枚將河水兩大碗上藥五味煎至濃汁一大碗去滓然後入大棗煮爛候乾每日清晨食棗二枚淵按此十棗湯變法也以吳萸易葶藶頗有心思某寒氣凝聚少腹結瘕時或上攻作痛法以溫通小茴香吳茱萸木香青皮烏藥延胡索三稜砂仁香附錢脈微細陰之象也少腹有塊上攻及脘自脘至嗌一條氣塞發作則塊攻大痛欲厥頭汗如雨用方大法溫通無疑惟舌黃膩濁苔便泄臭穢必兼濕熱而塊痛得按稍減又屬虛象金鈴子散加人參烏梅烏藥澤瀉補故紙吳茱萸木香肉桂枸杞子五味子茯苓肉果又水飲痰涎與下焦濁陰之氣盤踞於中中脘腹脅有塊攻撑作痛痛甚發厥昨用溫通痛勢稍減但脈仍微細泄仍臭穢穀食厭納中氣大虛陰氣凝結當臍硬痛恐屬臟結攻之不可補之亦難仍為棘手前方去人參五味烏藥故紙肉果加白芍乾薑萱花橘餅某腹中有寒疼痛不止法當溫通金鈴子散加乾薑吳茱萸當歸枸杞子官桂木香烏藥紫石英張寒氣稽留氣機不利胸背引痛脘脅氣攻有塊宜辛溫通達二陳湯去草加栝蔞皮薤白頭乾薑吳茱萸延胡索九香蟲某肝胃不和腰脅胸背相引而痛舌光無苔營陰內虧大便溏薄脾氣亦弱並無嘔吐痰涎酸水等症宜辛溫通陽酸甘化陰陳皮茯苓蘇梗吳茱萸沙苑子枸杞子薤白頭白芍橘餅淵按脾腎虛寒宜甘溫營陰內虛宜柔緩故不用薑附剛燥之藥某飲停中脘脘腹鳴響攻撑作痛大便堅結如栗但能噯氣而無矢氣是胃失下行而氣但上逆也和胃降逆逐水蠲飲治之二陳湯去草加代赭石旋覆花神麯乾薑白芍川椒甘遂澤瀉某丹田有寒胸中有熱中焦不運濕甚生蟲與黃連湯川連肉桂吳茱萸乾薑砂仁使君子半夏青皮烏藥花檳榔又蟲痛面黃吐涎擬苦辛法川連桂枝川椒蔻仁烏梅蕪荑焦六曲香附合金鈴子散張脘痛兩載近發更勤得溫稍松過勞則甚塊居中脘患處皮冷法以溫通二陳湯去草加炮薑吳茱萸木香川朴歸身神麯澤瀉生熟穀芽又腹痛有塊肝脾不和食少面黃治以疏和丹參白芍懷山藥茯苓茯神冬朮神麯香附砂仁仁淵曰脘痛屬胃腹痛屬脾吞酸嘔苦俗名肝氣乃積飲病也或得之喜餐生冷或憂思鬱結夫肝膽屬木而喜升達寄根於土今脾胃為生冷憂思傷其陽和之氣布化轉運失職肝膽無溫潤升達之機郁久而肆其橫逆侮其所勝脾胃受克氣機與痰飲凝滯於中脘故作痛耳其吞酸嘔苦者脾寒不化胃中之水飲停積如食物置器中不動其味變焉稼穡味甘今胃不能化木乘其勝而齊木之味化而為酸齊膽火之味化而為苦木氣衝逆泛嘔不已久久積飲成囊亦生癖塊由餐涼而起者尚可治由七情而起者每成噎膈蓋憂思既久中陽受傷嘔多胃汁稿枯始則陽氣傷繼則陰津竭營衛少生化之源胃管幹癟腸液不充矣徒恃醫藥無益須怡神靜養治法喻氏進退黃連湯最有深意辛以化胃苦以降逆所謂能變胃而不受胃變也羅謙甫治中湯亦合用金以制木若南陽之栝蔞薤白等或辛或苦或通或潤皆可用務在通中焦陽氣使脾胃之陰凝開肝木之鬱結達其痛自已若腹痛須分部位當臍太陰臍旁少陰少腹厥陰尤宜辨寒熱虛實大抵寒多熱少虛多實少熱者多實虛者多寒內經舉痛論寒者八九熱者一二須從脈證細辨焉濕鬱之年亦多是證亦脾胃為寒濕所郁陽氣不得宣化耳噎膈反胃門王痰隔中焦食入脘痛口沃清水嘔吐黏痰大便堅結腸液枯也時多空噯胃失降也擬化痰和胃降氣潤腸法旋覆花鹽水炒代赭石杏仁半夏橘紅栝蔞皮瓦楞子蘇子白芥子萊蔔子薑汁地栗汁胡氣鬱中焦得食則嘔已延匝月慮成膈證川連吳萸炒白朮半夏藿香陳皮焦六曲香附茯苓鬱金白蔻仁張營陰虛故內熱少寐氣火逆故咽喉哽塞擬四物以養其陰四七以理其氣大生地砂仁拌蘇梗茯苓當歸川朴北沙參白芍半夏棗仁薑竹茹枇杷葉陳營虛火亢胃枯食噎心膈至咽如火之焚有時呱呱作聲此氣火鬱結使然也病關情志非徒藥餌可瘳宜自怡悅庶幾可延旋覆花代赭石沙參黑山梔茯苓川貝焦六曲麥冬杏仁竹茹枇杷葉復氣火上逆咽喉不利胸痛食噎膈症已成況年逾六旬長齋三十載胃液枯稿欲求濡潤胃陰飲食無礙還望怡情自適前方加西洋參半夏丁脈形弦硬春令見此是即但弦無胃納食哽痛大便堅燥已見木火亢逆胃汁腸液乾枯治之不易旋覆花杏仁火麻仁桃仁蘇子青果荸薺蘆根復前方潤燥以舒鬱結今擬下氣化痰之劑麥冬半夏杏仁橘紅川貝茯苓竹茹蘆根荸薺海蜇枇杷葉淵按兩方清潤可喜洵屬名家秦痰氣阻於胸中故痰多而胸悶納食或嘔兩太陽脹痛清氣不升濁氣不降久延不已恐成膈症半夏橘紅赤苓吳萸汁炒川連黨參澤瀉藿香旋覆花枳殼川貝蔻仁肉桂大腹皮冬朮生薑來復丹一錢藥汁送下陳喪子悲傷氣逆發厥左脈沉數不利是肝之氣鬱血少不澤也右關及寸滑搏為痰為火肺胃之氣失降肝木之火上逆將水穀津液蒸釀為痰阻塞氣道故咽喉胸膈若有阻礙納食有時嘔噎也夫五志過極多從火化哭泣無淚目澀昏花皆屬陽亢而陰不上承目前治法不外順氣降火復入清金平木蘇子茯苓半夏枳實杏仁川貝竹茹沙參橘紅麥冬海蜇荸薺此方系四七溫膽麥冬三湯加減降氣化痰生津和胃病起肝及肺胃當從肺肝胃為主秦七情鬱結痰氣凝聚胸膈不利時或嘔逆症將半載脾胃大虛前用四七二陳降氣化痰今參入理中兼培中土當顧本也四七湯合二陳湯理中湯加丁香木香蔻仁徐氣鬱於胸為膈氣滯於腹為臌飲食不納形肉頓瘦陰氣凝聚陽氣汩沒脈細如絲姑與培土通陽化氣一法黨參肉桂白朮大腹皮熟附子澤瀉茯苓來復丹淵按傷胃則膈傷脾則臌膈多鬱火臌多陽衰肺金治節不行肝木起而克賊周胸痛吐清水自幼酒濕蘊蓄胃中陽氣不宣濁氣凝聚遽述前年又得暴喘上氣額汗淋漓發作數次今又增心嘈若飢此皆胃病用小半夏湯半夏茯苓陳皮竹茹生薑淵按暴喘額汗肺腎亦病不獨胃也復停飲生痰嘔吐酸水胸中板痛前用小半夏湯所以蠲其飲也今風邪傷肺咳嗽內熱擬金沸草散宣風降氣仍寓祛痰蠲飲肺胃兼治之方金沸草半夏陳皮茯苓款冬花杏仁荊芥前胡竹茹枇杷葉趙氣水鬱結成痰咽噎礙食食入輒嘔清水米粒病在胃之上脘降氣化痰之藥須擇不燥者為宜栝蔞仁半夏曲川貝橘紅丁香蛤殼青黛三分同研包白蜜枇杷葉竹茹蘆根生薑汁沖服復諸逆衝上皆屬於火食入即吐是有火也川連半夏蘇梗製大黃竹茹枇杷葉淵按內經病機十九條都有不盡然者注者不敢違背隨文敷衍貽誤後學其實是是非非明眼自能別白即如諸逆衝上之證不屬於火者甚多未可一概論也讀經者知之祝胃陽虛則水飲停脾陽虛則穀不化腹中漉漉胸脅脹滿納食輒嘔酸水清涎或噯腐氣法以溫導崇土利水炮薑陳皮蒼朮半夏熟附子白朮黨參澤瀉枳實栝蔞仁蔻仁穀芽沈食下則飽脹作酸嘔吐病屬反胃胃脈浮按則緊沉按則弦弦者木侮土緊者寒在中黨參乾薑半夏陳皮茯苓丁香焦六曲蓽茇蔻仁陳香櫞許吐血後厄逆迄今一月舌白膩右脈沉滑左脈細弱其厄之氣自少腹上衝乃瘀血挾痰濁阻於肺胃之絡下焦衝脈相火上逆鼓動其痰則厄作矣酌方必有濟幸勿躁急為囑半夏茯苓陳皮當歸鬱金丁香柿蒂薑汁藕汁水紅花子東垣滋腎丸一錢陳皮生薑泡湯下陰寒厄者用肉桂五分坎氣二條沉香六分分兩服淵按所謂氣厄痰厄是也與虛寒不同某瘧後痰氣阻滯胃脘清陽不升作厄納食輒嘔防成膈症且與仲景化痰鎮逆再商旋覆花代赭石淡乾薑法半夏赤苓制香附丁香柿蒂秦納食輒嘔清水涎沫米粒病在胃也曾經從高墜下脅肋肩膊時痛是兼有瘀傷留於肺胃之絡故嘔有臭氣擬化瘀和胃降逆止嘔為治旋覆花歸鬚廣鬱金杏仁半夏炒丹皮茯苓焦楂肉橘紅蔻仁淵按佐韭薑藕三汁更妙復止嘔必以和胃氣升必須降納半夏茯苓白朮蔻仁藿香陳皮老桂木神麯乾薑沉香伏龍肝李寒熱咳嗽一載有餘咳痰帶血飲食沃噎胸膈阻窒又成噎膈此必兼挾氣鬱而成今且和胃降氣冀其血止噎減為妙旋覆花半夏杏仁丹皮橘紅茯苓鬱金栝蔞霜蔻仁竹茹枇杷葉陳卒然心痛納食哽塞粥飲猶可此心氣鬱結防變膈證栝蔞仁薤白頭旋覆花川貝母茯神半夏桔梗遠志肉竹茹朱脈滑大食入哽噎不下舌膩此屬痰膈大腸燥火凝結擬清痰火佐以宣通旋覆花麥冬六神麯黑山梔赤苓半夏豆豉陳皮杏仁竹茹海蜇荸薺枇杷葉吳情志鬱結陽明津液內枯少陰之氣上逆少腹氣上衝咽咽喉覺脹納食哽噎擬溫養津液以降濁陰之氣旋覆花代赭石蓯蓉干枸杞子橘紅茯苓川貝半夏沉香雞冠虴地栗盛氣鬱痰凝胸中失曠背寒脊痛納少哽噎甚則吐出膈症之根旋覆花桂枝栝蔞皮杏仁竹茹代赭石薤白頭半夏茯苓又諸恙仍然痰稍易出桂枝栝蔞皮乾薑薤白頭陳皮杏仁旋覆花生鹿角竹茹枇杷葉又服溫通陽氣之藥嘔出寒痰甚多未始不美惟納食哽噎之勢未除仍以溫通再觀動靜川熟附桂枝薤白頭半夏陳皮杏仁桃仁栝蔞仁薑汁韭菜根汁又上焦吐者從乎氣中焦吐者因乎積此納食哽噎少頃則吐出數口且多清水黏痰是有痰積在中焦也然究屬膈症之根川熟附半夏瓦楞子陳皮蘇子萊蔔子旋覆花白芥子桃仁蓽茇高坤土陽微濕勝腹中不和用平胃理中合劑平胃散合理中湯加延胡者因有瘀凝也某疊進溫中運濕腹中呱呱有聲朝食則安暮食則滯臥則筋惕肉瞤時吐酸水中土陽微下焦陰濁之氣上逆病屬反胃溫中不效法當益火之源舍時從症用茅朮附子理中合真武法附子理中加茯苓陳皮生薑淵按水穀不化精微而生酸痰肝木失於濡潤筋惕肉瞤是肝有燥火也徒事溫燥無益張胃汁乾枯腸脂燥涸上焦飲食盡生為痰不生津血納食則吐痰隨吐出膈症之根漸深高年靜養為宜鮮蓯蓉一兩青鹽半夏三錢茯苓當歸陳皮沉香枳殼又津枯氣結噎膈蓯蓉丸是主方照前方加炒香柏子仁陳海蟄地栗每日用柿餅一枚飯上蒸軟隨意嚼咽盛背為陽位心為陽臟心之下胃之上也痰飲竊踞於胃之上口則心陽失其清曠而背常惡寒納食哽噎是為膈症之根蓋痰飲為陰以礙陽故也熟附子桂枝杏仁神麯薤白頭栝蔞皮旋覆花蔻仁豆豉丁香竹茹枇杷葉淵按溫中化飲降逆潤腸不失古人法度惟豆豉一味不解是何意思孔先曾嘔血胃中空虛寒飲停留陽氣不通水穀不化食入嘔吐酸水穀食隨之而出脈細肢寒陽微已甚證成翻胃慮延脾敗難治熟附子乾薑丁香橘餅蓯蓉干九香蟲二陳湯其中甘草炙黑淵按噎膈反胃從嘔血而起者甚多蓋血雖陰物多嘔則胃陽傷而不復不能運水穀而化精微失其順下之職始則病反胃久則腸液枯稿而為膈證矣嚴噎膈反胃胃脘之病也上焦主納中焦司運能納而不能運故復吐出朝食暮吐責其下焦無陽擬化上焦之痰運中焦之氣益下焦之火俾得三焦各司其權而水穀熟腐自無反出之恙然不易矣旋覆花代赭石熟附子茯苓枳殼沉香半夏新會皮益智仁淡蓯蓉地栗陳雞冠海蟄仁淵曰噎膈證昔張雞峰謂神思問病而有不盡然者過於謀慮憂思脾陰傷而肝火起固有是證而得之嘔血過多或餐涼食冷者不少是皆脾胃陽傷也胃陽傷則不化而失其順降脾陽傷則不運而失其升騰飲食到胃精微不化氣血津液而變酸水痰涎中土既失溫和松燥肝膽失其條達鬱結不舒橫克脾胃氣結而為痛逆升而為吐將稼穡甘味化為木火酸苦之味嘔出胸膈稍快明日再積再嘔久之中焦之氣日傷津液日竭胃管之口縮小納食哽嗌作痛胃氣既失順降二腸自少灌溉渣滓留滯不行加以肝膽鬱結之火日加煽灼大便自然燥而不通甚至經旬始通通下如羊矢黑粒者不可治矣夫噎膈固屬難治而古人治此者亦少精妙之方云岐子九方劫霸攻克固不足道局方過於香燥近惟喻嘉言黃連湯進退之議深中竅要此外如丹溪五汁安中飲左金丸等尚可取法若大便不通斷不可以硝黃硬下要知陽明氣降始二腸津液流潤不通自通矣若夫反胃即噎膈之根古人謂食不得入是有火食入反出是無火蓋肝膽相火鬱於胸中清曠之地變為燎原之場胃口被灼氣不得降致食不能下此不獨噎膈噤口痢亦是此意若噎膈證如此則五液被焚不可為矣至食入反出雖屬無火乃中宮失溫運之職升降不靈木火更從而為患與火不生土土虛陽衰之無火大異未可以溫燥從事仲景論胸中有寒丹田有熱與此相近喻氏黃連湯即仿其意為之進退治此者能想明孰寒孰熱孰虛孰實得其機巧則為良工矣三消門李稚齡陽亢陰虧一水不能勝五火之氣燔灼而成三消上渴中飢下則溲多形體消削身常發熱法當壯水以制亢陽大生地川連麥冬知母五味子茯苓生甘草生石膏牡蠣花粉又夫三消火病也火能消水一身津液皆干惟水可以勝火大養其陰大清其火乃治本之圖病由遠行受熱腎水內乏當救生水之源大生地沙參五味子麥冬牡蠣西洋參桑白皮蛤殼天冬侯脾胃虛而有火故善飢而能食肝氣盛故又腹脹也甘寒益胃甘溫扶脾苦辛酸以泄肝兼而行之玉竹川石斛麥冬黨參冬朮白芍吳萸炒川連茯苓烏梅橘餅淵按深得古人制方之意而又心靈手敏查脈沉細數而澀血虛氣鬱經事不來夫五志鬱極皆從火化飢而善食小溲如膿三消之漸然胸痛吐酸水肝鬱無疑川連麥冬蛤殼鮮楝樹根皮一兩洗建蘭葉又服藥後大便之堅難者化溏糞而出原得苦泄之功也然脈仍數澀鬱熱日盛臟陰日消舌紅而碎口渴消飲血日乾而火日熾頭眩目花帶下皆陰虛陽亢之徵當寓清泄於補正之中川連淡芩黑山梔大生地當歸阿膠川芎白芍建蘭葉大黃蟅蟲丸早晚各服五丸淵按建蘭葉不香無用徐靈胎論之矣又諸恙皆減內熱未退帶下未止經事未通仍從前法川連當歸洋參白芍女貞子茯苓麥冬丹參沙苑子大生地又經曰二陽之病發心脾女子不月其傳為風消風消者火盛而生風渴飲而消水也先輩謂三消為火疾久必發癰疽屢用涼血清火之藥為此自六七月間足跗生疽之後消症稍重其陰愈傷其陽愈熾今胸中如燔牙痛齒落陽明之火為劇考陽明氣血兩燔者葉氏每用玉女煎姑仿之鮮生地石膏知母元參牛膝大生地天冬川連麥冬茯苓生甘草枇杷葉錢古稱三消為火病火有餘由水不足也十餘年來常服滋陰降火雖不加甚終莫能除然年逾六旬得久延已幸今就舌苔黃膩而論中焦必有濕熱近加手足麻木氣血不能灌溉四末暗藏類中之機擬疏一方培養氣血之虛另立一法以化濕熱之氣標本兼顧希冀弋獲大生地當歸山萸肉麥冬洋參懷山藥龜板建蓮肉豬肚丸三錢另服開水下朱脈左寸關搏數心肝之火極熾口乾小溲頻數而渾濁此下消症也久有腳氣濕熱蘊於下焦擬清心肝之火而化腎與膀胱之濕大生地川連鹽水炒牡蠣黃耆茅朮麥冬赤苓黃柏鹽水炒蛤粉升麻豬肚丸每朝三錢開水送龐胃熱移膽善食而瘦謂之食㑊大便常堅結而不通者胃移熱於大腸也膽移熱於心故又心跳頭昏今擬清胃涼膽為主安神潤腸佐之鮮石斛淡芩郁李仁火麻仁枳殼棗仁栝蔞皮龍膽草茯神豬膽汁另更衣丸一錢淡鹽花湯送下此病服此方五六劑後用滋陰如二地二冬沙洋參等煎膠常服可愈淵按此似消非消之證膽腑鬱熱移胃傳所不勝故用苦寒直瀉膽火方脾陰虛而善飢腎陰虛而溲數肝氣不舒則腹中耕痛胃氣不降則脘中痞窒此二有餘二不足也然有餘不可瀉不足則宜補腎充則肝自平脾升則胃自降耳黨參懷山藥五味子茯神麥冬冬朮大熟地枸杞子陳皮紅棗仁淵曰三消為火證人盡知之而古人治火之方如人參白虎竹葉石膏門冬飲子玉女煎大補陰等法多有不應者其火固非實火亦非尋常虛火可比愚意謂肺腎真陰耗損肝腎龍相之火浮越無制以故尋常瀉火清火之藥不能治其燔灼多飲而不能潤其煩渴多食而不能充其肌膚者固為邪火不殺穀實由肺金治節無權脾土雖轉輸運化肺不能灑陳散精以充灌六腑五臟營衛失滋生之本致愈食愈瘦並不能通調水道膀胱氣化失其常度小便如膏如油致愈飲愈渴夫肺為相傅主一身治節飲食轉運雖賴脾胃而宣灑通調則在相傅今飲不支渴者乃氣不化津以蒸溉上焦也飢不充腸者乃氣不化液以周灌臟腑百骸也金病而水絶其源火益熾而消益甚夫腎為水臟為陰陽之窟宅而藏五液五液既損於前母氣復傷於後一傷再傷而病獨重焉是以仲聖腎氣丸最有深意焉金匱云飲水一斗小便亦一斗腎氣丸主之不治其肺燥而治其腎燥不獨治其腎之陰並治其腎之陽蓋腎之陰不化由腎之陽不騰熟地丹皮滋腎之陰而佐以附桂蒸腎之陽使腎陰充而腎陽升中焦上焦均得其蒸化之力所謂云騰致雨品物流行治腎即所以治肺也若夫上中下之分在肺脾所傷之淺深多少肺傷重則多上消脾傷重則多中消而下消則無乎不在蓋三消以腎為主也痰飲門吳飲停中脘脘腹鳴響攻撑作痛大便堅結如栗但能噯氣不能矢氣是胃失下行而氣但上逆也和胃降逆逐水蠲飲治之半夏淡乾薑陳皮茯苓澤瀉白芍旋覆花代赭石甘遂去心麵包煨川椒炒出汗焦六曲潘肛有漏瘍陰津先損於下兼以嗜酒濕熱又盛於中繼因勞碌感寒寒入肺經與胸中素盛之痰濕相合咳嗽嘔吐清水而成痰飲為患仍飲燒酒祛寒宜其血溢矣況內熱脈數陰津亦虧欲蠲痰飲恐溫則劫其陰欲除內熱恐清則加其咳宜和胃降氣生苡仁紫菀白扁豆茯苓款冬花川貝母鬱金杏仁蛤殼十大功勞又陰虛痰飲逢暑既不可溫又不可清舌苔黏膩當和中化痰兼以攝納腎氣二陳湯加杏仁腎氣丸一錢都氣丸二錢相和開水下淵按暑天何嘗不可用溫惟痰飲見吐血以為陰虛不敢溫耳其實血從燒酒傷胃而來尚非真正陰虛又咳嘔清水痰飲之病脈細數內熱陰虛之候治痰飲宜溫治陰虛宜滋藥適相背肝腎為子母不妨補母以益子而胃土又為肺金之母又當和胃以化痰擬滋燥兼行仿東垣法而不礙大熟地冬朮阿膠五味子淡乾薑澤瀉茯苓半夏腎氣丸某痰飲咳嗽脾胃兩虧柯氏云脾腎為生痰之源肺胃為貯痰之器近增氣急不得右臥右臥則咳劇肺亦傷矣素患肛門漏瘍邇來糞後有血脾腎虧矣幸胃納尚可議從肺脾腎三經合治然年近六旬愛養為要否則慮延損症熟地砂仁末拌炒半夏陳皮五味子川貝母阿膠蒲黃拌炒炮薑炭冬朮歸身炭款冬花此金水六君煎合黑地黃丸加阿膠款冬川貝三味補金水土三虛上能化痰下能止血雖有炮薑勿嫌溫燥有五味以攝之周飢飽勞碌則傷胃寒痰凝聚氣血稽留阻於胃絡而胃脘脹痛嘔吐黏痰殆無虛日倘不加謹恐成脹滿異功散去甘草加炮薑熟附子良薑蔻仁又溫胃化痰從理中二陳平胃三方化裁六君子合附子理中加川朴又寒積中焦胃陽不布痰飲竊踞為脹為痛為吐為噦法當溫運中陽但病根日久必耐服藥乃效六君子合附子理中去草加川椒白蔻仁又中虛非補不運寒飲非溫不化益火生土通陽蠲飲苓桂朮甘湯主之附子理中湯亦主之苓桂朮甘湯合附子理中去草加半夏陳皮蔻仁又病有常經方有定法藥已見效無事更張袁詩云莫嫌海角天涯遠但肯揚鞭有到時附子理中合二陳湯加老生薑老桂木淵按倜儻風流足徵讀書功夫徐痰飲伏於胸中遇寒則咳而喘心嘈氣塞頭眩腰痠年逾五旬天癸當去而不去是氣虛不能攝血也夫氣本屬陽陽氣日衰痰飲日盛法當通陽氣以祛水飲之寒仲景云病痰飲者當以溫藥和之是也二陳合苓桂術甘加款冬杏仁蛤殼沉香朝服都氣丸二錢腎氣丸一錢開水送下秦痰飲咳喘脘中脹滿時或微痛雖肺胃腎三經同病而法當責重於脾蓋脾得運而氣化則痰飲有行動之機也半夏陳皮澤瀉茯苓杏仁川朴補故紙乾薑五味子同研胡桃肉淵按痰飲病輕則治肺脾重則治腎數方皆治飲正軌又痰飲停於心下上則喘咳下則脘脹多由清陽失曠痰濁內阻轉胸中之陽以安肺運脾中之陽以和胃咳喘與脹滿當松栝蔞皮茯苓陳皮薤白頭川朴半夏薑汁炒乾薑澤瀉枳實麩炒胡痰飲久留於肺胃或咳或喘或脹滿皆痰氣之為病也化胃中之痰宜苓半化肺中之痰宜橘貝從此擴充以立方茯苓橘紅桂枝紫菀白朮半夏川貝炙甘草杏仁蛤殼顧閲病原知由痰飲久留肺脾腎三臟交傷下則腎虛不能納氣中則脾虛不能運氣上則肺傷不能降氣由是咳喘不得臥肢腫腹膨神氣疲憊虛亦甚矣治上無益當治中下大熟地海浮石拌炒五味子炒補故紙鹽水炒牛膝鹽水炒蛤殼打沙苑子鹽水炒紫石英煅懷山藥炒麥冬元米炒茯苓黑錫丹每朝服三錢淡鹽湯送下淵按治下固是然五味無干薑熟地牛膝無肉桂肺腎之氣仍不能納降賴有黑錫丹主持可以取效秦懸飲踞於脅下疼痛嘔吐清水用仲景法芫花甘遂大戟吳茱萸白芥子各二錢將河水兩大碗入上藥五味煎至濃汁一碗去渣然後入大棗五十枚煮爛俟干每朝食大棗五枚淵按此五飲之一乃實證也用之得當其效如神趙寒入肺底咳喘而嘔水飲停於心下也腰脅痛而經停肝腎已虛擬開上溫中補下麻黃細辛淡乾薑五味子茯苓陳皮杏仁炙甘草大熟地海浮石拌半夏沉香枇杷葉又痰飲咳嘔清水而致停經發熱帶下淋漓營陰虛而肝腎虧矣脘中脹滿大便偶利則脹覺鬆仍是飲邪見症夫痰飲宜溫宜化而陰虛宜補宜清所慮熱久停經恐成乾血勞損半夏陳皮茯苓細辛拌炒生地薑汁炒乾薑五味子同炒沙苑子白芍當歸川芎款冬花淵按經停發熱未必即屬虛證惟帶下過多營液虛矣脘脹便通則松乃肺脾氣分不化也尤痰飲咳嗽朝晨必吐清水本擬溫藥以化之但時當酷暑兼有臂痛且以和胃化痰半夏陳皮茯苓款冬花蘇子杏仁萊蔔子白芥子指迷茯苓丸每朝服三錢開水送下許寒咳交冬則發兼以頸項強急不舒大熟地二兩麻黃二錢煎汁浸一宿炒鬆川貝一兩黨參一兩元米炒陳皮一兩茯苓一兩細辛二錢煎汁浸一宿曬烘款冬花一兩制首烏一兩苡仁一兩五味子五錢乾薑二錢同炒杏仁霜六錢歸身一兩酒炒胡桃肉一兩上藥共為細末煉蜜丸每朝三錢開水送下王脈弦遲臍以上連胃脘脹痛此有寒飲脈經云遲則為寒仲景云口不渴而脈雙弦者飲也香砂六君湯去草加炮薑神麯乾薑又當臍腹痛痛則氣塞胸中氣噯不得語脈弦大而遲此胃中陽氣不足而有寒飲也當以溫藥通之照前方去神麯加香附川熟附呂陰虛挾痰飲為病痰飲內留故咳嗽背寒心胸著冷則痛陰虛故內熱也金水六君煎加減治之大熟地半夏陳皮沉香蛤殼款冬花蘇子杏仁沙參茯苓顧頭眩心悸脈沉弦者飲也病發則嘔吐酸水滿背氣攻作痛得噯則痛松此濁陰之氣上攻陽位當以溫藥和之熟附子桂木半夏陳皮冬朮川椒茯苓沉香強中氣不足濕化為痰氣逆不降喘息不安夜重於晝脈象弦滑滑主痰飲痰飲屬陰故病甚於夜也擬降氣化痰兼扶中氣半夏蘇子陳皮茯苓前胡旋覆花神麯竹茹雪羹枇杷葉蓋夫邪之所湊其氣必虛留而不去其病則實留飲久踞不去亦由中氣之虛欲逐其飲先補其中丹溪云補完胃氣而後下之為當茲議先補中氣一法六君子湯去甘草加乾薑又甘遂半夏湯用甘遂五分又照前方用甘遂七分又照前方用甘遂一錢雖大便仍未瀉而腹中已覺甚安即停藥三日某春脈當弦而反微是肝虛也肝虛魂不藏夜不得寐晝日當寤而反寐是胃虛也胃為兩陽合明之腑胃虛則陽氣失明故晝日反寐補肝之虛以藏魂益胃之虛以補氣生熟棗仁茯神新會白黨參半夏生熟穀芽秫米白芍炙甘草淵按此等方案在古人亦不可多得某水飲去後中氣大虛胃液枯涸難為力矣夫中氣大虧非建中不可而胃陰枯涸非養胃陰又不可然則黃耆建中但補中氣而不能養其胃陰仍非計之善也今擬十全大補陰陽氣血雙調加入麥夏蓯附即十四味建中法並建其脾中腎中之陰陽或者其有濟乎人參鬚黃耆大熟地附子三分煎汁炒川芎茯苓半夏白芍肉桂一分煎汁炒蓯蓉炙甘草麥冬冬朮土炒歸身金橘餅又肝虛無直補之法補腎即所以補肝中虛有兼補之方補火而更能生土前投十四味建中兩建其脾中腎中之陰陽證既大虛藥宜加峻虛能受補便是生機人參鬚黨參黃耆炙甘草大熟地附子一分拌炒肉桂麥冬歸身冬朮枸杞子半夏茯苓棗仁山萸肉酒炒蓯蓉單痰飲久留咳喘不已痰多黏膩脾腎兩虧脾虛則痰不化而食減腎虛則陽氣衰而水泛以致腹滿足腫面浮病成溢飲金匱云病溢飲者當發其汗小青龍湯主之然脈細陽衰便難液涸腎氣久虛何堪更投發泄耗陰傷陽之劑擬進附子都氣丸裁去熟地者以其痰多痞塞也淡蓯蓉枸杞子青鹽炒茯苓澤瀉半夏五味子製附子牛膝炭胡桃肉孫風邪久戀肺中寒飲停留胃脘風能化熱咳久傷陰積飲生痰胃陽失布肺之子腎也胃之妻脾也肺傷腎亦虧胃虛脾亦弱脾弱故便泄腎虧故左尺脈弦而大也咳將一載雖曾吐血而時嘔清水其為寒飲無疑今從飲門例治大熟地海浮石拌麥冬元米炒生苡仁五味子陳皮焦六曲茯苓半夏乾薑紫石英細辛沉香吳喘咳多年近加咳嗆形消肉瘦正陰大虧雖有痰濁法當補納大熟地黨參半夏陳皮牛膝款冬花麥冬茯苓紫石英五味子胡桃肉許痰飲流落心中心痛徹背大便乾燥飲食哽嗌腸胃液枯法當溫潤淡蓯蓉麥冬茯苓桂木薤白頭枸杞子半夏陳皮栝蔞霜白蔻仁淵按積飲久而傷胃將成噎膈桂蔞薤白治痰飲亦可治噎膈蓋二證皆上中焦陽微不化所致範寒痰留於胃則脘痛而吐清水入於肺則咳嗽而多白沫宜仿小青龍法辛溫開達上焦淡乾薑茯苓白芍細辛橘紅桂枝半夏五味子款冬花杏仁顧嗜酒多濕濕蘊生痰體質陰虛煩勞傷氣去冬咳嗽須微帶血行動氣升至今不愈診脈虛小恐加喘急茲以金水六君煎加味大熟地半夏陳皮茯苓款冬花杏仁蛤殼五味子麥冬胡桃肉另金水六君丸每朝服三錢淡鹽花湯送下金痰飲停胸清陽失曠咳嗽眩悸與苓桂朮甘湯加味茯苓桂枝白朮炙甘草紫石英五味子陳皮半夏蛤殼胡桃肉方向有心痛嘔吐之病得食則安明系中虛而有痰飲伏留於心下也上年春季頭痛寒熱從此咳嗽喉有痰聲當時設遇明眼用小青龍發汗散水表邪與痰飲悉解何至淹纏不愈耶逮至酷暑邪郁化熱咳嗽帶臭肺氣受傷交白露節秋金得令肺氣清肅而後漸愈至冬陽氣少藏其咳復作交春入夏咳頻不已病延一載有餘診脈雙弦形肉瘦削口不乾渴身不發熱頭眩心悸肝腎之陰已虛脾胃之氣亦弱痰飲戀而未化自淺及於深矣昔賢謂外飲治脾肺內飲治腎今自外而至於內從肺脾腎三經立法前後綰照以冀各得其所款冬花蘇子杏仁川貝茯苓陳皮半夏乾薑五味子五粒同炒大熟地海浮石拌炒炙甘草牛膝鹽水炒蛤殼馬兜鈴薑汁胡桃肉枇杷葉淵按外飲治肺脾非杏貝等清潤之藥可治當求之於金匱想病已棘手方藥錯雜有不得不然耳費痰飲伏於胸中咳嗽喘促其標在肺其本在腎此症本虛未甚標實有痰法當兩顧大熟地茯苓蛤殼川貝牛膝半夏陳皮杏仁桑白皮枇杷葉郝仲景云風舍於肺其人則咳又云胸中有留飲背寒冷如掌大此症是也麻黃桑白皮象貝橘紅黃芩薑汁炒杏仁半夏生甘草茯苓款冬花胡痰飲咳嗽飽則安飢則甚乃胃虛也黃耆炙甘草冬朮陳皮白芍玉竹茯苓杏仁桔梗李胃有寒侵肺有寒侵兩寒相得飲邪停咳而喘嘔為痰飲氣亦宜平痰亦宜平病痰飲者藥宜溫仲師方法細詳審二陳湯加老桂木吳茱萸川椒苡仁生薑羅乾咳陰虛痰火盛丹溪方法主生津此由脘痛兼痰飲煙體須當溫化遵蓯蓉養陰溫潤咸能下降枸杞子甘溫益血製半夏燥濕痰茯苓消金燥濕陳皮鹽水炒理氣水紅花子飲停腹痛白螄螺殼痰停脘痛白蜜潤燥調服薑汁豁痰沖服又煙體陰虛兼夾痰飲乾咳無痰脘痛微悶前方咸降兼以溫潤咳雖稍緩痰仍內蘊唇燥舌膩原方加味蓯蓉枸杞子旋覆花半夏茯苓陳皮白螄螺殼海參漂淡去砂薑汁衝入地栗汁衝入淵按海參入煎劑乃葉氏之作俑也脘痛胸悶明系痰飲體雖陰虛仍不相宜陳宗臺先生認此症為痰飲卓識超群曷勝佩服竊思痰飲久踞中土必受其戕而臟氣互傷窮究必歸於腎腎為五臟之根土為萬物之本脾土弱則清陽失曠而氣化無權腎水虧則真陽失藏而源泉消涸夫以痰飲之病久臥不起於床加以寒熱神疲其為水土俱敗明矣節屆春分木旺陽升之候木旺則土益弱陽升則水益虧清明節後百花齊放將奈之何為今之計崇脾上而轉旋清陽以治其中補腎水而蟄藏真陽以治其下守過清明若得病情安穩有減無增或者其克濟乎苓桂術甘合二陳上午煎服金匱腎氣丸三錢暮服胡寒飲伏留於胃脘清陽失曠於心胸脘中微痛腰背牽掣覺酸時吐清水與苓桂朮甘湯清胸中之陽氣理中湯理脾中之陽氣陽氣復則胃脘之寒飲自化矣照二方加陳皮砂仁半夏又前方通胸中脾中之陽此方兼通腎中之陽陽氣得通三焦氣機自暢胃中寒飲自化矣照前方加清和丸蕭腹滿口舌乾燥仲景云腸間必有水氣渴欲飲水水入即吐名曰水逆食已即吐名曰格塞今兼此三者是寒飲水氣伏留於腸胃也病已四五年非一日可去即宗仲景法彙集而加減之防己赤苓川椒目澤瀉川連大腹皮桂木焦白朮乾薑豬苓半夏白蔻仁孫水停心下則悸氣鬱胸中則痛痛甚則痞塞而吐白沫得食則寬此中虛夾痰飲為患也六君子湯加川朴乾薑桂木沉香楊心胸覺冷經事數月一來食入則腹中脹痛寒痰氣鬱凝滯不通當以辛溫宣暢遵熟料五積意半夏桂枝茯苓蒼朮白芍川芎川朴當歸身丹參炙甘草陳皮枳殼高良薑又苦辛溫通之劑而能調經散痞用之而效益信古人言不妄發法不虛立在用者何如耳前方去良薑加茺蔚子砂仁胡陽微濁聚於胃寒飲竊踞中宮脘痛連脅腹鳴漉漉法當轉運中陽以卻寒飲旋覆花乾薑半夏茯苓澤瀉陳皮水紅花子白螄螺殼生薑又脘脅之痛雖除脾胃之氣大憊面浮足腫土衰水泛脈細少神慮其腹滿急宜溫補中陽以消水濕又當自知節愛為上六君子湯去草加炮薑熟附子神麯另金匱腎氣丸朝暮各服一錢五分某腎中之元陽不足膽中之火用不宣痰飲伏留於心下故心胸如盆大一塊常覺板痛背亦常寒三四年來每交子後則氣喘乃陽氣當至而不至痰飲阻遏陽微陰勝故也天明則陽氣張故喘平至心悸咳嗽易於驚恐屬陰邪竊踞胸中為病其常若傷風之狀者衛外之陽亦虛也圖治之法當祛寒飲而逐陰邪斡旋陽氣如離照當空陰邪盡掃用仲景苓桂朮甘湯先通其胸中之陽氣再議茯苓細辛一分煎汁炒冬朮附子二分炒黨參薑汁炒甘草麻黃一分炒桂木半夏乾薑五味子五粒炒補故紙青鹽炒紫石英陳皮胡桃肉白螄螺殼洗賈病已兩月先嘔而後咳多吐清涎口不渴心胸痛而痞悶此痰飲停於心下也雖微有寒熱並非外感風邪當從胸痹痰飲門中求之半夏茯苓栝蔞皮橘紅杏仁生薑淵按仲景治胸痹用蔞皮須同薤白治痰飲須同桂枝否則不效蓋胸脘之陽不化飲痹皆不去耳施背筋常冷胸腹有塊時吐酸水此寒痰阻於胃而太陽之氣不宣溫之通之蘇梗桂枝陳皮茯苓半夏製附子川椒老生薑仁淵曰內經無痰飲證並無痰字痰飲之病始於仲景詳於金匱其論痰飲有四曰痰飲懸飲支飲溢飲千金有五飲丸治留飲痰飲溢飲流飲澼飲明李時珍即金匱四飲加伏飲為五飲古人以胸胃腸間有水飲內積即名曰飲不必盡有咳嗽也今人以咳嗽氣逆倚息不得臥名之曰痰飲乃金匱之支飲也其餘或已更名如脘痛吐酸即古之懸飲也飲水不化不得汗出身體疼重浮腫古之溢飲也去古漸遠其名遂更夫五飲之生總由肺脾陽虛致水飲入胃不能布化通調停蓄胃腸之間遂生種種病情射肺則咳凌心則悸犯肝則脅痛眩冒入腎則喘逆侮脾則脹滿痞悶皆中上陽氣不能布化之過也然肺脾之陽雖虛腎中之陽尚旺其病猶可支持故痰飲病有積延歲月而不死者如此篇亦以咳嗽氣逆為痰飲然即以咳嗽氣逆而論其因多端未必盡屬痰飲也大抵痰飲咳嗽其痰多沫其氣多逆其脈多弦多滑其心多悸蕩其頭多眩冒其表畏寒冬發夏愈其口不渴其舌苔多白此痰飲咳嗽之狀也治法金匱要言不繁曰須以溫藥和之蓋無論何飲化其中上焦之陽氣為先而腎氣丸一方即開後人內飲治腎之門故後人有外飲治肺脾內飲治肝腎之説蓋飲邪久延窮而傷腎腎陽虛而腎氣上奔非溫納補攝不效後賢之人參蛤蚧黑錫丹天真丸等都從腎氣丸得來為溫納腎氣之法若得病之由或冒冷雨或臥而受涼或過飲傷其肺脾非一端耳痰喘門高寒入肺底久而化熱同一痰喘先後不同矣初病在肺久必及腎虛實不同矣補腎納氣清金化痰是目下治法大熟地海浮石拌麥冬川貝蛤殼五味子牛膝杏仁沙參地骨皮枇杷葉雪梨皮盧腎司納氣開竅於二陰病發每因勞碌之餘先頻轉矢氣而後氣升上逆短促如喘飲食二便如常其病在少陰之樞宜補而納之六味地黃合生脈散加青鉛陸喘哮十二年三瘧一載瘧止復來喘發愈勤中虛痰飲不化雖痰中帶血而不可以作熱治也擬六君子加杏仁旋覆薑桂方法六君子湯加杏仁旋覆花桂枝細辛同炒乾薑五味子同打炒淵按痰中見血仍用薑桂非老手不辨馮年逾七旬伏暑挾濕濕能生熱病起微寒微熱咳嗽痰稠曾經吐血今血雖止而咳仍然脈澀而數舌苔灰白而渴乃濕熱痰濁戀於肺胃病將匝月元氣大傷脾胃不醒穀食少進初起大便堅今則軟而帶溏矣病在肺脾胃三經治在化痰降氣和中甜杏仁茯苓款冬花蛤殼沙參紫菀川貝母苡仁陳皮雪羹另用人參珠子血珀沉香礞石研細末勻和一處再研極細分四服日一服又夫咳嗽痰喘之病淺則在肺胃深則屬肝腎凡用方之法由淺而深按脈察色知其虛中挾實實者痰濁也故先以化痰降氣和中為法兩劑咳嗽稍平惟氣之喘而短者有出多納少之意則其本虛矣左脈細微肝腎之虛大著雖舌苔黃濁不化亦當以攝納為要且額上汗冷胃泛不納將有虛脫之慮人參一錢五分五味子八分麥冬錢半元米炒山萸肉二錢澤瀉一錢大熟地六錢附子三分煎汁浸片時炒成炭懷山藥五錢炒茯苓二錢紫石英三錢懷牛膝三錢紫衣胡桃肉不去皮二個另用好肉桂三分上沉香三分坎氣二條上三味各研末和一處再研細分作二服今晚一服燕窩湯調下明日再進一服若得額汗收斂左脈稍起猶有生機可理若不應手難為力矣杜咳嗽有年每遇勞碌感寒即發並無痰涎此屬氣喘據述病起受寒早用麥冬清滋之藥遂至邪戀於肺曾服麻黃開達見效然病根日久肺氣日虛虛而不治纍及子母今三焦並治乃肺脾腎三臟兼顧也杜蘇子淡乾薑五味子合搗甜杏仁橘紅半夏款冬花炙甘草早服附桂八味丸一錢金水六君丸三錢開水送又久咳肺脾腎交虛前用溫納相安今交夏令腎氣丸中桂附嫌剛改用都氣丸可也都氣丸三錢朝服金水六君丸三錢晚服俱鹽湯下又肺為貯痰之器腎為納氣之根腎虛不納則氣逆而生喘肺虛失降則痰貯而作喘前方辛通肺氣補攝腎氣服下稍安而病莫能除良以多年宿恙根深蒂固然按方書內飲治腎外飲治肺不越開上填下之意法半夏茯苓橘紅杏仁霜款冬花乾薑白芍五味子炙甘草上藥為末用麻黃三錢白果肉三十粒枇杷葉二十片煎濃汁泛丸每服一錢朝晚並進與都氣丸同王高年烘火誤燒被絮遭驚受寒煙燻入肺陡然喘逆痰嘶神糊面浮防其厥脫旋覆花前胡杏仁川貝代赭石茯神蘇子沉香桑白皮款冬花竹油沖薑汁沖淵按此火邪傷肺而喘也與尋常痰喘不同故不用溫納徐喘哮氣急原由寒入肺俞痰凝胃絡而起久發不已肺虛必及於腎胃虛必纍於脾脾為生痰之源肺為貯痰之器痰戀不化氣機阻滯一觸風寒喘即舉發治之之法在上治肺胃在下治脾腎發時治上平時治下此一定章程若欲除根必須頻年纍月服藥不斷倘一暴十寒終無濟於事也此非虛語慎勿草草發時服方款冬花桑皮紫菀蘇子沉香茯苓杏仁橘紅半夏淡芩平時服方熟地五味子陳皮苡仁胡桃肉紫石英煅半夏蛤殼杜仲茯苓又喘哮頻發脈形細數身常惡寒下焦陰虛中焦痰盛上焦肺弱肺弱故畏寒陰虛故脈數喘之頻發痰之盛也有所感觸則病發焉病有三層治有三法層層護衛法法兼到終年常服庶幾見效否恐無益也發時服方桂枝生曬乾款冬花蜜炙橘紅鹽水炒杏仁霜萊蔔子桑皮蜜炙共研末用枇杷葉十片去毛煎湯再用竹油半茶杯薑汁一酒杯相和一處將上藥末泛丸發喘時每至臥時服此丸二錢苡仁橘紅湯送下平時服方大熟地砂仁拌丹皮鹽水炒茯苓牛膝鹽水炒澤瀉鹽水炒肉桂山萸肉酒炒懷山藥炒五味子鹽水炒磁石上藥為末用煉白蜜搗和捻作小丸丸須光亮俟半乾再用製半夏三兩陳皮二兩炙甘草一兩研極細末泛為衣每朝服二錢發時亦可服葉喘之標在肺喘之本在腎脈遲者寒也舌白者痰也以金水六君煎加味大熟地蛤粉炒半夏陳皮茯苓杜仲款冬花桂枝紫菀杏仁五味子胡桃肉又喘發已平咳嗽不止吐出濃痰今宜降氣化痰蘇子旋覆花當歸款冬花桑白皮橘紅半夏茯苓杏仁金痰氣聲嘶面仰項折久而不已防有雞胸龜背之變蓋肺氣上而不下痰涎升而不降上盛則下虛故病象若此宜清肺以降逆化痰而理氣生石膏紫石英半夏茯苓橘紅石決明川貝母蛤殼紫菀杏仁竹油薑汁另不蛀皂莢三枚去皮弦子煎濃湯一飯碗用大棗三十枚將湯煮爛曬乾將汁再浸再曬乾每日食棗五六枚某汗出不休氣短而喘是氣血陰陽並弱也足常冷為陽虛手心熱為陰虛營不安則汗出氣不納則喘乏法當兼顧大熟地附子三分拌炒黃耆防風一錢拌炒歸身白芍五味子紫石英茯苓黨參冬朮浮麥紅棗淵按此勞損虛喘也金受火刑經所謂耐冬不耐夏夏令見之都屬不治黃耆為汗多而設若喘而無汗即不相宜又汗出減半氣尚短喘今當大劑滋陰再參重以鎮怯人參固本丸龜膠磁石紫石英白芍五味子胡桃肉又周身之汗已收頭汗之多未斂氣喘較前覺重交午愈甚掌心覺熱脈形細數飲食減少陰津大虧肺氣傷戕茲當炎暑水衰火旺金受其灼咳嗽痰黃漸延損症擬清金麗水冀其應手為妙沙參麥冬大生地龜板川貝母五味子知母西洋參川黃柏仁淵曰痰喘之因不一須分虛實兩途實者因風寒痰火大都病在肺胃從外感而來或寒熱無汗或不熱有汗咳嗽痰濃便溺短赤舌苔厚脈數浮滑不空乃風溫痰熱壅於肺胃不得降化也宜宣通肺絡清降胃氣有汗葶杏橘貝芩翹石膏等劑無汗麻杏甘石桑貝橘桔之類若形寒表熱不揚咳窒不爽脈浮而緊乃風寒閉其肺絡元府不宣肺氣不利不得肅降也宜麻杏蘇桔或防風通聖等開其腠理虛者乃平素肺腎內虛肅降攝納無權脾胃氣弱不克化飲食精微即痰飲之類痰留肺系胃絡一觸外邪肺胃即失順降腎氣即為奔逆喉間嗘吼有聲倚幾布息甚至自汗淋漓無表熱外感見證脈浮滑空豁或形瘦浮腫種種虛象宜溫納鎮攝又有半虛半實之證如素有痰飲感寒遇勞即發咳嗽痰沫喘逆倚息仿痰飲例治之若久病全屬虛證更有無痰而喘火迫而喘糖哮鹽哮而喘俱傷其肺氣使然當求其因古人謂實喘治肺虛喘治腎確有見地然不可執一實喘治肺須兼治胃虛喘治腎宜兼治肺如腎氣丸黑錫丹治腎人參蛤蚧湯治肺人參胡桃湯肺腎兼治也大抵痰多脈空弦者以腎為主痰少脈虛不甚大者以肺為主痰稀多沫者宜溫納痰少色黃厚者宜平降一則腎陽虛一則腎陰虛而肺有火也夫熟地最能消虛痰以其能填補腎氣而化無形之痰也勿嫌膩膈而畏之
