body:
  text: 序臨證醫案非古也古人視病不立案語但書方藥自宋設醫學科命題考試醫生取其學問高等者入太醫局自後醫生診病相沿先立案語後書方藥但隨作隨棄無有輯之者如宋之許知可張季明明之薛立齋陳維宜孫文垣以及國初喻嘉言徐大椿輩雖有醫案類皆因治療效驗筆諸於書其文乃記事非臨證也良以病多轉變方難一定恐泥學者眼目故作者恝置之然余謂醫之有方案猶名法家之有例案文章家之有試牘對病書方因題立義相對斯須人之性命系焉己之得失亦系焉雖不足為根柢之學而病者之情形醫者之學識心思盡在於是苟能溯其脈證觀其變化奚啻與病者醫者一堂共語不大可觸發手眼哉故葉氏臨證指南海內風行然葉案語意高深方多平淡學者踐其跡未必入其室因葉負一時重名所視者非富貴膏粱即病深氣竭貧賤初病者寥寥焉蓋氣體不同方法即異讀其書而得其用者鮮矣余舊得無錫王泰林旭高先生方案二卷愛而藏之以篇頁無多未梓更求二十餘年不可得客春遊梁溪訪老友劉君石香石香出十卷示余云新得於李氏者亟假歸讀之其心思之敏見識之超清華而不高深靈變而有矩矱視葉案易於學步且復診甚多前後推究考其得失尤足以資助學者因並余所藏者去其重複合而選之間有字句冗沓率意處略為刪整依類編次分二十六門每門附以拙論略見大意其有精警與未愜意者復隨案指出正之有道非敢有意譭譽也原書十卷約得五六釐為四卷命兒輩錄出不敢自私付之梓人以公同學焉光緒二十三年丁酉孟春耕霞方氏序於倚云吟館
