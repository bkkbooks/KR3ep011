body:
  text: 卷之二中風門錢類中五年偏痱在右元氣不足痰流經絡近今兩月穀食大增雖為美事亦屬胃火火能消穀故善食而易飢也調治方法不外補養精血熄風通絡和胃化痰制首烏當歸大熟地刺蒺藜三角胡麻桑寄生茯苓半夏曲麥冬肉新會皮淵按此肝腎水虧而虛火盛者故以滋水熄風為治趙風中廉泉痰阻舌本口角流涎舌蹇而澀右肢麻木僕中根萌擬熄風和陽化痰泄絡羚羊角石決明膽星法半夏茯苓甘菊炭遠志煨天麻橘紅淵按痰火用事故瀉火化痰通絡熄風甘菊不宜用炭某口歪於左手廢於右肝風胃濕互相牽掣舌強而蹇痰留心脾之絡也類中顯然黨參當歸半夏茯神鉤鉤石決明川斷秦艽膽星桑枝淵按脾虛生痰肝虛生風運脾即是化痰養肝佐以熄風為虛實參半之治王兩手關脈皆見一粒厥厥動搖之象此脾虛木盛內風動躍之候也左半肢體麻木不仁頭眩面麻此屬偏枯慮延僕中制首烏當歸白芍茯苓陳皮煨天麻秦艽石決明刺蒺藜池菊鉤鉤桑枝復兩關脈厥厥動搖之象大減其內風有暗熄之機左手屈伸稍安左足麻木未愈今擬補腎生肝為治本之計地黃飲子去桂附淵按去附桂水中之火尚不虛也金左手脈沉弦而澀數不調乃血虛而肝風暗動也右關脈獨緩滑胃有濕痰尺寸俱弱金水兩虛症見耳聾兩肩膊痠而難舉痰多口中乾膩是其徵也大生地麥冬歸身石決明半夏蒺藜鉤鉤橘紅牡蠣元參指迷茯苓丸丁脈左弱為血虛右弱為氣虛氣血兩虛上為頭眩半身以下皆形麻木而成癱瘓甚則心亂神昏此肝風挾痰所致法當清上補下淡蓯蓉大生地天冬牛膝元參菖蒲大麻萆薢茯苓陳皮黃柏洋參淵按清陽明以利機關養肝腎以滋陰血運脾氣以化濕痰絲絲入扣孫血不養筋肝風走絡左臂痠痛或止或作法當養血通絡制首烏當歸杞子穭豆衣丹參蒺藜苡仁茯苓秦艽桑枝紅棗蔣酒客中虛嘈雜木勝風動頭旋掉眩兼以手振此內風挾痰為患須戒酒節欲為要天麻冬朮茯苓杞子沙苑子鉤鉤制首烏當歸白芍半夏石決明池菊謝久患肝風眩暈復感秋風成瘧瘧愈之後周身筋脈跳躍甚則發厥此乃血虛不能涵木筋脈失養虛風走絡痰涎凝聚所致擬養血熄風化痰通絡制首烏紫石英白蒺藜半夏茯神洋參陳皮羚羊角石決明煨天麻棗仁竹油薑汁淵按瘧後脾氣必虛風動雖由木燥痰聚由於脾虛若舌苔濁膩運脾化痰尤不可少薛年已六旬腎肝精血衰微內風痰涎走絡右偏手足無力舌強言澀類中之根萌也溫補精血兼化痰涎冀免偏枯之纍然非易事耐心調理為宜蓯蓉干巴戟肉茯神木瓜半夏杞子鹽水炒遠志肉甘草湯制海風藤萸肉酒炒牛膝杜仲鹽水炒又腎藏精肝藏血腎肝精血衰微筋骨自多空隙濕熱痰涎乘虛入絡右偏手足無力舌根牽強類中之根溫補精血宣通經絡兼化痰涎守服不懈加以恬養安泰庶幾卻病延年蓯蓉干黨參元米炒牛膝半夏杞子鹽水炒陳皮續斷茯苓巴戟肉桑枝又丸方蓯蓉干二兩酒煮爛搗入黨參三兩元米炒熟地四兩砂仁末陳酒拌蒸爛搗入麥冬二兩去心元米炒棗仁三兩炒研巴戟肉三兩鹽水炒歸身二兩酒炒萆薢三兩炒制首烏四兩炒茯神三兩牛膝三兩鹽水炒天冬二兩去心元米炒半夏二兩陳皮二兩五錢杜仲三兩鹽水炒虎骨三兩炙菖蒲一兩杞子四兩鹽水炒上藥各選道地如法制炒共研細末用竹瀝四兩薑汁三兩搗入再將白蜜為丸如黍米大用瓷器裝好每朝服五錢開水送下唐風痰入絡腦後脹痛舌根牽強言語不利飲食減進久防痱中羚羊角防風制殭蠶生甘草羌活遠志肉川芎桔梗桑葉薄荷鉤鉤又頸項脹是風舌根強屬痰風與痰合久防類中熟地白芍續斷杞子杜仲秦艽當歸牛膝淵按實多虛少前方恰合後方大補與痰阻舌本者不宜費類中之後手足不遂舌根牽強風痰入絡所致防其復中黨參大生地制南星白芍秦艽冬朮制首烏羚羊角虎骨歸身牛膝海風藤沙苑子茯苓棗仁杜仲生苡仁陳皮川貝半夏上藥煎濃三次加竹瀝二茶杯薑汁二十匙白蜜二杯阿膠四兩煬化收膏某勞碌傷氣肝風陽氣弛張肥體氣虛濕熱痰火擾動忽然磕睡幾乎跌僕舌強言漫右偏肢痱此屬偏中猶幸神識尚清痰涎未湧或可圖幸治以熄風化痰安神清火冀其得效為妙羚羊決明天麻竺黃茯神菖蒲川貝膽星半夏橘紅嫩鉤竹瀝淡薑汁範驚動肝膽風陽與胃中之痰濁交互入絡營衛運行之氣上下升降之機阻窒礙滯周身皮膚肌肉關節麻木不仁胸脘不暢飲食無味口多涎沫頭昏心悸風陽抑鬱不伸痰濁瀰漫不化苔白而裂大便乾燥胃雖有濕而腸液已枯矣擬清火熄風化痰滲濕參以養血滋液羚羊蓯蓉干天麻決明半夏麻仁制南星澤瀉橘紅茯神當歸嫩鉤薑汁竹瀝淵按飲食不化精微而化痰濁致胃濕腸燥由氣祕不行中焦升降失其常度耳何右關脈獨滑動如豆此有痰濁在中焦也中脘皮肉覺厚手足筋脈時或動惕痰走經絡之象法當攻補兼施朝服香砂六君丸三錢夜服控涎丹十四粒硃砂為衣陸素有痰飲咳嗽土弱金虛金虛不能制木並不能生水土弱不能御木之侮並不能生金而化痰病情有似風痰癱瘓足軟難行口流涎沫舌左半無苔口常不渴脈虛弦滑大便堅燥種種見症皆顯金土水不足而風痰有餘病根日久調之不易姑擬一方備採蓯蓉干半夏五味牛膝鹽水炒麥冬元米炒巴戟天麻仁熟地茯神陳皮肉桂竹瀝薑汁吳體肥多濕性燥多火十年前小産血崩遂陰虧火亢肝風暗動筋絡失養其根已非一日去秋伏暑而成三瘧瘧久營衛偏虛遂致內風夾痰擾絡右半身麻痹而似偏痱調理漸愈今但右足麻辣熱痛痛自足大趾而起顯系血虛肝經失養據云腿膝常冷足骱常熱並非足骱有火而腿膝有寒也想因痛處則熱上腿之處氣血不足故寒也至於左脛外臁皮肉之內結核如棉子發作則痛甚此屬筋箭是風痰瘀血交凝入絡而成與右足之熱痛麻辣不同今且先治其右足姑擬一方請正大生地萆薢茯苓阿膠天麻五加皮歸身牛膝冬朮獨活絲瓜絡木瓜淵按筋箭之名甚新仁淵曰中風一證昔河間言火東垣言氣丹溪言痰各持其説以余觀之要不外陰精陽氣不能轉輸布化或痰或火或氣得以乘間竊發阻其竅隧經絡致無故昏僕或口噤語蹇手足偏廢雖有臟腑經絡之分總是本虛標實惟本虛故容易受邪而風也火也痰也雖名外邪其實風即逆氣所化痰即飲食所生火亦陽氣偏盛乃化良民為盜賊耳內經曰人年四十而陰氣自半陰氣者乃五臟之精氣也精氣暗虧三邪易發故病者每在四十以後少壯者鮮焉王清任醫林改錯謂全屬虛證治以大劑黃耆雖屬偏見不為無因而細想病情若非真臟大虛安有如是猝暴與外感傷風中風豈可同年而語彼則賊自外來此則釁由內起古人以小續命加減治一切中風余每疑焉蓋以辛溫發散之方而治內傷精氣之病朱丹溪曰西北方氣寒土燥或有真中風東南則因濕生痰痰生火火生風耳若然則西北之病仍是外感風邪而名為中風與猝然昏僕偏廢大相懸絶豈可混同論治餘生長東南未見西北之病讀書至中風一篇每不滿意於古人焉肝風痰火門王血虛肝風上逆痰涎走絡頭眩心跳乾咳痰少右肩臂不能舉足熱無力養陰以熄風陽化痰以調脾胃黨參元米炒生地海浮石同拌半夏決明沙苑鹽水炒茯神棗仁蛤殼茯苓陳皮嫩鉤竹二青又治風先治血血行風自滅治痰先化氣氣化痰自失生地茯神嫩鉤陳皮沙苑決明蛤殼棗仁竹茹張頭痛巔疾下虛上實過在足少陽厥陰甚則入腎眴蒙昭尤此段經文明指肝膽風陽上盛久痛不已必傷少陰腎陰腎陰一衰故目䀮䀮無所見而腰痛復起也前方清鎮無效今以育陰潛陽鎮逆法生地龜板杜仲鹽水炒牡蠣茯神棗仁磁石阿膠米粉炒女貞鹽水炒沙苑鹽水炒石決明淵按此厥陰頭痛也三陰經皆至頸而還惟厥陰上額交巔甚則入腎者木燥水必虧乙癸同源也楊鬱火內燔氣血消灼濕熱不化釀成瘍毒四肢麻痛眼鼻牽引肝風內動脾胃受戕慮延敗症姑先清氣血之燔佐以熄風通絡羚羊角連翹木防己苡仁滑石黑山梔赤苓絲瓜絡丹皮鉤鉤通草藿香葉淵按濕熱風火內盛故以清火化濕通絡熄風不涉虛故不用補榮病起肝風繼增痰飲吐酸所以口目筋掣而胸膈不利也近因暑熱上蒸咽喉碎癢暫投涼劑喉患即解而胸脘愈覺撑脹夫肝風之動由於陰血之虧而痰飲之乘又系胃陽之弱病涉兩歧法難兼用今且宣化胃濕以祛痰稍佐平肝降熱法半夏茯苓陳皮麥冬杏仁旋覆花川貝山梔薑汁炒鬱金丹皮白蔻仁竹茹淵按此等病最難看其實在中焦脾胃也蓋飲生於脾聚於胃苟能治得痰飲肝風無有不愈脾氣既升肝自不郁胃氣既降肝自清寧何風之有朱五臟六腑之精氣皆上注於目目之繫上屬於腦後出於項故凡風邪中於項入於腦者多令目系急而斜視或頸項強急也此症始由口目牽引乃外風引動內風內風多從火出其源實由於水虧水虧則木旺木旺則風至至於口唇乾燥赤碎名餂唇風亦由肝風胃火之所成也治當清火熄風養陰為法大生地丹皮沙參鉤鉤桑葉羚羊角石決明白芍川斛芝麻元參心蔗皮藜皮顧血不養筋筋脈牽掣晝日則安暮夜則發不能安臥病在陰經宜養血以和經脈大生地黨參黃耆川芎茯苓柏子仁當歸白芍棗仁桑枝何肝風陽氣上冒頭左偏痛連及左目難開胸脘氣脹肝木乘胃法以泄降和陽羚羊角蔓荊子川連刺藜池菊鉤鉤石決明神麯茯苓半夏桑葉施久遺下虛腎水不足肝風暗動上升則頭痛眩暈乘中則或吐或瀉近來夜寐出汗左目鋭眥赤腫少陽木火上盛也法以上熄風陽下滋腎水中和脾胃外實腠理用湯丸並進磁朱六味丸淡鹽湯送下石決明懷藥白芍元參牡蠣沙苑子茯神黨參芡實紅棗浮麥潘情懷鬱勃肝膽風陽上升右目昏蒙左半頭痛心嘈不寐飢而善食內風掀旋不熄痛勢倏忽無定營液消耗慮其痙厥法以滋營養液清熄風陽務宜暢抱庶克臻效大生地元精石阿膠天冬池菊羚羊角石決明女貞子白芍鉤鉤復服滋陰和陽法風陽稍熄第舌心無苔心嘈善飢究屬營陰消爍胃虛求助於食議滋柔甘緩大生地石決明麥冬阿膠白芍大麻仁女貞子橘餅洋參茯神淵按舌心無苔胃陰虛也加炙草守中壯水更妙李肝風陽氣弛張兼挾濕熱上混清竅左耳常流清水時或作癢右鼻燥而窒塞頭暈沉沉法以熄風和陽羚羊角石決明池菊鉤鉤粉丹皮黑山梔磁石蒺藜赤苓通草穭豆衣左慈丸三錢吳上年夏季痰火迷心神呆語亂愈後至今復發現診脈浮小弱舌心紅而苔白語言錯亂哭笑不常憑脈而論似屬心風蓋由風入心經蘊熱蒸痰所致用本事方獨活湯獨活防風淡芩山梔元參鮮地茯苓甘草橘紅竹葉石菖蒲膽星淵按心脾有伏痰積熱故見症如是宋營血內虧不能涵木加以惱怒肝風暗動不時頭昏腳軟防其跌僕今宜養血熄風黨參當歸白芍川貝陳皮茯神棗仁香附橘葉砂仁石決明刺蒺藜淵按營虛由脾不化心不生黨參當歸補脾以生營砂仁橘葉快脾以疏肝余亦清金制木利氣養營者也徐少腹之塊已平小便已利而反不禁素有肝風脾泄宿恙近增右手麻木脈象弦大而滑時覺痰多氣升此中氣已虛精血不足內風走絡脾濕生痰法當兼顧制首烏懷山藥冬朮歸身白芍菟絲子沙苑子茯苓黨參半夏陳皮桑枝朱血與津液其原皆稟於胃胃氣虛則血少而風動風煽胃中則精液虧而火炎夫胃與大腸同屬陽明故上為牙痛左肩亦痛下則便艱而痔痛也頭眩心跳血虛故也擬養陽明氣血以滋津液為法制洋參柏子仁歸身麥冬升麻新會皮元精石黃耆於朮茯神荷蒂淵按胃氣虛未必風動惟胃虛不能布化精微營陰失其資生灌溉始木燥風生上有牙痛下有痔痛津枯金燥風火交煽矣又補氣血以止痛生津液以潤腸制洋參熟地黃耆於朮當歸柏子仁陳皮麥冬麻仁生穀芽錢外風引動內風頭偏右痛不能著枕用青空膏羌活柴胡防風川連酒炒甘菊焦梔黃芩桑葉絲瓜絡鉤鉤薛頭風痛偏於右發則連及牙齦甚則嘔吐痰涎肝風襲於脾胃寒痰流入經絡溫補泄化為法竹節白附子黃耆羌活刺蒺藜半夏吳萸制殭蠶鉤鉤淵按頭痛牙痛屬熱者多而亦有寒痰流絡用溫散者胡少腹脅肋肝之部也腰腎之府也年老則精血枯而絡脈空肝氣乘虛入絡濕熱又從之為患補養精血疏肝通絡兼化濕熱以治之川楝子香附烏藥當歸茯苓旋覆花延胡新絳陳皮蓯蓉干青蔥管又補養精血疏通脈絡脅肋之痛稍減惟小溲短少夜半以後脘腹覺脹是濁氣不化也前方加通陽泄濁之品川楝子吳萸烏藥杞子當歸延胡索茯苓車前橘葉蓯蓉干九香蟲兩頭尖小麥芽蘇肝陰久虧風陽上擾不熄頭頂目珠皆痛痛則心嘈難過漾漾如嘔多煩少寐大便燥結高年當春分節陽升勃勃之際自宜育陰熄風鎮逆寧神生地茯神阿膠沙參鮮首烏麻仁沙苑子棗仁甘菊石決明炙甘草麥冬金器先煎又耳目昏花初起多由風熱次則因於肝火久則必致陰虛此證已及半年其為陰虛陽亢無疑育陰以和陽壯水以制火是定法也大生地麥冬丹皮磁石茯神石決明焦梔元參棗仁沙苑子北沙參另磁朱丸二錢每朝鹽花湯送下華病久正虛陰陽兩弱坎離不交夜不成寐久臥於床不耐煩勞茲因舟行跋涉遠道就診忽然神糊不語兩手不定遮睛撏發煩躁不安診脈促亂飲食不進想由舟中熱悶鼓動風陽擾亂神明卒然生變姑擬熄風和陽安神定志冀得神清穀進或可再商生洋參茯苓丹皮沙苑石決明天竺黃竹茹棗仁嫩鉤遠志肉金箔淵按痰濁為風陽煽動堵塞神明猝然不語須豁痰開竅豁痰如羚羊膽星竹瀝之類開竅如牛黃至寶蘇合之類隨證用之或者有濟蘇肝風上升於巔頂原屬陰虧痰濁彌滿於中宮多因脾弱目痛頭疼心嘈便結陰虧陽亢之徵舌苔濁厚納少噁心胃虛濁泛之象高年久病圖治實難勉擬一方備參人參半夏天麻橘皮元明粉茯神沙苑鹽水炒磁石黃柏元精石乾薑又頭痛減而得寐苔薄白而帶灰火降則神安濕化則燥顯前方加減再望轉機前方去乾薑黃柏加知母北沙參薑竹茹又頭痛雖減風陽猶未全平舌苔灰白痰濁仍未全化心跳若飢營陰虧而有火聞喧欲暈陽上亢而下虛擬養營陰以降火和胃氣而化痰參以鎮逆佐以寧神制洋參牡蠣茯神沙苑石決明大生地半夏陳皮杏仁元精石竹茹欽差軍事倥傯勞心勞力眠食無暇感冒風邪引動內風犯胃凌上半邊頭痛嘔吐黃水擬去外風以熄內風兼和胃氣而化痰濕録方呈電荊芥秦艽防風天麻石決明陳皮茯苓白芷甘菊鉤鉤半夏竹茹白蔻仁某情懷鬱抑元氣內虧心中難過虛火肝風上逆唇口腫痛頭眩耳鳴食少無力時常太息防其痰火神蒙之變非輕證也羚羊角沙苑子川石斛天竺黃石決明嫩鉤藤棗仁甘菊花元參丹皮燈心又痰火神煩不寐防患瘋癲枳實天竺黃石決明茯神羚羊角膽星川連竹瀝薑汁棗仁竹瀝達痰丸三錢開水送朱水虧不能涵木陽升陰不上承時際春深木旺陽升之候是以寒熱頭痛胸痞少寐便結等症見也仿趙養葵法大生地砂仁拌茯神丹皮柴胡鹽水炒棗仁女貞子麥冬硃砂拌歸身陳皮生薑石決明紅棗淵按從逍遙散參入滋水養肝頗有巧思陳脈診左關獨弦滑風陽挾痰上擾陽明頭額偏左連及腮齒皆痛擬熄風陽兼清痰火羚羊角制殭蠶桑葉丹皮嫩鉤鉤甘菊花石決明鮮銀花藤刺蒺藜另細辛三分荊芥錢半生石膏五錢共研粗末泡湯漱口另乳香一錢沒藥一錢生南星一錢生半夏一錢殭蠶一錢冰片三分共研細末和入陳酒乾麵調敷徐喪弟悲哀太過肝陽升動無制初起病發如狂今則心跳少寐頭暈口乾略見咳嗽擬安神養陰清火降氣為法石決明丹皮棗仁茯神川貝北沙參廣橘紅麥冬元參竹茹枇杷葉章經曰上虛則眩丹溪云無痰不作眩病機論曰諸風掉眩皆屬於肝是眩暈不出虛風與痰三者為患健忘筋惕虛與肝之病也吐痰干膩津液所化也從三者治之雖不中不遠矣生洋參天麻天竺黃川貝茯神制南星石決明牡蠣甘菊花牛膝女貞子嫩鉤鉤又眩暈虛風兼夾痰前方布置已成斑病來心悸宗筋縮養血清肝理必參生洋參天竺黃天麻川貝嫩鉤鉤羚羊角石決明菖蒲茯神大補陰丸諸外風引動內風頭兩邊及巔頂俱痛咳嗽舌苔白身熱能食知味病在上焦古方治頭痛都用風藥以高巔之上惟風可到也荊芥一錢川芎八分酒炒杏仁三錢防風錢半甘菊花一錢淡芩錢半酒炒枳殼一錢羌活錢半藁本一錢上藥研粗末外加松蘿茶葉三錢分三服開水泡服另細辛三分雄黃一分研末搐鼻取嚏淵按古方清空膏一派升散全無意義可用之證甚少唐肝風太旺肝陰又虛氣旺則火動而風生陰虛則液虧而血弱血弱則心跳液虧則口乾火動故發熱風生則頭痛擬佐金以平木培土以熄風養血以柔肝益陰以退熱歸身丹皮鹽水炒北沙參吳萸三分拌炒棗仁陳皮冬朮土炒刺蒺藜穭豆皮茯神白芍橘葉陸陽升頭痛心虛善忘痰火迷心若昧若狂安神定志人參可用而膩補且緩以其納少痰多也舒郁化痰川貝最妙而燥劫須忌以其舌苔乾白也潛陽熄風須參重鎮而收澀當戒恐反斂其痰也人參茯神川貝石決明蛤殼棗仁川連三分拌炒研又脈細數懶言倦臥其為精氣神三者皆虛然舌苔白膩有痰且有飲再察神情靜則氣怠而若虛動則氣上而自亂是虛而有痰兼有火也火伏則痰不上升則靜靜則虛象現火動而痰升則躁躁則虛象隱非不虛也痰火為之起伏也治不越十味溫膽加減臨症各有心思悉關根柢參鬚川貝茯神棗仁石決明橘紅又陰遏於外陽伏於內陰如迷霧陽若日光今陽為陰遏故沉沉默默而矇昧脈亦為之不顯有時陽光見晛則起坐而神清脈亦為之稍起頃之陰霾四合陽氣復翳則仍昏昏如寐前案謂有痰飲鬱於其中十味溫膽屢投不應再思病源起於頭眩心悸苔白多痰常服蒼朮見效近因神亂若癡多從事於痰火清滋重鎮陰勝於陽以致變幻然欲開陰霧法必通陽譬之離照當空而後陰霧始散議進仲景苓桂朮甘湯加味苓桂朮甘湯加遠志淵按此從喻氏寓意草得來昧者見神亂若癡從事於痰火不思心主陽神痰為陰物以陰邪遏其陽氣靈明為之蒙閉顛倒內經云重陽則狂重陰則癲癲狂二證未可混治世醫一見神志昏亂多從事於痰火由不讀內經耳仁淵曰肝風痰火乃類中之漸也故次於中風之後原夫肝之所以生風由腎水不足灌溉致木燥火生火生風起脾弱不能運化飲食精微而生痰濁痰濁為風陽煽動上盛下虛輕則眩暈搖顫氣升嘔逆重則癲狂昏僕與中風同類案中治法大都上熄風陽下滋腎水痰多者以化痰為主虛多者以養陰為主虛而寒者宜溫虛而熱者宜涼亦有本虛標實痰火上盛不得不先瀉火開痰俟標邪退而再圖其本見證雖屬肝膽而病根全在脾腎蓋木之生也栽培在土滋灌賴水苟土厚水潤燥濕得宜雖有大風枝葉動而根幹不搖惟土薄水虧始根露乾枯無風且萎有風寧不搖動乎且脾土既虛肺金失恃金虛不能制木火升轉欲焚金將軍之性非可直制惟鹹苦甘涼佐微酸微辛經所謂火淫於內治以鹹寒佐以甘苦以酸收之以苦發之風淫於內治以辛涼佐以甘苦以甘緩之以辛散之夫鹹苦酸甘益陰瀉火以柔濟剛辛味雖陽以能通散助金而制木也虛勞門趙血不養心則心悸少寐胃有寒飲則嘔吐清水虛火燥金則咽痛肝木乘中則腹脹此時調劑最難尉貼蓋補養心血之藥多嫌其滯清降虛火之藥又恐其滋欲除胃寒慮其溫燥劫液欲平肝木恐其克伐耗氣今仿胡洽居士法專治其胃以胃為氣血之鄉土為萬物之母一舉而三善備焉請試服之黨參冬朮茯苓半夏棗仁扁豆陳皮懷山藥秫米淵按土虛木燥積飲內生原木之所以燥由脾不運化精微而生營血以養肝木耳治胃一言最扼要復陰虛則陽不藏水虧則木自旺金衰不能制木脾弱更受木刑久病不復便謂之損調補之外何法敢施黨參茯神棗仁熟地冬朮當歸陳皮川貝神麯五味子龍眼肉又陽明為陽盛之經虛則寒栗少陰為相火之宅虛則火升咽喉燥痛耳鳴顴赤所由來也至於腹中撑脹雖為肝旺亦屬脾衰心跳少寐咳嗽短氣心營肺衛俱虛矣虛者補之是為大法虛不受補謂之逆候古有明訓後人莫得異議黨參懷山藥神麯元參白芍茯神大生地棗仁陳皮侯病已兩月外皮不熱而脈微數急是里有熱也裡熱屬陰虛非關表邪並無頭痛惡寒愈散其邪愈虛其表故反增咳嗽也若謂濕熱亦似是而非夫濕熱蘊於中焦必有胸痞噁心見症此證無之其非濕熱明矣近來數日腹中不和大便溏且以和中為主兼理其脾肺再商治本可耳黨參茯苓木香廣皮砂仁冬朮神麯川貝款冬花又和補相投諸恙俱減惟脈數未靜究屬元氣真陰虧損但前之補在肺脾再參入腎藥兼養其陰以觀動靜黨參冬朮白芍穭豆皮蓮肉首烏歸身茯苓沙苑子穀芽丁營陰虛則風陽易逆脾胃弱則肝木易橫心嘈頭眩耳鳴液涸陽升之兆腹脹脘痞厭食脾虛氣滯之愆今吐瀉之餘實系肝強脾弱宗越人肝病緩中論治人參茯苓冬朮竹茹麥冬半夏陳皮橘葉刺蒺藜雞子黃拌炒薛陰虧營損風木之臟失涵木勝風淫倉廩之官受制是以頭痛肢麻腹滿噯氣心跳少寐掌熱腰痠等症見也所慮水土俱弱肝木獨強強者難於驟服弱者宜急扶持今再益營陰以撫綏之實倉廩以堵御之佐金氣以制治之亦剿撫兼行之法也大生地歸身白芍穀芽懷山藥潞黨參神麯茯神陳皮刺蒺藜紅棗川連吳萸炒張氣虛則脾弱肝強侮其所勝食即飽脹腹中氣衝作泄也扶土泄木一定法程炙甘草防風根砂仁陳皮冬朮川朴五分煎汁拌炒焦神麯茯苓炮薑白芍吳萸三分煎汁拌炒薛便泄半載脾腎兩虧脈沉細澀陰陽並弱陽萎不舉精傷特甚面白無華氣虛已極足跗浮腫陽虛濕注於下納食噯氣胃虛氣逆於中調治之方自宜脾腎雙補陰陽並顧然剛熱補陽恐劫其陰滋膩補陰恐妨其胃刻下節屆清明木旺土衰之候脾者土也腎屬坎水一陽藏於二陰之中當於補土中兼顧腎臟陰陽為是懷山藥炮薑炙甘草黨參五味子菟絲子砂仁茯苓冬朮鹿角霜如不效黨參換人參鹿角霜換鹿茸復脾腎雙補略見小效今腹中鳴響氣向下墜屬脾虛氣陷舌心光紅脈沉細數為腎臟陰傷用補中升陽法高麗參懷山藥冬朮炙甘草肉果五味子陳皮菟絲子沙苑子川斷鹿角霜白芍丁養心營以濟腎陰清肝熱以安相火生地茯神丹皮黑山梔穭豆衣棗仁麥冬北沙參五味子吳氣血兩虛心跳頭眩肝鬱不舒胸中痞脹用景嶽逍遙飲參入丹溪左金丸大熟地香附當歸陳皮白芍茯神棗仁砂仁白朮吳萸炒川連淵按熟地恐礙膈頭眩屬痰阻中脘最多馮夜涼晝熱熱在上午此東垣所謂勞倦傷脾也上午熱屬氣虛用補中益氣湯補氣升陽補中益氣湯加神麯茯苓李病將半載寒熱淹纏前方補營兼以疏郁心悸腹脹仍然茲更便溏足腫是脾氣虛弱也脈緩無力當補其脾進歸脾加減法防風根黨參黃耆冬朮茯苓大腹皮歸身白芍棗仁木香荷葉蒂淵按可參與桂枝薑棗趙心腎虛而不交脾肝虛而不調內風上擾頭眩心跳中土式微不寐納少交濟坎離須借戊己以為媒欲平肝風亦宜培土黨參歸身白芍冬朮茯神遠志棗仁神麯沙苑子錢心脾營陰內虧肝膽風火上逆內熱頭眩項間結核脈虛形弱治以養營然病由內生不易速效大生地洋參元參歸身白芍石決明茯神嫩鉤鉤穭豆衣香附廣皮川貝十大功勞汪腎水不足君火上炎相火下熾心中如燔舌光如柿陽事易舉陰精易泄擬清君以制相益腎以潛陽所慮酷暑炎蒸亢陽為害耳川連淡芩黃柏阿膠甘草大生地雞子黃一枚攪和沖服另雞子一個破頭納大黃三分蒸熟每日服一個又投鹹苦堅陰降火以制亢陽心中之燔灼舌色之光紅已減三分之一然上午之身熱如燎者未退幸納食頗增苦寒可進再望轉機為吉川連大生地淡芩元參蛤殼阿膠元精石甘草雞子黃一枚沖服又舌乾紅知飢善食水虧陽亢土燥於中鹹苦堅陰之劑雖衰其燔亢之勢未能盡除其焰猶畏炎暑濕熱相火蒸騰復入清中固下仍不出鹹苦之例洋參甘草川連生石膏蛤殼知母麥冬阿膠大生地黃柏末豬膽汁丸三錢每朝開水送下一錢淵按胃氣未敗可任苦寒咸潤直折其炎上之火然亦須防胃敗虛損之所以難治者大都如此金骨胳瘦小先天元氣不足夏秋寒熱至今不已脈細數弱氣血兩虧頭不痛而但身疼或口沃清水此胃氣虛寒也當商溫補仿東垣法黨參茯苓陳皮桂枝柴胡黃耆半夏神麯當歸乾薑砂仁淵按中氣虛寒少陽膽木之氣抑遏故寒熱糾纏升陽益胃湯恰合尤妙在加乾薑又補中益胃溫衛氣開腠理諸恙皆減仍從前法前方去神麯乾薑加白朮白芍張勞碌內傷脾倦怠而無力凜凜畏寒頻淅淅盜汗出咳多痰帶紅食少身無熱土衰金不生衛虛營不攝延來半載余勞損難調適炙甘草當歸白芍冬朮黨參懷山藥黃耆麥冬茯神五味子紅棗淵按此非勞倦傷中乃勞損傷精也所因不同見證亦異勿得混治又益元氣補脾土土旺而金自生氣足而力自足前方去甘草加陳皮生熟穀芽陳先後天俱不足痰多鼻血陰虧陽亢之徵納少腹疼土衰木橫之兆是以年將弱冠猶然幼稚之形面白無華具見精神之乏治先天當求精血之屬培後天須參穀食之方黨參茯苓冬朮陳皮黑芝麻懷山藥白扁豆炙甘草砂仁建蓮肉粳米上藥為末米飲湯調服加白糖少許棗湯調服亦可附丸方精不足者補之以味當求精血之屬治其腎也熟地菟絲子牛膝白芍鹿角霜山藥五味子歸身川柏杜仲茯苓甘杞子澤瀉天冬龜板丹皮山萸肉上為末用鮮紫河車一具洗淨煮爛將上藥末杵和為丸如梧子大每朝鹽花湯送下三錢溫衛氣虛則灑灑惡寒營氣虛則蒸蒸發熱營衛並出中焦總以脾胃為主補脾胃則金有所恃不必治肝而肝自馴矣黨參冬朮當歸川貝玫瑰花黃耆茯苓白芍陳皮某咳嗽發熱日久前投補益脾胃之藥六七劑穀食加增起居略健但熱勢每交寅卯而盛乃少陽旺時也少陽屬膽與肝相為表裡肝膽有鬱熱戕伐生生之氣肺金失其清肅脾胃失其轉輸相火日益熾陰津日益涸燎原之勢不至涸竭不止也其脈弦數者肝膽鬱熱之候也刻下初交夏令趁其胃旺加餐擬進酸苦益陰和陽清徹肝膽之鬱熱考古有柴前梅連散頗有深意柴胡豬膽汁浸炒白芍烏梅黨參炙甘草淡秋石前胡麥冬川連薤白頭徐肺脾兩虛心營虧損咳嗽氣塞骨蒸夜熱脈形軟數面白無華勞損根深夏至防劇懷山藥茯苓棗仁川貝黨參五味子扁豆苡仁款冬花橘餅又脈軟數為氣虛骨蒸心跳為血虛咳嗽頭眩面色萎黃脾肺兩虛之候也黨參扁豆陳皮五味子款冬花茯苓棗仁川貝炙甘草紅棗奚陽虛生外寒陰虛生內熱熱氣熏於肺則咳嗽咳久則音啞肺遺熱於大腸則肛門結瘍皆陰虛之為病也至於陽虛之説一則衛外之陽一則胃中之陽惟胃中陽虛嘔酸水痰涎症成勞損今當扶土生金黨參五味子川貝半夏金石斛茯苓麥冬扁豆陳皮炮薑地骨皮十大功勞又投扶土生金法穀食反減夜熱增重乃胃陰失降虛陽外浮也夫脾宜升則健胃宜降則和胃為陽土生肺金今診左脈數疾為心肝陽亢之象肝火戕胃心火爍金宜其食減熱增夏令防劇金石斛黨參穀芽陳皮川貝石決明川連麥冬半夏沙參五味子茯苓又前方退心肝之火養肺胃之陰其熱稍減而咳未平然此為肺虛而咳本非易治之症再從前法加減黨參川貝桑白皮五味子沙參麥冬炙甘草地骨皮石決明粳米又咳嗽內熱俱減惟脈之細數不退仍為可慮黨參地骨皮茯苓白芍川貝麥冬五味子沙參炙甘草每晨服八仙長壽丸三錢開水送張左寸關搏指心肝之陽亢右關小緊脾胃虛寒是以腹中常痛大便不實病延四月身有微熱是屬虛陽外浮近增口舌碎痛亦屬虛火上炎津液消灼勞損何疑當以溫中為主稍佐清上俾土厚則火斂金旺則水生黨參炮薑麥冬茯苓炙甘草白朮五味子燈心淵按坤土不能坐鎮中宮虛陽因而上浮未可以口舌碎痛輒進清降腹痛便溏脾土虛寒已著不得不溫矣王病後胃氣不醒脘腹飽脹近增寒熱噁心痰升氣逆咳嗆口乾阻塞咽嗌大便艱難小便短澀左脅有塊大如覆杯撑攻作痛此因脾胃不足肝木亢逆清氣不升濁氣不降攻消克伐元氣愈傷納穀大減津液日枯虛火內熾戕及肺胃漸見火升顴赤脈數內熱之象當成勞損宜以扶土為主升清降濁佐以瀉火清金俾得中氣安和自然飽脹漸解黨參升麻川連懷山藥延胡茯苓柴胡白芍杏仁枳殼通草陳皮半夏川楝子蘇梗薔薇露枇杷葉淵按痰升氣逆咳嗆雖有寒熱升柴不可用因攻克而元傷胃減仍以連楝苦寒延枳破氣元乃矛盾欲望中氣安和其可得乎法雖從東垣得來但東垣不是如此用法用古人方須會其意若徒襲其貌適為所誤耳楊先咳嗽而四肢無力肺脾兩虛加以怒動肝木侮脾土益受戕脘腹胸脅撑攻曾經吐血乃心火乘胃胃中瘀血上溢大便溏薄每月必發寒熱數次姑擬扶土生金佐以平木異功散加白芍川貝麥冬神麯川連吳萸炒川朴沉香五味子淵按乃土虛木橫而脹也川連川朴益其脹耳又就脈數內熱咳嗽脘脅仍痛而論乃陰虛肝鬱成熱肺失清肅仍防吐血北沙參陳皮川貝延胡白芍金鈴子茯苓丹皮橘餅麥冬藕汁沖服朱陰虛肝鬱鬱火刑金咳嗽痰中帶血乳房頸間皆結癧痰心空嘈雜頭眩目花腰痠腿軟勞損之根治主養陰佐以化痰大生地歸身白芍阿膠茯神穭豆衣玉竹香附棗仁沙參石決明丹皮紫菀川貝鉤鉤女貞子藕節橘葉紅棗王脾虛氣陷肛門先發外瘍瘍潰之後大便作瀉迄今一月有餘自云下部畏冷而兩脈弦硬不柔此謂牢脈症屬陰虛法以溫中扶土升陽化濕黨參防風根炮薑陳皮冬朮川芎補故紙砂仁神麯四神丸一兩資生丸二兩和服日三錢開水送淵按雖從陰虛而起目前脾虛陽弱不得不先治之馮病延半載骨蒸不已鼻血時流周身骨痛營陰大虧虛火內亢脈沉搏數口燥渴飲勞損根深入夏防劇擬滋少陰清陽明大生地知母元參地骨皮鱉甲胡黃連石膏黨參炙甘草麥冬佩蘭葉丁營陰內虧頭眩心嘈下午微寒內熱能食無力胃中有熱則消穀脾虛氣弱則無力也黨參沙苑子茯苓川連棗仁知母女貞子白芍冬朮麥冬竹茹王左脈空大腎水虧也倦怠無力脾氣弱也食少則陰虛陰虛生內熱症屬內傷補中益氣加黑山梔白芍朝服六味丸四錢淵按陰虛有二有營中之陰虛有腎中之陰虛營陰虛故從東垣若六味地黃則治腎陰虛徐二月間吐痰帶血血止之後略兼乾咳交清明節咳嗽漸甚四月初身加發熱今診脈細數形容消瘦行動氣升此屬腎氣先虧於下復因勞碌感邪延綿不已慮成勞損靜養為佳阿膠牛蒡子炙甘草茯苓杏仁川貝款冬花元沙參蛤殼枇杷葉孫久有咳嗽血痰之恙今復肛門結瘍是肺遺熱於大腸脈數音啞勞損之根時當夏令火旺金衰頗有氣逆血沸之慮沙參地骨皮阿膠白芍麥冬杏仁白扁豆川貝枇杷葉丹皮白蜜二匙藥汁調服高脈沉取數其陰內虧其熱在裡勞損之候症見咳吐白痰心腹不時疼痛痛則氣滿得矢氣則稍寬病兼肝鬱據云咳嗽已及三年初無身熱則病從痰飲而始宜從痰飲氣鬱例治之法半夏炙甘草桂木茯苓冬朮陳皮川貝神麯歸身丹皮白芍香附沉香橘餅又痰飲咳嗽發熱肺腎兩虧濕熱不化用苓桂術甘合二陳治其肺脾都氣丸兼治其腎可也苓桂朮甘湯合二陳加沉香杏仁川貝都氣丸四錢鹽花湯送下石行動短氣而喘頭眩心跳得食則脹肝腎虛而氣不納脾胃虛而氣不運用補中益氣送下六味丸補中益氣湯加茯神半夏神麯砂仁煎湯送六味丸四錢某費心太過中氣不足濕熱內蘊咽下至胸常若空空行動無力臀發濕瘡宜自安逸防其心跳頭眩冬朮半夏茯苓陳皮歸身砂仁黨參香附苡仁萆薢桑枝趙脈沉數手足冷胸悶食少脾胃衰弱大便乾燥者腸中之津液枯也法當溫中土潤大腸仿菟絲子丸加減吳茱萸淡蓯蓉花檳榔懷牛膝砂仁柏子仁川熟附陳皮菟絲子茯苓懷山藥淵按檳榔一味取其沉降直達下焦引領辛潤諸藥至大腸耳非欲其破滯氣也又前方加火麻仁郁李仁當歸穆思慮傷脾之營勞碌傷脾之氣歸脾湯補脾之營也補中益氣湯補脾之氣也今將二方併合服之黨參黃耆冬朮茯神歸身炙甘草砂仁棗仁升麻柴胡製半夏木香陳皮薛腎氣虛逆非滋不納脾弱運遲滋則呆滯然則如何而可曰補腎之陽即可以轉運脾氣從仲景腎氣丸化裁大熟地附子三分炒五味子茯苓懷山藥肉桂心麥冬元米炒牛膝鹽水炒山萸肉陳皮紫石英補故紙鹽水炒胡桃肉丁病本陽虛土弱而乏生生之氣故脾胃大憊時當夏暑溫藥難投補脾雖不若補腎然酷暑鬱蒸濕熱用事不若補脾胃為穩高麗參陳皮冬朮炮薑茯苓白扁豆益智仁穀芽羊病本陰虛時當酷暑潮熱乾咳漸入損途養陰冀其退熱然藥宜輕不宜重恐過滋反傷脾胃也健脾可以加餐然亦不宜燥恐燥則劫爍肺陰也姑擬一方備正生洋參白扁豆五味子丹皮麥冬肉地骨皮生苡仁懷山藥沙參茯苓枇杷葉奚黃昏咳嗽肺熱也黎明氣升腎虛也納食倒飽脾虛也補腎納氣治其下清金化痰治其上運脾培土治其中三焦並治大生地沙苑子麥冬川貝茯苓懷山藥六神麯沙參牛膝枇把葉馮久咳痰稠上午發熱面色青黃左脈細數右脈軟弱病屬上損幸大便不溏尚未過中及下加謹調養交夏至節無變再議黨參炙甘草懷山藥麥冬五味子青蒿酒炒白芍桂枝三分拌炒川貝茯苓白扁豆棗仁煨生薑又咳嗽脈細數前上午發熱今下午亦熱陰氣漸傷大便間或帶血脾氣虛也從景嶽理陰煎例扶過夏至節一陰來復病無增變庶幾可延四君子湯合生脈散加生地懷山藥白芍白扁豆川貝阿膠紅棗趙漏瘍日久陰津暗滲加以咳嗽氣耗考試勞神於是咳甚氣升便溏內熱音啞喉痛等等接踵而至脈象細數已成勞損夫精氣神為人身三寶一有所傷便為大患況三者皆虛乎敢謝不敏幸熟察焉沙參甜杏仁麥冬元米炒生甘草川貝茯苓白扁豆懷山藥十大功勞童年已十七天癸未通骨胳瘦小先天不足也不時鼻衄虛火上炎也腹痛綿綿中虛木橫也曾見蛔蟲木橫則蟲動也此屬童損先天不足之症以後天補之難矣茯苓懷山藥陳皮當歸茜草炭烏藥冬朮白芍丹皮川椒烏賊骨廉腎陰虛而氣升喘逆心陰虛而心跳少寐胃氣虛而痰飲留戀肝風動而頭眩震掉腸液枯而大便堅干經云腎苦燥急食辛以潤之心苦緩急食酸以收之肝苦急急食甘以緩之腸胃津枯當滋氣血擬都氣丸意大生地蛤粉炒茯神辰砂拌半夏炙甘草五味子沉香柏子仁石決明懷山藥麥冬西洋參李陰虧於下氣逆於上抑塞於中煎熬津液氣急痰凝病成煎厥本屬為難而藥必清滋效非容易所慮酷暑將臨外受炎蒸之熱內無寧靜之期則有甚加劇耳鮮生地棗仁豬膽汁炒元參茯神牡蠣女貞子石決明羚羊角遠志甘草湯制竹茹淵按煎厥證內經述之世不多見大抵水虧木燥肝家風陽挾痰上擾阻氣機塞竅隧與肝風痰火有同類耳朱心跳少寐是血虛也氣攻作脹是肝虛也頭眩筋惕是肝風也食少便溏是脾虛也平肝氣熄肝風養營陰補脾土是其治也制香附青陳皮茯苓赤白各半歸身白芍沙苑子制首烏神麯砂仁薑棗倪據述有時驚悸有時肌肉頑木或一日溏泄數次或數日一大便堅干難出惟小便常紅此心氣鬱結脾氣失運失運則生濕鬱結則聚火火則耗精濕則阻氣而氣機不利矣擬荊公妙香散加味補益心脾通達氣機立法西洋參黃耆茯神桔梗遠志懷山藥麝香調服辰砂木香川連鹽水炒炙甘草麥冬元米炒共為末藿香陳皮湯泛丸每朝三錢開水送下徐昔立齋治病每定一方令人服數十劑非心精識果烏能如此然非病家信之真任之專亦烏能如此林也不才何敢妄希前哲然審病既的藥當不謬從此加鞭以圖進益天冬麥冬生地熟地懷山藥沙參茯神棗仁牡蠣白芍洋參阿膠紅棗浮麥此婦年三十四五從未生育因驚恐患怔忡頭昏耳鳴火升發熱汗出食少便堅將及百日服此方三十帖見效即將此方加重煎膏常服幾及一年全愈後生一子謝汗多表虛便泄裡虛腹痛中虛氣升腎虛經停肝虛多夢神虛三焦皆病五臟無一不虛姑擬培土為主以土為萬物之母也黨參冬朮茯苓沙苑子懷山藥白芍棗仁陳皮五味子白扁豆丹皮紅棗浮麥淵按五臟皆虛獨治後天脾胃誠為扼要然便泄腹痛宜少佐溫脾更妙以陽虛甚於陰虛也仁淵曰此編集痰飲咳嗽五臟陰陽偏虛之證非盡屬虛勞也若虛勞證經謂有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱言努力勞倦傷其中氣致中氣衰少不能布化水穀肺經治節不行熱氣蘊於胸中不得發越而生內熱乃傷脾胃氤氳之氣也治曰勞者溫之金匱曰男子平人脈大為勞極虛亦為勞遺精失血盜汗勞之病也治以桂枝龍牡小建中黃耆建中等湯即祖內經勞者溫之之法巠巠相傳後人莫得異議然余竊有疑焉蓋內經之所謂勞乃勞傷其中氣也故以酸甘溫煦之藥溫之補之使衛旺生營脾胃陰陽之氣有所依賴則虛可補勞可復若金匱則相火旺而遺精陰精虛而火升失血熱蒸於營而盜汗亦用甘酸溫煦以養之一則傷其中氣一則損其精血病不同而治則同此何故也近世治法於勞倦傷中者祖仲景東垣於遺精失血者不敢祖桂枝建中等法都從事於朱丹溪葛可久滋陰之法亦始效而終不效良以苦寒滋降能平炎上之火易傷中焦之氣胃氣一傷百藥莫治故越人有上損及中下損及中皆不可治之説然則丹溪可久既不可恃金匱方究竟可用否曰仲景為千古醫祖非貽誤後人者若內傷勞倦於仲景東垣法不得異議若遺精失血自元明後諸賢無敢用其方者誠以相火方炎陰血上溢投以剛熱恐益其勢耳昔人聰明才智豈遜於今必有試而不合者矣議者多疵丹溪余則不敢出違心之論蓋滋降之法可暫用不可久用審其胃氣元氣可任暫投以平炎上之火止其逆流之血亦治之必須否則溫既助火涼則傷中日從事於輕描淡寫坐以待斃亦何取乎俟血止火降後以甘平味厚固精納氣之藥以補養之經曰損者益之精不足者補之以味難經曰損其腎者益其精損其肺者養其氣病傷精氣者仍從精氣求之庶於病情有益耳吐血門葉血止咳不已脈沉帶數其根猶未去也蓋氣猶風也血猶水也咳則氣逆不順血亦逆而不順矣經絡不和血不寧靜必降其氣而後血不復升亦必充其陰而後火乃退耳大生地紫菀丹皮川貝赤苓元精石甜杏仁沙參赤芍枇杷葉淵按此喻妙極從內經天暑地熱悟會得來尤血止乾咳陰虛也急以生津救肺沙參丹皮麥冬茯神五味子桑白皮蛤殼川貝鮮藕甜杏仁侯脈數血湧胃氣大虛胸中痞塞大便帶溏是痞為虛痞數為虛數咳血三月今忽沖溢唇白麵青斷非實火大凡實火吐血宜清宜降虛火吐血宜補宜和古人謂見痰休治痰見血休治血血久不止宜胃藥收功今援引此例人參一錢白扁豆一兩川貝三錢茯苓三錢藕汁一杯沖好墨汁三匙沖又脈數退血少止而反惡寒汗出蓋血脫則氣無所依氣屬陽主外衛虛則不固也最怕喘厄暴脫猶幸胸痞已寬稍能容納仿血脫益氣例經曰陽生陰長是之謂耳人參炒扁豆五味子炙甘草炮薑炭懷山藥藕汁又血脫益氣前賢成法今血雖大止而神氣益憊唇白麵青怕其虛脫欲牢根底更進一層人參炮薑陳皮大熟地砂仁拌炒麥冬冬朮炒扁豆五味子附子秋石湯制灶心黃土煎湯代水又肝腎之氣從下泛上青黑之色見於面部陰陽離散交子丑時防脫勉擬鎮攝希冀萬一人參大熟地紫石英五味子麥冬肉桂茯苓青鉛坎氣又血止三日痰吐如汙泥且臭是胃氣大傷肺氣敗壞而成肺痿痿者萎也如草木萎而不振終屬勞損沉疴外臺引用炙甘草湯取其益氣生津以救肺之枯萎後人用其方恆去薑桂之辛熱此症面青不渴正宜溫以扶陽但大便溏薄除去麻仁可耳人參炙甘草麥冬阿膠大生地炮薑五味子肉桂紫石英又病勢仍然從前方加減前方去炮薑加制洋參又連進炙甘草湯病情大有起色但咳嗆則汗出肺氣耗散矣散者收之不宜再兼辛熱當參收斂之品人參大熟地沉香末拌炒炙甘草阿膠五味子黃耆粟殼大棗淵按如此險證一絲不亂景嶽所謂非常之病非非常之醫不能治某久咳失血精氣互傷連進滋補頗獲小效但血去過多驟難充復從來血症肺腎兩虛者宜冬不宜夏蓋酷暑炎蒸有水涸金銷之慮今交仲夏宜日餌生津益氣大滋金水之虛兼扶胃土則金有所恃且精氣注成於水穀久病以胃氣為要也制洋參大熟地麥冬黃耆懷山藥大生地五味子茯苓陳皮炙甘草白扁豆黨參又血止胃稍醒仍守前法前方加粟殼蜜炙另用白芨一味為丸每朝服三錢朱中氣素虛兼患痰飲冬必咳嗽近勞碌感寒忽氣升吐血微寒發熱汗則心嘈其血必三日一來寒熱亦三日一作蓋熱邪內熾逼血上行病在三陰之樞恐其下厥上竭沖溢喘脫麻黃西洋參白芍麥冬五味子歸身炙甘草黃耆川貝荊芥炭茅根藕汁淵按汗出心嘈營陰虛矣麻黃總屬不宜邢先天不足之體曾發虛痰潰而將斂交春陽氣升發漸覺喉癢咳嗽二三日來忽然吐血今又大吐血色鮮紅診脈細促心嘈若飢一團虛火炎炎莫御用藥雖已清降亦當預顧真陰否則恐血脫陰傷而暈生地沙參丹皮炭茜草炭小薊炭阿膠麥冬五味子朱茯神京墨汁三匙童便一杯沖又照前方加川貝茅根又節屆春分陽氣勃勃升動血證際此稍平復盛良以身中之肝陽應天時之陽氣上升無制故又忽然大吐急當休養其陰兼以清降所恐火愈降而陰愈傷耳羚羊角元參鮮生地丹皮大生地茯神麥冬阿膠茜草炭石決明側柏葉汁茅根藕汁淵按降火滋陰亦不得不然之勢張陰虛內熱咳嗽痰紅脈數無神漸延勞損沙參白芍川貝丹皮白扁豆麥冬甜杏仁茯神丹參茜草炭百合一兩煎湯代水吳血色紫而有塊此屬肝火乘胃瘀凝上泛也仿繆仲醇法阿膠蒲黃炒丹皮白芍蘇子鮮石斛降香大黃醋炒成炭藕汁黑山梔白扁豆枇杷葉程咳嗽而至於失血音啞津液枯稿勞損成矣脈形細弱精氣內虧內經於針藥所莫治者調以甘藥金匱遵之而立黃耆建中湯急建其中氣俾飲食增津氣旺陽生陰長而復其真陰之虛蓋舍此別無良法也今仿其意而損益之黃耆秋石三分化水拌炙焦茯神白芍麥冬川貝生甘草炙甘草玉竹沙參橘餅顧酒客濕熱熏蒸肺受火刑而失清肅之令咳嗽音啞吐血痰紅喉痹乾燥是皆肺火見證尚非全屬陰虛雖然火亢不息久必傷陰究宜戒酒為上治以清肅高源兼養胃陰為法沙參甜杏仁丹皮元參山梔川貝茜草炭雞距子藕汁茅根某始由寒飲咳嗽繼而化火動血一二年來血證屢止屢發而咳嗽不已脈弦形瘦飲邪未去陰血已虧安靜則咳甚勞動則氣升蓋靜則屬陰飲邪由陰生也動則屬陽氣升由火動也陰虛痰飲四字顯然擬金水六君同都氣丸法補腎之陰以納氣化胃之痰以蠲飲飲去則咳自減氣納則火不升大生地海浮石拌炒半夏青鹽制麥冬元米炒五味子炒紫石英煅丹皮炒成炭牛膝鹽水炒懷山藥炒蛤殼打訶子茯苓青鉛枇杷葉蜜炙淵按咳血一證非盡由陰虛若痰飲久咳乃胃絡受傷胃氣不降血從氣逆而來治痰飲降胃氣血自止矣徒事滋陰恐氣愈逆而血愈多也範脈虛數兩尺愈虛心肝脾胃俱受其病惟腎獨虛心肝火亢肺胃受戕痰由濕生血隨氣逆咳嗽黃痰帶血掌中覺熱法宜養腎之陰以清心肝之火而肅肺胃之氣大生地海浮石拌丹皮炭沙參川貝白扁豆甜杏仁茜草炭生苡仁阿膠米粉炒茯苓藕節枇杷葉顧頭痛嘔血皆在上午陽經之火無疑法以清降犀角羚羊角麥冬石決明生石膏知母丹皮炒焦竹葉鉤鉤又清泄陽明之火頭痛已減仍用前法羚羊角元參生石膏麥冬澤瀉知母石決明淡芩生甘草許形寒飲冷則傷肺兩寒相感中外皆傷故氣逆而咳嗽也咳而欲嘔曰胃咳加以用力勞動陽絡受傷痰中帶血久而不已易入損門旋覆花代赭石杏仁丹皮鬱金半夏曲款冬花橘紅紫菀茯苓枇杷葉某咳嗽吐血晡熱便溏腹中有塊攻痛肺腎陰傷脾陽復弱肝木橫於中矣飲食少納倉廩空虛心如懸罄何恃不恐黨參白芍吳萸三分拌炒懷山藥棗仁新會皮川貝款冬花丹皮炒焦茯神沙苑子生穀芽某飢飽勞傷其病在胃胃為多氣多血之鄉胃傷則血從吐出擬和胃降氣化瘀法沙參生苡仁丹皮炒焦茜草炭杏仁鬱金炙甘草桃仁泥白扁豆茯苓藕節某咳嗽成勞最難治十藥神書傳葛氏生津順氣化痰濁補血安神分次第病經一載元氣虧節屆春分恐危殆安穀則昌古所言姑擬一方補脾胃玉竹懷山藥生苡仁白扁豆川貝茯苓甜杏仁款冬花生穀芽沙參朱操勞思慮陰津元氣內虧脾失運而生痰肺失降而為咳痰中帶紅時生內熱勞損之根勿得輕視大熟地川貝生苡仁懷山藥丹皮炒焦甜杏仁麥冬茯神半夏枇杷葉呂脈數左寸獨鋭心經有火吐血不止法宜清養犀角鮮生地淡芩阿膠蒲黃炒丹皮炒焦山梔杏仁茜草炭茅根藕節龐去秋咳嗽些微帶血已經調治而痊交春吐血甚多咳嗽至今不止更兼寒熱朝輕晡甚飲食少納頭汗不休真陰大虧虛陽上亢肺金受爍脾胃傷戕津液日益耗元氣日益損脈沉細澀口膩而干虛極成勞難為力矣姑擬生脈六君子湯保肺清金調元益氣扶過夏令再議生洋參沙參麥冬五味子白扁豆製半夏茯神陳皮炙甘草枇杷露一小杯沖服野薔薇露各一小杯沖服生脈散保肺清金六君子去朮嫌其燥加扁豆培養脾陰土旺自能生金也不用養陰退熱之藥一恐滋則膩腸一恐涼則妨胃耳從來久病總以胃氣為本經云有胃則生此其道也雷久咳帶血今又音啞咽痛此怒動肝火肺失清肅所謂金破不鳴宜培土生金稍佐降火沙參甜杏仁白扁豆元參茯苓桔梗生苡仁蟬衣川貝玉竹白蜜豬板油同蜜煬化沖服薛吐血鼻血牙血發斑斑中出血陽明之火極熾而腹滿濡軟少陰之氣不運病已三月血有間斷有瘀血在腹中故也食少身熱脈數其陰已虛擬養陰化瘀清胃和中大生地五靈脂醋炒歸身炭犀角白芍炮薑炭茜草炭茯苓丹皮炭焦山梔荊芥炭延胡索醋炒陳皮鹽水炒鮮藕又血上下溢責之中虛而邪復擾之血去既多餘熱上熾鼻血時流便血時下中州之擾猶未已也安中州清熱邪理中湯加味治之西洋參元米制白朮炭牛膝炭黃芩炙甘草茜草炭丹皮炭炮薑炭赤苓百草霜伏龍肝淵按脾陰虛而伏熱擾血分黑歸脾黑地黃最合某吐血時發時止陽絡受傷或夾瘀凝而然不足慮也血止之後喉癢乾咳卻不相宜夫乾咳則氣熱而火動火動則難免其血之不來倘加內熱易入損途刻下胃納甚少先議養胃陰一法川石斛丹皮鬱金茯苓炙甘草生苡仁麥冬沙參川貝白扁豆鮮藕薛痰飲久咳咳傷肺絡失血脈不數舌苔白不必過清但順氣化痰氣順則血自歸經痰化則咳嗽可止蘇子杏仁川貝茜草炭鬱金桑白皮丹皮蛤殼冬瓜子藕節枇杷葉淵按非但不可過清直不宜清耳仲景云痰飲須以溫藥和之可謂要言不繁華咳嗽內傷經絡吐血甚多脈不數身不熱口不渴切勿見血投涼法當益胃擬理中加味黨參元米炒白扁豆炒焦炙甘草炮薑白芍歸身炭血餘炭丹皮炭杏仁藕節陳粳米李傷酒吐血血出於胃雖屬無妨其陰久虧擬和胃降火法鮮石斛川貝丹皮白扁豆茯苓山梔白芍沙參炙甘草元參茅根鮮藕錢內則陰虛有火外則寒邪深襲失血咳嗽又兼三瘧病已數月瘧來心口痠痛胸腹空豁難過經云陽維為病苦寒熱陰維為病苦心痛此陰陽營衛之偏虛也擬黃耆建中法和中臟之陰陽而調營衛復合生脈保肺之陰復脈保腎之陰通盤合局頭頭是道矣歸身炭炙甘草大生地砂仁炒五味子鱉甲黃耆青蒿沙參白芍桂技三分拌炒阿膠麥冬煨生薑紅棗淵按三瘧寒熱並非陽維為病心口痠痛難過乃胃有寒痰肝有蘊熱肺胃失順降之常再襲寒邪而咳血矣膩補之方恐不相合殷肝胃不和脘痛嘔酸兼以酒濕熏蒸於胃胃為多氣多血之鄉故吐出瘀血甚多血止之後仍脘中作脹嘔吐酸水法宜調和肝胃切戒寒涼製半夏陳皮鬱金烏藥桃仁泥炮薑炭延胡茯苓香附雞距子蘇梗孫熱在中脘部分時吐紅痰帶臭不甚咳嗽病在於胃留熱伏於中宮法當清泄犀角冬瓜子射干當歸桃仁苡仁元明粉川貝連翹大黃酒浸炒金銀花又不咳嗽但吐紅痰如膿自覺灼熱在胃脘之中將及二月此非肺癰乃瘀傷濕熱留胃中故也當以清化川貝冬瓜子當歸苡仁沙參連翹川石斛金銀花赤豆蘆根郁歷春夏秋血症屢發診脈虛弱形容清瘦年方十七精未充而早泄陰失守而火升異日難名之疾恐應褚氏之言治宜滋水降火須自保養為要大生地生洋參丹皮炭茯神白扁豆炒焦懷山藥茜草炭阿膠蒲黃炒麥冬茅根蓮肉鮮藕仁淵曰少年咳血多起於遺精遺精多由於妄想夫男子二八精道通情欲念起起而不遂則相火時動動而不已致精關不得閉固則夢交精滑陰精下虛相火上炎迫其血府咯血之症生焉中年之輩由勞碌傷陰陰氣內虛最易怒動肝火火迫其血血遂上溢始也咯血不咳嗽既而胃氣失降肺臟為相火煽灼或稍感微邪漸增咳嗽勞損成矣夫咯血易治咳嗽難醫所以然者咯血為火炎迫血氣逆血溢尋其源而清之降之養之和之或不因火迫而吐者亦隨其證而調之無有不止者若咳嗽則下焦陰氣既虛胃氣逆而肺氣亦耗陰火時時上炎肺無寧靜之日愈咳愈傷愈傷愈咳不至水涸金枯土敗不已故咯血證一加咳嗽十死八九亦有先咳嗽而後帶血者此先損其肺後及其腎也其寒熱者營衛虛而金火相爭也盜汗者肺氣虛而衛不固營為熱迫也咽痛者肺陰枯而虛火上衝便溏者脾不守而金絶土敗死期至矣即越人上損下損及中不治之謂蓋後天之生生亦絶矣此論陰虛咳血則然若不由陰虛者如痰飲久咳胃氣逆而絡傷過飢過飽疾行傷其胃絡鬱熱壅於肺胃負重努力鬥毆傷絡更有婦人肝經壅熱經不順行皆有咯血嘔血證未可見血即事滋陰涼降須求其本而治之夫治血莫若順氣氣為血帥氣降而血自降氣順而血自歸經即咳嗽一證切勿沾沾治肺蓋咳雖屬肺其致咳不在肺而在腎夫腎藏精者也腎藏精虛腎氣無所依戀上衝陽明煽動肺臟胃氣逆不得降肺欲不咳安可得乎古人謂肺猶鍾也鐘不自鳴有擊之而後鳴醫者不去其鳴鐘之具而日磨沙其鍾鍾破而鳴如故此言深有至理王應震云見痰休治痰見血休治血喘生勿耗氣遺精不滲泄明得此中趣方是醫中傑當三復斯言臌脹水腫門陸經停一載有餘肝氣不時橫逆胸脘脅肋疼痛嘔吐酸水大腹日滿青筋綻露此屬血臌蓋由肝氣錯亂於中脾土受困血海凝瘀日積月大狀如懷子而實非也今病已極深藥力恐難見效川楝子丹參歸尾香附鹽水炒延胡索五靈脂酷炒陳皮砂仁紅花淡吳萸朱腫脹已退脈象較前稍大汗出至膝而止陽氣有流通之象陰濕有消化之機今以溫理中州中州得運庶幾決瀆流通寒轉為溫否轉為泰矣然須調養百日庶無反復之虞熟附子冬朮茯苓通草桂枝焦六曲牛膝陳皮澤瀉薑皮又腫脹由乎脾腎陽虛水濕偏淫通陽化濕水邪平方法原為對證面目四肢俱癟單單大腹膨脝更兼遺泄再傷陰久病恐難勝任桂枝陳皮冬瓜皮益智仁薑皮另六味丸三錢藥汁送下王濕熱素伏下焦皮膚頑癬近感風邪著腠理陡然寒熱面目上部先腫蔓延中下今大腹陰囊足脛悉腫據云陽物暴縮足冷似屬陰寒然鼻中熱氣上衝此乃陽被濕鬱氣不宣通非陽衰可比夫諸濕腫滿皆屬於脾而肺主一身氣化俾得肺氣宣通斯風與濕自然而解射干杏仁大腹皮苡仁茯苓澤瀉桑白皮冬瓜子通草絲瓜絡沉香琥珀枇杷葉淵按陽被濕遏肺氣不得宣通乃麻黃連翹赤小豆湯為的對五皮飲雖加杏仁射干恐仍不能開泄肺表復鼻頭色微黑者有水氣腹滿足浮囊腫水泛而侮土也腹中氣攻脹痛土虛則木橫也欲泄水必崇土欲平氣必疏木吳萸炒川連沉香白朮葶藶子茯苓大腹皮香附陳皮川朴澤瀉淵按中焦陽氣傷矣左金非崇土之方肺失通調膀胱不化何不用桂枝且能疏木復面黧腹腫脈沉而細此脾腎之陽不化水濕阻滯於中症防加劇姑且滲濕通陽肉桂炒白芍茯苓豬苓白朮大腹皮細辛澤瀉川朴陳皮焦六曲麥芽香櫞皮金風濕相搏一身悉腫咽痛發熱咳而脈浮擬越脾法麻杏甘石加赤苓腹皮通草復風水者在表之風邪與在裡之水濕合而為病也其症頭面肢體浮腫必兼咳嗽故為風水更兼食積其腹必滿三焦不利法當開上疏中達下治之羌活防風枳殼杏仁大腹皮川朴茯苓橘紅澤瀉萊蔔子桑皮青蔥生薑淵按羌防不如麻黃專開手太陰之風水故古人有越脾麻黃赤豆等治表實腫脹無羌防等方也細參本草自無此等雜治馮産後數十日忽發肝風心蕩不寐繼以血崩今周身浮腫氣逆不得安臥頭眩口不渴病勢夜重血虛氣勝木旺土弱也土弱不制水水反侮土土既受木克又被水侮是為重虛欲培土先補火佐以泄木即內經虛者補之盛者瀉之之義肉桂冬朮茯苓澤瀉大腹皮木香陳皮炮薑神麯通草血珀淵按溫而不燥補而不滯和養肝脾之氣以招失亡之血其脹自消秦腹脹足腫納食則脹益甚濕熱挾氣填塞太陰臌脹重症川朴赤苓大腹皮青皮澤瀉枳殼黑醜山楂炭甘遂麵包煨通草生薑復腹脹稍寬足仍浮腫運脾化濕冀其漸平川朴赤苓大腹皮川椒目蒼朮澤瀉陳皮焦六曲黑醜通草枳殼生薑淵按二方乃濕熱實脹治法三診腹滿月餘得食則脹甚兩進攻消運脾之法胃脘之脹已松大腹之滿未化再議疏通消導旋覆花五加皮赤苓澤瀉檳榔黑醜雞內金木香通草砂仁朱腹滿面黃足腫近因戽水受寒又加疝痛脾虛有濕腎虛有寒防其疝氣上攻大腹益滿平胃散去甘草加茯苓小茴香神麯吳茱萸楊脈沉小便不利面目肢體大腹陰囊悉腫病屬裡水鼻中流血喉間略痛肺家有鬱熱也擬越婢湯蜜炙麻黃杏仁甘草石膏白朮赤苓澤瀉陳皮防己淡芩復水濕侵入經絡外溢肌肉發汗利水諸法效而不愈今擬通陽滲泄五苓散加巴戟肉川朴車前子陳皮牛膝五加皮大腹皮薑皮王病後脾虛氣滯浮腫食少大便溏泄法當溫脾黨參茯苓澤瀉木香冬朮炮薑茯神神麯砂仁穀芽張痢後陽虛水濕不化腹滿面浮足腫而色青黃脈來虛細慮延臌脹重症川熟附豬苓茯苓白朮黨參上肉桂澤瀉陳皮神麯砂仁又溫通脾腎之陽疏利決瀆之氣冀其脹消腫退熟附子肉桂白朮豬苓澤瀉茯苓皮冬瓜皮川朴陳皮通草淵按兩方治半虛半實乃通陽泄水法尤脾虛木橫腹中結癖寒熱似瘧延及半載惟脾虛則營衛不和故寒熱惟肝橫則氣血凝滯故結瘕今食少便溏舌紅口渴大腹日滿足跗浮腫形肉瘦削脾腎陰陽兩傷際此火亢金衰之候火亢則陰益虛金衰則木無制深秋水土敗時慮其增劇急宜健運和中稍兼消暑喻嘉言所謂剛中柔劑能變胃而不受胃變此法是矣冀其脾胃稍醒為吉連理湯加陳皮朱時令水濕內襲與身中素有之濕熱相合驟然浮腫充斥上下三焦擬宣表瀉里之法以消其水香薷川朴通草大腹皮赤苓澤瀉杏仁滑石車前子萊蔔子葶藶子蔥白頭某痞塊由大瘧日久而結多因水飲痰涎與氣相搏而成久則塊散腹滿變為臌脹所謂癖散成臌也脈細如絲重按至骨乃見弦象是肝木乘脾也口乾小便短少是濕熱不運也匝月腹日加大急宜疏通水道泄木和中五苓散加川朴薑汁炒川連青皮陳皮大腹皮木香車前子通草附厚朴散川朴薑汁炒三錢枳殼三錢巴豆七粒合炒黃去巴豆木香曬乾研三錢青皮醋炒三錢陳皮鹽水炒三錢甘遂麵包煨三錢大戟水浸曬乾炒三錢乾薑炒黃三錢共為末每服一錢用砂仁車前子泡湯調下是治癖塊散大成臌之妙劑淵按此方誠妙但可施正氣不虛者若久病及老年氣血衰弱之人恐目前稍松轉瞬而脹益甚將不可治用者宜審慎之僧水腫自下而起腿足陰囊大腹胸膈泛濫莫御今先從上瀉下肺主一身之氣又曰水出高源古人開鬼門潔淨府雖從太陽其實不離乎肺也葶藶子杏仁川朴陳皮茯苓川椒目生薑大棗控涎丹每日服五分淵按水腫實證治法如是經云其本在腎其末在肺葶藶瀉肺椒目瀉腎控涎丹不及舟車丸合拍某暑濕伏邪挾積阻滯腸胃中州不運大腹驟滿腹中時痛痛則大便黏膩色紅如痢小水短少脈沉滑數是積之徵也擬大橘皮湯送下木香檳榔丸四苓散加橘紅大腹皮木香木通滑石砂仁末川朴煎湯送木香檳榔丸三錢又氣與水相搏大腹驟滿脈沉小便不利大便欲泄不泄法以疏氣逐水香薷大茴香澤瀉萊蔔子赤苓大戟甘遂枳殼黑白醜生薑王內有濕熱外著風邪風與水搏一身悉腫此屬風水當發汗羌活香薷陳皮防風赤芩焦六曲通草蔥白生薑某腹但脹而不滿者屬氣乃木乘脾土也川連薑汁炒香附砂仁川朴青皮焦六曲懷山藥茯苓陳皮澤瀉淵按黃連治脹乃開中州濕熱也土虛木乘之脹大非所宜陸瘧後濕熱內蘊脾胃之氣不利為口糜為腹脹姑先和中清化為法川朴川連焦六曲赤苓大腹皮枳殼澤瀉黑山梔陳皮砂仁淵按連朴此證甚合張木旺乘脾腹脹如鼓形瘦脈細症屬疸脹法當溫通淡乾薑茯苓川朴砂仁懷山藥吳茱萸陳皮澤瀉大腹皮金匱腎氣丸五錢開水送淵按虛脹治法以川朴易黨參則善陶年甫十三斷無憂鬱之理而腹滿如臌微微內熱將及兩月其義何居良以童心太甚飢飽不調冷熱不節向有胃寒嘔酸之疾今反不嘔腹漸脹大飲食不納內熱時生是非勞碌傷脾而失運寒飲停聚而腹脹也脾虛故內熱生單單腹脹名之單脹然治法不同也今以溫利中州稍佐苦泄取柔中之剛能平胃而和脾黨參茯苓半夏陳皮白芍川連吳萸炒炮薑澤瀉川朴冬瓜皮淵按飲食不節傷脾脹宜佐消導如雞金谷蟲之類孫瘡疥平面浮起漸至腹滿胸悶氣塞小便不利腫勢日甚水濕之氣一無出路證成瘡臌防加氣急發汗而利小便是兩大法門麻黃杏仁白朮澤瀉茯苓豬苓葶藶子川朴通草車前子薑皮又腫勢已平小便通利前方加減防風白朮半夏茯苓陳皮澤瀉杏仁川朴通草葶藶子車前子蔥白頭薑皮孫脾虛脹滿面浮足腫小便不利脈形細數元氣大虧慮其喘急之變黨參元米炒牛膝茯苓巴戟肉陳皮澤瀉鹽水炒車前子冬朮土炒懷山藥苡仁杞子炭生熟穀芽沈先泄瀉而後目盲服單方目明而漸腹滿是脾虛木橫又服草藥寒性傷中病成臌脹其根已久恐難驟效焦白朮冬瓜皮川朴茯苓陳皮焦六曲大腹皮澤瀉砂仁苡仁陳香櫞皮楊兩尺脈滑濕熱積滯在於下焦小便不利大腹脹滿是下焦不利中焦氣不通也肉桂赤苓豬苓白朮澤瀉大戟神麯陳皮冬瓜皮薑皮馮風水相搏一身面目悉腫咳嗽氣升不得臥症勢險重用越婢法麻黃生甘草杏仁石膏赤苓澤瀉陳皮葶藶子大腹皮生薑大紅棗又用越婢法雖得微汗手腫稍退余腫未消咳嗽氣急良由勞碌之人脾胃不足急不行運今以扶脾和中理氣宣達三焦冀其氣化流通冬朮生耆皮大腹皮防己陳皮防風茯苓皮冬瓜皮薑皮何內有濕熱生瘡外受風寒浮腫風濕相搏症成瘡臌防加喘急防風羌活杏仁大腹皮橘紅赤苓桔梗荊芥川朴桑葉通草杜風水相搏一身暴腫上則咳嗽喉有痰聲下則溏泄小便不利發汗而利小便是其大法計不出此遷延匝月節近清明天氣溫暖肺胃久蘊之風從中暗化為熱反服腎氣湯方意欲通陽化水陽未通而陰先劫水未化而火反起矣於是舌燥唇焦齒黑心煩囊縮胸腹膚紅危險之象已造極中之極勉擬清肅肺胃存陰泄熱以冀轉機為幸生石膏杏仁通草茯苓皮豆豉北沙參麥冬川貝丹皮蘆根鮮薄荷根緑豆湯代水又肺得熱而不降肝有火而上升胃居於中受肝火之沖激欲降不能而反上逆由是嘔吐不納矣昨用清金以通決瀆幸水道已通高原得清肅之令然中焦格拒艮陽失遊溢之權似宜轉運其中但肝火熾甚徒運其中無益也當清肝之亢以衰木火之威胃不受肝之克而中氣得和則嘔可以寧矣川連薑汁炒黃芩薑汁炒半夏澤瀉陳皮黑山梔竹茹薑汁炒茯苓皮川貝蘆根枇杷葉當歸龍薈丸三錢緑豆生薑湯送下淵按風水壞證也兩方應變俱佳尤瘧止之後腹脹足腫濕熱內歸太陰防成瘧臌但小便清利是屬脾虛擬厚朴溫中湯加味川朴茯苓陳皮乾薑草豆蔻木香半夏冬瓜皮薑皮廉脾有濕熱積氣漸漸腹滿足腫納食則脹證成氣臌白茯苓川朴白朮苡仁蘇梗五加皮澤瀉陳皮砂仁通草奚濕熱內阻腸胃之間橫連膜原膜原者臟腑之外肌肉之內膈膜之所舍三焦決瀆之道路邪留不去是為腫脹脹屬氣腫屬水是必理氣而疏決瀆以杜腫脹之萌黑白醜各五錢萊蔔子一兩砂仁一兩用葫蘆大者一枚將三味納入再入陳酒一大杯隔湯煎一柱香取出葫蘆中藥炒研為末再以葫蘆炙炭共研和每晨服二錢惠濕傷脾腎之陽先腰痛而後足腫脘中作痛口沃酸水用甘薑苓朮湯合五苓散加味甘草乾薑茯苓白朮豬苓澤瀉肉桂半夏陳皮通草五加皮淵按沃酸一證內經言熱東垣言寒究竟辛通藥最效又前用辛溫通陽甘淡祛濕脘痛足腫嘔酸等症皆除惟跗腫未退減其制以調之白朮茯苓澤瀉川斷苡仁牛膝陳皮通草桑白皮五加皮薛先足腫而後腹滿面浮寒濕傷於下而漸上攻也通陽化濕以利小便立法桂枝澤瀉陳皮川朴桑白皮萊蔔子五加皮茯苓皮半夏大腹皮薑皮駱瘡之濕熱與肝之氣鬱互結於裡近感風溫寒熱咳嗽驟然浮腫證屬瘡臌蘇梗杏仁川朴桔梗赤苓澤瀉枳殼橘紅大腹皮茯苓萊蔔子薑皮又濕夾熱而生瘡風合濕而為腫風從外入故寒熱而咳嗽濕自內生故腹滿而氣急用仲景麻杏苡甘湯加味麻黃杏仁苡仁甘草川朴滑石連翹淡芩枳殼萊蔔子元明粉薄荷葉共研粗末滾湯泡服又四肢面目腫退而腹滿未寬在表之風寒雖解在裡之濕熱未治今擬寬中理濕赤苓苡仁陳皮大腹皮杏仁澤瀉萊蔔子川朴通草枳殼薑皮白火炎於上水溢高原肺金受邪面紅浮腫唇鼻俱赤而有皮爛之形腹部腿足亦腫三焦俱受其病矣行步咳喘邪在手太陰無疑用吳鶴皋麥門冬湯瀉火泄水為法麥冬冬瓜皮通草薑皮桑白皮絲瓜絡枇杷葉陳粳米淵按此水腫之變證也用輕清宣化上焦所謂輕可去實範下有濕熱上受風溫初起寒熱即便周身浮腫咳嗽氣塞似與風水同例擬越婢加朮湯麻黃葶藶子半夏赤苓焦白朮桑白皮射干通草杏仁大腹皮冬瓜皮薑皮諸面腫曰風足脛腫曰水蓋風傷於上濕傷於下氣道蘊塞肺失宣降脾失轉輸上則咳喘下則溲澀中則腹滿而水腫成焉證名風水載於金匱病在肺脾法以開上疏中滲下從三焦分泄二陳湯前胡射干川朴澤瀉車前子羌活桔梗桑白皮大腹皮通草薑皮範伏邪濕熱內蘊太陰陽明身熱腹滿面浮足腫兩膝痠痛小便短少擬通經絡以解表燥濕熱以清裡羌獨活防風川朴陳皮大腹皮苡仁柴胡前胡澤瀉赤苓淵按濕熱作脹病在太陰陽明脾胃從敗毒散加減以分疏其內伏之邪既有身熱宜佐苦寒一二味泄之所謂苦辛通降甘淡分利之法也仁淵曰內經言脹者皆在臟腑之外排臟腑而郭胸脅此氣脹也其本在腎其末在肺此水脹也五臟六腑皆有脹統氣與水而言之也石瘕腸覃女子血凝氣滯而病脹也後賢分虛實寒熱在氣在血法已大備似無庸再議然余觀勞損者病在精腫脹者病在氣無論氣臌水臌血臌最重在肺臟蓋肺主一身治節管領五臟六腑之氣肺氣一傷周身治節不行於是脾失健運肝木橫逆而為氣臌腎失樞轉膀胱水道不利而為水臌肝失疏泄氣滯血凝而為血臌謂非皆由肺氣傷殘不能化水化血自化之病乎雖然所因甚多所病各異從外感而得者多暴多實多熱從內傷而得者多緩多虛多寒水腫多實證其來也暴氣腫多虛證其來也緩濕熱腫在虛實之間其來也不暴不緩必先見別證而後脹滿若水腫之咳逆喘呼非大實即大虛不可不辨實則肺氣壅塞不降虛則腎氣奔逆不納虛證固宜溫補實證必須瀉降如水腫實證即舟車禹功亦不為峻但不可過劑經云大毒治病十去其六或從虛實間進之法投峻藥一服續投調理藥三二日再進一服最穩余驗過數人至單腹脹乃脾肺腎真氣敗壞全屬虛證血臌腸覃石瘕雖病在血分不可專求之血宜導氣以通血氣為血帥古人明訓不可不知也
