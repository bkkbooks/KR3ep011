body:
  text: 卷之一溫邪門某久患三瘧未愈勞力更感風溫而發時證及今八日壯熱煩躁汗不能出疹不能透熱鬱蒸痰神糊囈語兩脅疼痛難以轉側胸悶氣粗動則欲厥所以然者邪熱與瘀傷混合痰濁與氣血交阻莫能分解以致擾亂神明漸有昏喘之險豆豉五錢蘇梗一錢鬱金一錢赤茯神三錢連翹三錢丹皮錢半當歸三錢杏仁三錢天竺黃錢半木通一錢猩絳七分菖蒲五分青蔥枇杷葉淵按鬱金杏仁解氣鬱當歸蔥猩解血鬱豆豉蘇梗從里達表尤宜佐黃芩鮮地等以解熱鬱否則熱不解而諸郁亦不開熱蒸痰阻陷入胞絡易易宋濕溫過候斑疹並見心胸煩懊神識模糊脈數混混而不清舌心苔干而不膩濕蘊化熱熱漸化燥氣粗短促目赤耳聾陰精下虧風陽上亢慮其內陷昏痙擬生津達邪兼芳香逐穢鮮斛淡豆豉竹茹連翹橘紅赤苓天竺黃黑梔菖蒲鬱金羚羊陳膽星牛黃清心丸五分加犀黃三釐又濕溫邪在太陰陽明濕勝於熱太陰為多熱勝於濕陽明為甚日晡煩躁陽明旺時也口雖渴苔仍白膩乃濕蘊化熱余濕猶滯氣火熏蒸矇蔽清竅故斑疹雖透而神識時糊脈沉小而數疾皆邪郁不達之象倘若熱甚風動變徑便難措手半夏赤苓鮮斛連翹川連薑汁炒菖蒲通草豆豉鬱金益元散竹茹茅根黑梔淵按宜參涼膈散緩緩通下不致下文化燥內陷耳蓋濕溫雖不可早下而熱勝挾滯者不下則熱邪挾滯不去濕邪亦從熱化燥化火也又濕溫旬日脈數較大於昨熱勢較盛於前所謂數則煩心大為病進並非陰轉為陽自內達外之象舌苔白厚上罩微灰面紅目赤陽盛之徵頭昏耳聾陰虛之象小溲窒塞氣化不及也當生津以徹熱利竅以化濕救陰不在腎而在生胃津去濕不可燥而在通小便蓋汗生於津津充汗出而熱解小腸為心之府小便通利心火降而神清羚羊角赤苓菖蒲竺黃澤瀉益元散知母鮮斛通草竹葉鮮薄荷根另用珠子五分血珀五分為末調服淵按名言儻論勿草草讀過又濕熱鬱蒸如煙如霧神識沉迷脈時躁時靜靜則神倦若寐躁則起坐如狂邪內陷矣雖便不通而腹鳴不滿腸胃不實其糞必溏未可驟攻下之大凡溫邪時症驗舌為先今尖苔白上罩微黴邪在營氣之交葉氏云邪乍入營猶可透熱仍轉氣分而解如犀羚元翹等是也從此立方參以芳香宣竅犀角羚羊角鮮斛竺黃元參連翹益元散赤苓竹茹至寶丹一粒又前方加鮮地栝蔞仁枳實又舌黑而干濕已化燥頻轉屎氣脘腹按痛邪聚陽明腸胃已實當商通腑但小便自遺腎氣虛也正虛邪實津枯火熾惟有瀉南補北勉進黃龍湯法鮮地人參生軍元參元明粉菖蒲竺黃連翹竹葉甘蔗汁代水煎藥淵按蔗汁生飲最妙代水煎藥不但膩膈且失涼潤之性矣又下後舌黑稍退而脈反洪大神識仍昏陽明火旺也清陽明燔灼之火救少陰涸竭之陰用景嶽玉女煎鮮地元參鮮斛知母竺黃麥冬石膏竹葉蘆根蔗汁一杯沖又津回舌潤固屬休徵風動頭搖仍為忌款溫邪雖退元氣大虛虛風上擾不息又防眩暈厥脫今當扶正熄風參以生津和胃生洋參鉤鉤天麻茯神製半夏石決明秫米陳皮麥冬竹茹甘蔗皮淵按熱滯雖從下而鬆肝家陰液早為燥火所傷故見證如此遲下之纍也胡素有肝胃病適挾濕溫七日汗解八日復熱舌灰唇焦齒板口渴欲得熱飲右脈洪大數疾左亦弦數脘中仍痛經事適來靜思其故請明析之夫肝胃乃腹中一臟一府木乘土則氣鬱而痛若不挾邪安得寒熱即有寒熱斷無大熱以此為辨也又詢大便堅硬而黑是腸胃有實熱所謂燥屎也考胃氣痛門無燥屎症惟瘀血痛門有便血然此症無發狂妄喜之狀則斷乎非蓄血此又一辨也渴喜熱飲疑其為寒似矣不知濕與熱合熱處濕中濕居熱外必飲熱湯而濕乃開胸中乃快與陰寒假熱不同再合脈與唇其屬濕溫挾積無疑傷寒大白云唇焦為食積此言諸書不載可云高出前古豆豉鬱金延胡山梔香附赤苓連翹竹茹蔞皮外用蔥頭十四個鹽一杯炒熱尉痛處按病本濕溫挾食交候戰汗而解少頃復熱為一忌汗出而脈躁疾者又一忌適值經來恐熱邪陷入血室從此滋變亦一忌故用豆豉以解肌黑梔以清裡一宣一泄祛表裡之客邪延胡索通血中氣滯氣中血滯兼治上下諸痛鬱金苦泄以散肝鬱香附辛散以利諸氣二味合治婦人經脈之逆行即可杜熱入血室之大患栝蔞通府赤苓利濕加竹茹連翹一以開胃氣之郁一以治上焦之煩外用蔥鹽熱尉即古人摩按之法相贊成功淵按此雖有食積亦不可下以胸痞脘痛渴喜熱飲中焦濕飲郁遏不開寒熱錯雜陽明之氣失於順降若遽下之輕則痞膈重即結胸矣同一濕溫夾滯其不同有如此者又服藥後大便一次色黑如栗者數枚兼帶溏糞脘痛大減舌黴唇焦俱少退原為美事惟脈數大者變為虛小無力心中覺空是邪減正虛之象防神糊痙厥等變今方九日延過兩候乃吉香豉青蒿沙參赤芍川貝鬱金黑梔竹茹稻葉金橘餅淵按大便通而痛減乃蔥鹽按摩之功也蔥能通氣咸能順下陽明之氣得通胃氣自然下降胃氣通降大便無有不通者夫便猶舟也氣猶水也水流順暢舟無停滯之理若但知苦寒攻下不明中氣之逆順是塞流以行舟耳秦溫邪十二日斑疹遍透神識仍糊大便屢行齒垢未脫舌尖紅中心焦陰津灼也左脈大右脈小元氣弱也昨投清泄芳開是從邪面著筆今診脈神委頓當從元氣推求要知溫屬陽邪始終務存津液胃為陽土到底宜濟甘涼所慮液涸動風易生痙厥之變胃虛氣逆每致厄忒之虞耳羚羊角沙參生草竺黃菖蒲鮮石斛犀角元參洋參澤瀉茯神蘆根蔗汁另用濂珠粉三分上血珀末三分開水調服又昨用甘寒生津扶正病勢無增無減然小便得通亦氣化津回之兆也症交十三日是謂過經乃邪正勝負關頭從此津液漸回神氣漸清便是邪退之機從此而津液不回神糊益甚便是邪進之局正勝邪則生邪勝正則重仍以生津救液冀其應手羚羊鮮斛沙參洋參麥冬澤瀉赤苓元參蔗汁蘆根珠黃散又加知母川貝又甘寒清潤固足生津亦能滋濕向之舌絳乾焦者今轉白膩口多白沫是胃濁上泛也小便由於氣化濕滯中焦氣機不暢三焦失於輸化故不飢不思納小便不利也法宜宣暢三焦豆卷赤苓豬苓澤瀉生苡仁杏仁通草竹茹陳皮半夏曲穀芽血珀五分研末沖服淵按帆隨湘轉妙於轉環脾腎陽氣素虛陽邪一化陰濕即來在脈神委頓時早防之庶免此日波變然不料其變之如是速耳古方大豆卷治筋攣濕痹蘇地用麻黃湯浸藉以發汗與此症總不相宜又瘀熱蓄於下焦膀胱氣痹不化少腹硬滿小溲不利下既不通必反上逆恐生喘厄之變開上疏中滲下俾得三焦宣暢決瀆流通紫菀杏仁桔梗川朴陳皮赤苓豬苓澤瀉蘇梗血珀通草又照方加參鬚五分煎湯調下血珀五分外用田螺二枚蔥白一握桃仁三錢曲少許麝香五釐肉桂五分合打爛燉溫敷臍下關元穴又溫邪甫退少腹板硬膀胱氣化無權昨議疏泄三焦小便仍不暢今少腹硬滿過臍其大如盤按之不痛脈沉小舌白膩身無熱口不渴所謂上熱方除中寒復起是也夫膀胱與腎相表裡膀胱氣化賴腎中陽氣蒸騰腎陽不足膀胱水氣凝而為瘕須防犯胃衝心厄厥等變急急溫腎通陽泄水猶恐莫及肉桂五苓散送下金匱腎氣丸三錢淵按須此方解下焦之圍再佐蔥鹽按摩更妙又通陽泄水與病相投雖未大減已奏小效腹中覺冷中陽衰弱顯然照方加木香炮姜尤症交十二日目赤耳聾舌白煩渴脈洪大而汗出當辛涼以徹氣分之熱邪甘涼以救肺胃之津液北沙參麥冬知母竺黃元參生石膏薄荷同打滑石竹葉蘆根又目張不語而神慧與湯則咽身能轉側舌苔灰白脈形洪滑並非邪閉心包乃肝陽夾痰火阻塞清明之府勿再芳香開達開則邪反內陷矣慎之羚羊角川貝鬱金茯苓膽星石決明遠志鮮斛竹油薑汁北沙參淵按清火熄風豁痰通竅絲絲入扣惟沙參可斟酌以其補肺也舌苔灰白痰火徵兆又目張不語多汗脈大陽盛陰虛防其厥脫急救其陰希圖萬一生洋參石決明沙參茯神麥冬川貝母五味子又目已能合口已能言但舌蹇而言澀汗多稍收脈大稍斂似有一線生機所嫌兩臂動強恐其發痙擬存陰熄風法羚羊角鮮地生地洋參沙參石決明麥冬鉤鉤蔗汁淵按幾乎類中大抵平素肺腎陰氣不足肝陽有餘年過四十者每有是證華溫邪八日神識模糊斑色紅紫脘腹拒按結熱旁流舌紅乾燥目赤唇焦而又膚冷汗出脈伏如無邪熱內閉陰津外泄頗有內閉外脫之慮勉進黃龍湯法大生地參鬚生軍枳實連翹天竺黃元參菖蒲鮮斛淵按膚冷汗出脈伏非虛象乃閉象也從斑色紅紫上看出參鬚可斟酌某久病元氣未復又感濕溫已愈旬日解表疏中通下之藥皆已服過現脈仍數舌白膩頭汗多身熱不解咳嗽不揚小溲不爽且以分泄三焦再看轉機豆卷杏仁赤苓腹皮川朴桔梗蔞皮蘇梗澤瀉滑石通草高舌白口渴咽痛濕溫化熱症方四日年高正虛勢防戰汗冀其無變為佳薄荷桔梗射干滑石牛蒡子橘紅杏仁枳殼蔻仁蘆根又溫邪挾積化燥昨服藥後戰汗不透大熱雖減裡熱仍熾舌黴邊白脈形不顯高年恐其內陷大力子香豉鮮斛連翹黑梔薄荷根滑石枳實又胸脘板痛拒按此屬結胸舌心燥邊白此挾痰水挾氣積症交七日溫邪內伏將燥未燥將陷未陷昨午投生津達邪一劑今結胸症已具勢不容緩再進小陷胸法川連半夏枳實蔞仁香豉黑梔淵按仲景小陷胸以枳實佐川連栝蔞佐半夏苦泄辛潤開中焦之痞以化痰水熱邪方名陷胸與諸瀉心湯出入並非下劑今人以蔞枳為通腑之藥殊屬可笑顧溫邪得食則復舌心尖焦黃而干邊苔白膩心胸痞悶此挾積挾氣挾痰挾水大便已十二日不通其勢不得不下半夏茯苓澤瀉川連枳實川朴蔞仁大黃元明粉楊胸悶頭痛寒熱往來邪在少陽有汗而熱不解是傷於風也舌薄白邊色乾紅陰虧之體邪未外達而津液暗傷漸有化燥之象症交七日中脘拒按似欲大便而不得出少陽之邪傳及陽明胃家將燥實矣防其譫語擬少陽陽明兩解法柴胡淡芩半夏枳實甘草香豉黑梔蔞仁桔梗滾痰丸錢半淵按從大柴胡陷胸變化不用大黃黃連以陰虧液傷拒按在中脘不在大腹也借滾痰丸以微通之心靈手敏又得汗得便邪有松機是以胸悶心跳煩躁等症悉除而頭痛略減也雖自覺虛餒未便多進穀食亦未可就進補劑但和其胃化其邪可耳香豉豆卷半夏川貝赤苓陳皮鬱金川斛通草竹茹又用和胃化邪法一劑頗安二劑反劇良以畏虛多進穀食留戀其邪不能宣化鬱於心胸之間濕蘊生痰熱蒸灼液煩躁噁心錯語兩手寸關脈細滑數兩尺少神舌邊乾紅心苔黃膩皆將燥未燥將陷未陷之象擬導赤瀉心各半法生津化濁和胃清心犀角川連鮮斛枳實半夏赤苓連翹黑梔橘紅生甘草通草鬱金竹茹蘆根萬氏牛黃清心丸五分淵按陽明痰熱未清遽進穀食致有下文如是大變宜仿仲景食服法佐大黃以微下之又症交十三日身熱不揚神昏舌短苔黴邪入膻中閉而不達急急清泄芳開希冀轉機犀角連翹枳實竺黃蘆根菖蒲黑膏牛蒡元參薄荷根鬱金鮮斛紫雪丹五分另調服又神情呼喚稍清語仍不出邪欲達而不達胸脅紅點稍現跡稀不顯斑欲透而不透口臭便祕時覺矢氣陽明燥實復聚舌短心焦邊絳膻中之火方熾芳開清泄之中參以生津蕩實前方加沙參細生地磨大黃又口臭噴人胃火極盛斑疹雖見透而未足目赤神糊脈洪口渴急急化斑為要古法化斑以白虎為主今仍參以犀地清營解毒再復存陰玉女煎犀角黑膏麥冬竺黃大生地知母沙參洋參菖蒲人中黃蘆根石膏薄荷打淵按前方未知下否若未通可再下之所謂急下以存陰也有犀地白虎清營救液見證有實無虛不妨放膽又目能識人舌能出口症漸有生機當大劑存陰冀其津回乃吉大生地鮮石斛麥冬洋參元參生甘草鮮生地石膏犀角沙參蔗汁又黑苔剝落舌質深紅陰津大傷燥火未退左脈細小右脈洪大是其徵也際此陰傷火旺少陰不足陽明有餘惟景嶽玉女煎最合一面存陰一面瀉火守過三候其陰當復鮮生地生石膏元參洋參大生地黑山梔生甘草知母沙參連翹蘆根淵按右脈洪大陽明熱結夾滯顯然又頻轉屎氣咽喉乾燥燥則語不出聲此陽明火勢熏蒸津不上承重救其陰兼通其腑再商大生地鮮生地麥冬生軍海參北沙參生甘草元參元明粉淵按從前缺下尚是實熱見象海參嫌膩膈又下後液未回急當養陰醒胃生洋參茯苓橘紅麥冬蔗皮大生地石斛沙參元參穀芽又耳聾無聞舌乾難掉陰津大傷用復脈法大生地麥冬元參洋參阿膠川連三分拌炒生甘草雞子黃又迭進滋陰大劑生津則有餘瀉火則不足今交三候齒垢退而復起神識已清非陰之不復乃燥火未清耳今當法取輕靈洋參枳殼川貝橘紅赤苓棗仁豬膽汁炒川連雪羹湯煎又諸恙向安每啜稀粥必汗沾濡非虛也乃津液復而營氣敷布周流也小溲澀痛餘火未清惟宜清化冬瓜子鮮石斛通草黑梔生穀芽甜杏仁甘草梢又病退日間安靜至夜發熱神昏乃餘熱留於營分也小溲熱痛心火下趨小腸仿病後遺熱例用百合知母滑石湯合導赤散木通草梢竹葉知母鮮生地滑石百合泉水煎服範陰虛挾濕之體感受時令風溫初起背微惡寒頭略脹痛欲咳不爽發熱不揚舌白膩大便溏峻投消散暗劫胃津以至飢不欲食嗜臥神糊厄忒斷連斑疹隱約症方八日勢涉危機閲周先生方洵盡美善僭加甘草一味以和之具生津補中之力未始非贊襄之一助也若云甘能滋濕甘能滿中孰不知之須知苔薄光滑胸不滿而知飢乃無形濕熱已有中虛之象此葉氏所以深戒苦辛消克之劑幸知者察焉牛蒡子前胡橘紅竺黃鬱金刀豆子桔梗神麯菖蒲連翹薄荷葉竹茹甘草枇杷葉淵按此痰厄也中虛挾痰胃氣通降不順所致又症逾旬日系溫邪挾濕病在氣營之交苔白膩而邊紅疹點透而不爽寐則譫語寤則神清厄聲徐而未除脈象軟而小數周先生清營泄衛理氣化濁恰如其分羚羊角連翹竺黃川連橘紅牛蒡子半夏丁香柿蒂竹茹薄荷根通草茅根淵按寐昏寤明痰火阻塞上中焦顯然方較上首好又熱處濕中神蒙嗜臥呼之則清語言了了舌白膩脈軟數知非邪陷膻中乃濕熱深漫於上焦肺氣失宣布耳厄尚未除胃濁未化擬從肺胃立法射干杏仁鬱金橘紅代赭石川貝沙參桔梗通草旋覆花茅根冬瓜子淵按開肺降胃更為得旨所以厄除神清又厄除苔稍化欲咳不揚仍從前法加減前方去代赭石加蛤殼赤苓又去旋覆花射干桔梗加豆卷又便泄數次黏膩垢汙胃濁以下行為順故連日沉迷嗜臥昨宵便惺惺少寐且屢起更衣愈覺神煩倦乏耳今便泄未止舌苔仍白身熱已和酒客中虛濕勝擬和中化濁仿子和甘露飲生洋參於朮赤苓澤瀉滑石雞距子廣藿木香葛花橘紅通草竹茹淵按痰從便去熱亦隨之中焦之濁清上焦之熱亦降故諸恙若失轉惺惺少寐耳然苔未化余濕未清脾胃轉運未復也不可早補又病已退濕未楚前方加減前方加參鬚於朮神麯穀芽孫溫邪襲肺肺失清肅濕挾熱而生痰火載氣而逆上喘息痰嘶舌乾口膩昨日之脈據云弦硬現診脈象小而澀數陰津暗傷元氣漸餒頗有喘汗厥脫之慮夫溫邪為病隸乎手經肺胃位高治宜清肅痰隨氣湧化痰以降氣為先氣因火逆降氣以清肅為要姑擬一方備候高明酌奪鮮石斛射干杏仁象貝沙參蘇子桑皮沉香蘆根竹油沖服冬瓜子枇杷葉薑汁淵按議論明晰最宜學步方中沉香易黃芩則善矣蓋熱化肺清不患不降凡諸清肺藥皆能降氣沉香屬木降肝不降肺耳黃舌乾而絳齒燥唇焦痰氣喘粗脈象細數無形邪熱薰蒸於膻中有形痰濁阻塞於肺胃而又津枯液燥正氣內虧恐有厥脫之變擬化痰滌熱治其標扶正生津救其本必得痰喘平神氣清庶幾可圖羚羊角旋覆花葶藶杏仁川貝鮮石斛元參茅根竹油沉香代赭石蘇子薑汁枇杷葉滾痰丸三錢人參湯送下又頭汗淋瀝痰喘不止脈形洪大面色青晦舌紅乾涸齒板唇焦此少陰陰津不足陽明邪火有餘火載氣而上逆肺失降而為喘症勢危險深慮厥脫勉擬救少陰之津清陽明之火益氣以斂其汗但肺以定其喘轉輾圖維冀其應手乃妙大生地海浮石拌搗洋參牛膝五味子石膏桑皮川貝炙甘草麥冬人參一錢另煎沖陳粳米煎湯代水淵按脈形洪大合之頭汗面青上實下虛大著從補下納氣之中想出清熱救津之法故能應手人參石膏粳米救肺清熱亦所以救腎也又汗稍收喘稍平脈大稍軟但氣仍急促心中煩躁舌紅乾涸齒垢唇焦津液猶未回虛陽猶未息上逆之氣猶未降雖逾險嶺未涉坦途今少腹似有透㾦之象是亦邪之出路仍擬救少陰清陽明再望轉機大生地蛤粉炒洋參沙參元參麥冬鮮生地牛膝通草豆卷五味子竹葉枇杷葉陳粳米煎湯代水淵按前方應手此即頭頭是道通草豆卷淡滲泄表恐其耗津不必慮邪之不去津氣回而邪自不容矣又陰津稍回氣火未平仍宜步步小心勿致變端為幸大生地洋參沙參元參澤瀉麥冬天竺黃鮮石斛石決明茯神蘆根張溫邪兩候不解脈形洪大中空神昏蒙而如醉舌淡紅而無苔與湯亦不卻不與亦不討囈語如呢喃叮嚀重復道昨日用芳開神情略覺好然憑症而論之乃津枯而液燥是必甘寒潤燥生津液俾得氣化津回方保吉聊立方法以備參候高明以商奪大生地鮮石斛沙參茯苓麥冬羚羊角鮮生地竺黃甘蔗汁蘆根尖淵按案語清華方法簡潔非學識兼到者不能許溫邪內蘊痰濁上泛壯熱無汗神識模糊氣逆痰多舌膩尖紅大便不通勢防厥脫羚羊角葶藶杏仁川貝竺黃黑山梔蔞仁枳實豆豉菖蒲滾痰丸三錢此方效淵按實熱夾痰滾痰丸甚合煎方亦好吳溫邪五日舌苔干黃壯熱無汗胸腹板滿硬痛手不可近此屬結胸煩躁氣喘口吐涎沫防其喘厥黑山梔豆豉蔞仁川連杏仁生大黃葶藶柴胡枳實淡芩元明粉皂莢子凡結胸症煩躁氣促者死此方是大柴胡湯大小陷胸梔豉合劑淵按煩躁無汗而有氣喘者柴胡不可用用柴胡仍蹈前人治傷寒之故轍也幸有硝黃連杏主持其間否則壞矣又下後結胸之硬滿已消而煩躁昏狂略無定刻舌苔乾燥渴欲涼飲壯熱無汗邪氣猶在氣分以苦辛寒清裡達表冀其戰汗無變為妙幸其壯熱無汗可冀戰汗若汗出而仍壯熱則內陷矣此方三黃石膏湯雞蘇散與梔豉合劑又戰而得汗脈靜身涼邪已解矣舌黃未去胃中余濁未清尚宜和化川貝赤苓豆豉炒連翹黑山梔通草滑石枳殼炒竹茹凡戰汗後脈靜身涼用方大法不外乎此嚴病後元氣未復溫邪乘虛竊發初起即便壯熱神糊舌乾肩膊脅肋疼痛今方二日邪未宣達已見津涸之象其為重候可知當此論治是宜達邪以解其表然葉氏云初起舌即干神略糊者宜急養正微加透邪之藥若昏憒而後救里有措手不及之虞矣北沙參一兩牛蒡三錢杏仁三錢焦曲三錢黑山梔錢半豆豉三錢連翹三錢竺黃一錢枳殼一錢茅根一兩鮮薄荷根五錢淵按深得葉氏心傳孫營陰素虧之體感受溫邪病起肢麻寒熱旋即便泄神糊今交七日脈數而洪舌燥齒乾必蕩氣促陽明之火方熾少陰之陰已涸又腹硬痛大便三日不通積聚於中不下氣火盡浮於上似宜通降為先然陰津大涸不得不先養其津姑擬一方備商鮮生地一兩四錢北沙參二兩磨蘇梗五分沖杏仁三錢天竺黃錢半茯神三錢麥冬五錢川貝三錢雪梨汁一杯沖枇杷葉三片淵按先養正救津斯為老眼無花又津回舌潤汗出甚多熱勢亦退惟心煩不寐大便不通仍以前方加減前方去蘇梗加細生地一兩天冬三錢麻仁三錢蔡溫邪發斑透疹總在肺胃兩經邪熱鬱蒸從里達外血分熱熾則發斑氣分熱熾則發疹邪從外入由氣傳營熱自內出由營達氣此症胸前先發斑點身未覺熱數日之後始發寒熱續布痧疹似乎營分先有伏熱而後溫邪湊集肺胃受病始見咳嗽寒熱等症然斑已將化疹已透齊即有餘邪清之解之可已乃反胸痞煩悶氣升噁心喉痛難咽其故何歟良以懷孕八月適當太陰陽明養胎之候邪熱甚於肺胃胎氣失蔭而上逆繇是胸高氣逆煩躁不得臥豈非病雖由熱而實乃胎氣上衝所致也為今之計清解肺胃溫邪以化斑疹熱毒是為正治然燎原之下液灼津傷亦必養其津液胎氣上升為變最速尤要先平胎氣肺主一身之主又必降其肺氣肺氣降而得臥胎安不上衝庶無喘厥之虞矣鮮生地一兩淡豆豉三錢同鮮地研川貝母三錢磨蘇梗五分沖磨犀角五分沖磨鬱金五分沖紋銀一兩先煎元參二錢白薇三錢竹茹一錢野苧根五錢枇杷葉三片去毛又溫邪上受自氣傳營而化火上炎由胃及肺喉屬肺經咽屬胃經凡咽喉之症屬實火者多因肺胃之陽盛腎脈循喉肝脈繞咽系虛火者始關肝腎之陰虧是其大略也此症乃斑痧之後喉痛色赤全由邪火熾張圖治之方犀角地黃不出甘寒清解昨吐紅痰無非氣火熏蒸今觀脈色已覺神清爽朗喜逢知己共斟酌而揣摩幸謝主人轉憂疑為欣慰立夏恰今朝病能減而即是退懷麟當此疾胎不動即是安大便才通亦是轉機之兆小心調理冀無欲速之譏略泐數行伏希曬政犀角羚羊角川貝鮮石斛元參知母鮮生地麥冬枇杷葉金銀花露緑豆皮煎湯與燕窩湯相和頻飲又夫溫邪燔亢之餘餘熱固未能淨肺胃燎原之下陰津必受其戕養陰不在血而在津與汗葉氏之名言安胎須順氣陰火忌上衝婦科之要論此症兒及兩候溫痧既退安得邪火復熾喉腫既消何以燥痛復盛所以然者胎當七八月之間正肺與大腸司養之際肺腸相為表裡肺主氣而大腸主津肺受火淫燥熱移於大腸大腸當養胎之際遂移熱於胞絡內經云人有重身九月而暗是胞之絡脈絶也胞脈者繫於腎而絡胞胎今熱上迫肺故音啞咳嗽而喉復痛也按此段經文明指胎中陰火當九月之期有此音啞一症教人勿亟治之惟恐傷其胎氣耳茲方八月即得音啞咳頻豈非殃及池魚之謂歟今以甘涼生津治其上燥參入鹹寒以降陰中伏火經所謂熱淫於內治以鹹寒是也須知治病要察機宜養陰而火自降指久病虛羸而言火退而陰自充乃暴病未虛之症先輩有提其要曰暴病多實久病多虛是其義也然歟否歟仍候華先生裁正北沙參一兩川貝去心勿研三錢元精石三錢知母三錢秋石煎湯拌浸蟬衣一錢去翅足大豆卷三錢元參三錢天花粉三錢枇杷露一杯沖服野苧根三錢赤苓三錢生甘草四分紋銀五分改方加羚羊角錢半鮮生地七錢黑山梔錢半淵按伏溫由內達外由里傳表從少陰而出太陰所以退而復來輕而再重不盡由乎胎熱疹屬肺肺主一身之表斑屬胃胃為萬物所歸溫邪每從兩經而達也胞絡者乃胞門子戶之胞非心包絡胞絡系腎少陰之脈貫腎上入喉中熱邪由少陰上干喉中故音啞甚則喉痛鮑半月不大便症交十二日神昏舌煤齒垢乾枯陽明邪火極熾少陰陰液已虧腸中宿垢不下邪熱無從出路不下恐火盛劫液而痙厥下之恐亡陰而厄脫極難著筆姑備一方犀角鮮生地生大黃茯神當歸菖蒲大生地連翹枳實麥冬竺黃元明粉淵按一面養陰徹熱一面通腑最穩當硝黃宜輕用又便解三次神氣漸清舌煤已化今擬生津鮮石斛一兩川貝二錢茯神三錢元參三錢生甘草五分麥冬三錢竺黃錢半竹茹一錢北沙參一兩大生地一兩甘蔗皮一兩沈陰虛之體感受溫邪反復今交九日神識時迷舌滿碎腐脈象漸沉防其昏厥備方候致和先生曬政犀角四分磨沖連翹三錢丹皮錢半栝蔞仁三錢鮮生地五錢元參三錢竺黃錢半鮮薄荷根一兩另珠子三分血珀四分研細末蘆根湯送下又照前方去蔞仁加大生地生洋參沙參麥冬又陰津大虧痰火熾盛內風暗動痙厥將至煎藥不肯沾唇姑以湯方備試參鬚一錢川貝二錢石決明八錢杏仁三錢蘆根一兩竹油三十匙沖麥冬三錢羚羊角錢半先煎雪梨汁一杯沖蔗汁一杯沖又症勢稍轉機仍候濟慎先生裁正羚羊角鮮生地大生地天冬麥冬鮮石斛北沙參石決明西洋參鉤鉤蘆根竹油茯神蔗汁梨汁淡薑汁生甘草元參二味濟慎先生加淵按數方養陰則有餘瀉火尚不足致有下文邪熱逗留之弊又照前方加元精石備候濟慎先生裁正大生地川貝鮮石斛石決明元參丹皮麥冬生洋參北沙參蘆根甘蔗汁又腑氣不通陽火不降陰津不升元氣雖虛不得不通其腑大生地八錢鮮石斛五分北沙參一兩元參三錢知母錢半生大黃三錢當歸三錢生洋參三錢麥冬三錢蘆根一兩洪溫邪初起胸悶頭痛發熱有汗先宜涼解牛蒡子豆豉黑山梔連翹桔梗橘紅荊芥杏仁薄荷蘆根秦發汗太過津液內奪昨日生津以達邪汗雖未出而疹點已化熱雖未退而脈象稍和是佳兆也苔煤而不甚燥神糊而有時清犀角地黃雖可用然大勢無變方亦無事更張仍照前方加味北沙參一兩竺黃錢半鮮石斛一兩連翹三錢麥冬三錢茯神三錢朱拌生甘草四分元參三錢茅根一兩去心燈心三尺朱拌九節菖蒲八分淵按神糊苔煤鮮石斛可用北沙參不可用雖養肺陰究嫌補肺助痰麥冬亦然此老好用二物瑕瑜並見張久患便血陰氣先傷於下今感溫邪挾積肺胃之氣阻窒上喘下泄發熱口渴舌絳如朱額汗不止遍體無汗脈小數疾厥脫險象勉擬一方備正葛根一錢黃芩錢半石膏三錢薄荷同研赤苓三錢黃連四分杏仁三錢牛蒡元米炒三錢生甘草四分枇杷葉三片上藥用水兩盞煎至一盞另用人參一錢麥冬錢半五味子五分炒生地四錢阿膠二錢蛤粉炒用水兩盞另煎煎至半盞沖和前煎徐徐服下此為復方法病系溫邪而陰虛欲脫故立此法凡暴喘多實而壯熱舌乾宜從清解惟久患便血今更下泄不止所謂喘而不休泄痢不止水漿不入者不治故不得不救其陰希圖萬一淵按陰血既耗於下脾氣復傷於中故一感溫邪而上喘下泄泄為脾陷喘為腎逆兩臟不守厥脫易易頭汗者陰不守而陽越也身無汗者陰液虛而氣不能化也舌絳如朱胃陰虧而心火熾脈小數疾陰血虛而邪火伏兩方頗有心思惟葛根嫌升發牛蒡嫌泄肺蓋陰陽兩虛中氣不守氣雖陷不可升汗雖無不可發急急顧慮中氣陰液猶恐不及然肯用心如此敬服之至幼陽明熱邪充盛遍體發出紫斑鼻血齦碎急與清解防內陷犀角石膏薄荷茜草丹皮鮮生地連翹紫草元參茅蘆根仁淵曰溫邪一證前人每與傷寒混同論治自喻嘉言始力辨其非然猶不能跳出至葉天士乃別開生面吳鞠通繼之溫熱之治始大昌明然非前人之誤前人亦為古人所誤也一誤於內經熱病者傷寒之類也遂謂傷寒即溫病溫病即傷寒漫無分別再誤於王叔和集仲景傷寒論以溫病攙入傷寒之中以為溫熱乃傷寒之變證至後人有春變為溫夏變為暑之說其實傷寒與溫熱相去霄壤然溫病亦非一端有冬溫春溫冬溫春發風溫痧疹濕溫之別風溫痧疹即春溫一類以感春令賊風傷其皮毛內合於肺引動伏溫故見證咳窒氣粗或發痧疹病在肺胃氣分宜辛涼輕泄上焦不可用重劑及血分藥若冬溫春溫輕者亦在肺胃咳窒氣促重者或發自少陽少陰甚有涉厥陰者由其陰精先虛邪熱蓄伏於虛處其機一發少陰陰精先已告困液涸劫津昏痙顫振接踵而至起而腰痛脅痛有汗不解者不可輕視蓋腰為腎府脅乃少陽經絡遊行之地腎水不足木火熾張故也吾吳地處溫下濕動最先冬溫夾濕者少春溫已有夾痰夾濕濕溫乃濕熱相合清其熱尤須開其濕清熱用苦泄涼潤開濕不得不佐辛通淡滲而化燥者即不合蓋濕從熱化見熱而不見濕矣溫邪以驗舌為先不可動輒發汗有汗固不可再發即無汗亦宜視其津液何如若熱盛液虧妄汗最易昏痙輕則咳窒氣促重則口鼻出血辨六經與傷寒同治法與傷寒大異自漢唐及元明多以傷寒之方治溫熱雖經葉天士等大暢厥旨然鄉曲之士遵師傳而日讀湯頭醫宗必讀等書仍以羌獨柴前為發表套劑其禍尚未息也暑邪門溫暑邪挾積身熱腹痛先與疏達香薷川朴花檳榔砂仁藿梗蘇梗赤苓焦六曲陳皮通草又腹痛拒按當臍有塊壯熱無汗舌苔黃膩氣升煩懊防其發厥法以表裡兩解柴胡淡芩枳實赤苓赤芍半夏元明粉生大黃又投大柴胡湯法下出碎塊溏糞兩次腹痛不減煩懊不安氣升嘔逆舌苔黃燥食積填塞陽明暑邪內走厥陰防其昏厥擬以泄厥陰通陽明川連吳萸炒楂炭淡豆豉黑山梔栝蔞仁當歸龍薈丸三錢絹包煎枳實蘇梗木香三味磨沖外敷方蔥一把鹽一杯丁香一錢飛面三錢打爛敷痛處此四磨飲合小陷胸梔豉左金合劑疏通氣分泄肝化積再用外敷法其氣有不通行者乎淵按暑必挾濕濕為陰邪最能阻礙陽氣故暑濕病多脘腹痞痛積滯內阻暑濕之不化實由氣機之不通下而痛仍不減乃未得辛通之藥中焦痞滯未去耳丁暑乃鬱蒸之熱濕為濡滯之邪暑雨地濕濕淫熱鬱惟虛者受其邪亦維素有濕熱者感其氣如體肥多濕之人暑即寓於濕之內勞心氣虛之體熱即伏於氣之中於是氣逆不達三焦失宣身熱不揚小溲不利頭額獨熱心胸痞悶舌苔黃膩底絳尖紅種種皆為濕遏熱伏之徵邪蘊於中不能外達亦不下行頗慮內閉之變擬以梔豉上下宣泄之雞蘇表裡分消之二陳從中以和之芳香宣竅以達之冀其三焦宣暢未識能奏功否淡豆豉黑山梔通草半夏菖蒲鮮荷葉六一散薄荷赤苓竹茹蔻仁研後下吳勞碌之人中氣必虛暑濕熱穢濁之氣自口鼻吸入氣道滿布三焦雖舌苔滿布而胸無痞悶非邪伏膜原之比重濁之藥徒傷中氣與濕熱瀰漫之邪無益今交五日神氣似清而渾恐其過候有耳聾神迷厄逆等變為治之法且以芳香理氣逐穢再議刀豆子鬱金澤瀉石菖蒲杏仁栝蔞仁陳皮滑石香薷桔梗北沙參赤苓藿香佛手鮮荷葉鮮佩蘭葉顧久處南方陽氣泄越中臟常寒慣服溫補現患溫瘧及今旬日舌尖已紅根苔滿白便泄稀水兼有蛔蟲渴不欲飲口中甜膩皆是濕遏熱伏之象就錫邑治法葛根芩連是主方若合體質而論似宜溫中滲下清上解肌擬用桂苓甘露法試服之以觀驗否生石膏三錢豬苓三錢澤瀉錢半肉桂三分滑石三錢生茅朮一錢茯苓三錢藿香一錢通草八分木香四分又照前方加北沙參五錢丁咳嗽已久近患時溫之後原氣未復又感暑風閉其汗孔身復發熱法當先理暑風用輕劑宣上桑皮蘇梗杏仁川貝橘紅茯苓冬瓜子竹茹此虛而挾邪暫用輕揚表法未便著手蔣三瘧日久又感暑風咳嗆痰血熱勢變亂且以解暑清肅肺胃香薷一錢北沙參五錢冬瓜皮三錢六一散四錢神麯三錢青蒿錢半杏仁三錢丹皮錢半桑葉錢半白扁豆三錢枇杷葉二片淵按咳嗆痰血肺陰肺氣已傷雖有表邪香薷用宜斟酌李暑邪內閉惡寒發熱脈象不達口不能言先有咳嗽此肺氣閉塞擬開而達之射干五分桔梗一錢連翹三錢豆豉三錢杏仁三錢象貝三錢香薷一錢橘紅一錢菖蒲五分竹茹一錢牛蒡子二錢玉樞丹四分磨沖安連日煩勞憂慮深暑邪傷氣易歸心神昏脈數細而沉病危甚邪悶心包如火如焚舌色干黃唇齒燥耳聾便泄津枯了三焦皆病須分曉究治療河間熱論宜參考鮮石斛竺黃連翹菖蒲赤苓北沙參通草益元散茉莉花竹茹薄荷葉蘆根鮮荷葉紫雪丹另調服李暑濕陰分之氣從口鼻肌表而入寒熱便泄頭脹擬芬芳逐穢分消濕熱方法藿香川朴焦六曲半夏茯苓陳皮澤瀉大腹皮砂仁通草仁淵曰兩日相合而成暑字暑為陽邪行役道途力作田間辛苦於烈日之中受天地炎熱之氣而病者名曰傷暑此外飧涼襲冷乘風露臥皆因避暑而感受寒風冷濕之邪雖病在暑天名曰暑濕其與傷炎熱之暑不同不得以暑邪名之前人有陰暑陽暑之論皆蛇足也然盛暑之時反多陰寒之病者何蓋天地之化盛極則變六陽盡泄一陰早寓乎其中地上則熱地下已寒人身小天地何莫不然且濕土司令濕濁為盛熱蒸濕騰濕熱相合最易感病故四時之病惟盛夏為雜寒濕熱濕霍亂瀉痢痧穢暑風名目不一隨其所感與其人之本體而變焉要皆暑天兼有之證非傷暑熱之正病也然證雖夾雜要不離太陰陽明脾胃兩經試思夏令用藥不外芳香辛淡苦泄雖有治心治肺治肝膽膀胱用寒用熱之不侔莫不為中焦脾胃開脫不但濕土司令主氣使然以脾胃屬土喜燥惡濕暑天之病無有不夾濕耳伏暑門李暑濕先伏於內涼風復襲於外交蒸互郁皆能化火濕遏熱伏其熱愈熾故其為瘧也先寒後熱日輕夜重經旨所謂先傷於熱後感於寒喻氏所謂陰日助陰則熱減而輕陽日助陽則熱甚而重也夫瘧之發必從四末始既必擾及中宮故心胸煩躁中脘痞塞又必先嘔吐而泄瀉瀉已乃衰腹中猶脹所以然者熱甚於中蒸熏水穀之濕上泛而復下泄熱勢得越煩躁乃安余濕復聚故仍作脹也今當瘧退脈弦帶數舌苔白膩小溲不爽本有胃寒痰濁素盛雖從未得汗表邪未解而病機偏重於里法從里治大旨泄熱為主祛濕兼之解表佐之是亦表裡分消三焦並治意葛根淡芩川連甘草蒼朮川朴橘皮藿香菖蒲赤苓澤瀉薄荷滑石鬱金竹茹淵按泄瀉嘔吐乃兼有之症非必有之症由暑濕穢濁郁遏中宮太陰失升陽明失降不克分化使然楊年過花甲病逾旬日遠途歸家舟車跋涉脈沉神昧舌強白中心焦身熱不揚手足寒冷氣短作厄便泄溏臭是屬伏邪挾積正虛邪陷之象深慮厥脫大黃人參製附子柴胡半夏茯苓陳皮淡芩澤瀉當歸枳實丁香柿蒂竹茹淵按虛象實象雜沓而至立方最宜斟酌如無實在把握還從輕面著筆否恐一誤不可收拾又症尚險重再望轉機桂枝柴胡人參白芍川連半夏枳實丁香陳皮蔻仁炙甘草竹茹又伏暑化燥劫津動風舌黑唇焦鼻煤齒燥神昏手指牽引今早大便自通據云病勢略減然兩脈促疾陰津消涸邪火燎原仍屬險象恐其復劇犀角羚羊角鮮生地元參蘆根鉤鉤鮮石斛六一散沙參連翹通草天竺黃枇杷葉竹葉珠黃散另調服陸外有寒熱超伏之勢里有熱結痞痛之形上為煩懊嘔惡下則便泄溏臭此新邪伏邪濕熱積滯表裡三焦同病也易至昏厄變端擬從表裡兩解佐以芳香逐穢柴胡生大黃淡芩枳實半夏川連栝蔞皮赤苓鬱金菖蒲蔻仁又投兩解法得汗得便竟安兩日昨以起床照鏡開窗看菊漸漸發熱熱甚神糊兩目上視幾乎厥脫逮黃昏神漸清熱漸減脈沉不起據述熱時舌色乾紅熱退舌色黃膩此乃濕遏熱熾將燥未燥將陷未陷但陽症陰脈相反可虞勉擬河間甘露飲滌熱燥濕之中更借桂以通陽苓以通陰復入草果祛太陰濕土之寒知母清陽明燥金之熱甘露飲去滑石白朮加茅朮草果知母薑汁蔥白頭某暑邪內閉不達神糊舌白恐其昏厥芳香透達為宜鮮藿香天竺黃菖蒲赤苓連翹益元散鬱金竹茹澤瀉另至寶丹一丸菖蒲湯化下又暑濕內蘊熱勢起伏胸痞泄瀉神糊心跳經行未止乃正虛挾邪慮其暈厥據云腹脹噁心且寬中理氣太無神朮散去草加茯苓澤瀉蘇梗葛根淡芩黨參柴胡砂仁通草竹茹某懷孕六月感暑熱伏邪噁心懊憹炎天居舟防其暈厥墮胎青蒿大腹皮半夏赤苓川朴淡芩焦六曲蘇梗陳皮鮮佛手某暑濕熱阻滯陽明積垢雖下尚未盡淨夜間熱甚神識沉迷所慮津傷化燥等變今以生津泄熱化濁佐之鮮石斛赤苓連翹香豉栝蔞仁大竺黃淡芩山梔菖蒲竹茹某伏暑為病濕熱居多陰虛之體邪不易達此其常也然陰虛大有輕重之分須知此症虛亦不甚邪亦不多耳鳴眩悸口渴胸痞微寒微熱脈形弦數未便大補亦不可重劑攻邪但得脈情無變可保無虞洋參半夏茯神甘菊花蔻仁青蒿陳皮鉤鉤刺蒺藜秫米豆卷竹茹胡伏暑三候神糊厄逆手肢微痙痰多舌白渴不多飲音低脈大而虛殊屬棘手今日忽周身乾燥而癢煩躁不安細詢病原從未得汗按仲景云汗出不徹身癢如蟲行皮膚中久虛故也吳又可云髮根燥癢心煩如灼名曰藥煩中氣虛也金匱云聲如從甕中出是中氣之濕也又按內經言微音低謂之奪氣由此推之明是中虛濁戀液涸痰蒙勢極凶危惟有和中宣化聽其胃氣自為敷布以冀萬一生機洋參三錢橘餅三錢甜杏仁三錢豆卷五錢蜜梅一枚北沙參三錢麥冬三錢枇把葉蜜炙二片薑汁少許上方取辛甘化濁酸甘化液考又可藥煩條中重用人參生薑和中宣化法有來歷某營陰素虧伏邪晚發熱勢起夥心嘈胸悶舌心光紅邊薄白瘧邪初起勢防加重豆豉赤苓半夏沙參桑葉青蒿黑山梔陳皮淡芩某症經九日熱勢起伏神糊舌乾黑此伏邪壅遏劫液入營之勢也高年最易昏痙之變鮮生地天花粉黑山梔犀角菖蒲香豆豉鮮石斛薄荷葉連翹蘆根天竺黃吳暑濕伏於太陰中焦陽氣不化神蒙若寐身熱不揚肢冷脈濡手指牽引舌根牽強風痰阻絡之象服過通陽益陰云蒸化雨之法病亦無甚增損然舌苔灰白厚指口泛甜味極甚中宮有濁陽不舒化仿縮脾飲醒中化濕濁濁化則口甜減陽舒則矇昧清黨參烏梅淡乾薑草果炙甘草砂仁茅朮大生地茯苓生薑大棗淵按據舌苔口甜而論濕痰阻遏中宮陽不舒化無疑黨參烏梅生地酸甘助陰膩膈大不相宜矛盾一至此乎手指牽引雖屬木燥土虛肝風內動當此上中焦濕痰蒙閉肺胃氣機不能舒布即欲養陰如胃氣不化何治病當先急者大者若頭痛醫頭便為庸手趙高年元氣素虧未病以前先已倦怠乏力微覺咳嗽五六日以來加以發熱熱勢起伏是有新邪乘虛而襲引動伏邪晚發也今診脈小數而虛乾咳欲嘔舌邊光紅根苔白掯熱甚無汗津枯邪戀慮其化燥神昏北沙參蘇子青蒿杏仁川貝牛蒡子前胡橘紅通草枇杷葉吳伏邪內蘊為疸瘧外發為流注入於肺則喘咳注於腸則便溏正虛不克支持幼孩當此易致成驚青蒿杏仁淡芩澤瀉荊芥象貝桔梗橘紅赤苓六一散雙鉤鉤童伏邪晚發朝涼暮熱頭痛胸悶舌白無汗似宜疏達至於腰痛眼花其陰內虧邪不易達恐致淹纏宜小心為是秦艽赤苓青蒿蘇梗杏仁甘菊花枳實杜仲薑汁炒豆豉桑葉顧病方三日外無大熱而虛煩懊憹反復不安寐則神思擾亂舌苔白膩噁心欲嘔腹中鳴響大便溏泄穢臭邪積在裡氣機不達用梔豉以發越其上陳朴以疏理其中葛以散之苓以泄之夏秫和胃而通陰陽陰陽交則得寐明日再議淵按起病即是濕痰挾滯阻遏中宮熱鬱不達之象勿謂外熱不揚而輕視之又伏暑至秋而發其發愈晚其伏愈深故其為病也大起而大伏熱一日退亦一日既非間瘧又非疸瘧疸瘧則但熱不寒間瘧則寒熱往來此症微寒發熱熱一晝夜而退退亦不清名之伏暑其說最通夫暑必挾濕濕蘊則化熱蒸痰痰不易出熱盛劫津也身重屬濕煩躁屬熱熱來口渴渴不多飲仍是濕遏熱熾見象舌苔白而乾枯是濕邪在於氣分氣虛故濕不易化也葉氏云舌白而薄者肺液傷也病方八日邪未宣達刻下用方無庸深刻但須解表而不傷正去濕而不傷陰清熱而不助濕生津而不礙濁中正和平耐心守服扶過兩候始冀漸安黑山梔連翹茯苓川貝通草北沙參滑石澤瀉豆豉枇杷葉鮮薄荷根淵按伏邪深重脾肺氣弱力不足以化達之故大起大伏耳馬幼稚伏濕挾積阻滯腸胃蒸痰化熱肺氣窒痹是以先瀉後咳繼以發熱今便泄已止更氣急痰嘶肺氣阻痹尤甚法當先治其肺恐肺脹生驚發搐其變有莫測耳葶藶子三錢萊蔔子三錢六一散三錢枇杷葉三片淵按遏重消痰瀉肺清熱化積即在其中又痰氣喘逆平其大半熱勢起伏退而復作時下多瘧須防轉瘧白蘿蔔汁一杯鮮薄荷汁半杯二味略煎去渣加入冰糖三錢煬化再以薑汁一滴沖服淵按此方更妙何伏暑挾積寒輕熱重已經月餘舌心焦黃舌邊白膩陽明積熱化火劫津煉濁成痰將至蒙閉至於脘痛拒按兩經攻下痛仍不減苔猶未化非清化不能蕩其實擬用涼膈散加味涼膈散鮮石斛川連兩下之後舌心猶然焦黃故仍可用下法然舌邊白膩必挾水氣涼膈散中再加半夏亦可陸伏邪挾積但熱不寒頭痛鼻血便泄稀水熱甚於里擬清裡解表法葛根芩連湯豆豉連翹枳實黑山梔鼻血便泄稀水知其為熱不用犀角者其舌苔白也不用大黃者其脘腹按之不痛也李伏邪濕熱內蘊三焦氣機不達午後發熱胸悶頭脹尿少無汗舌苔白膩脈象軟細擬開上疏中滲下仿河間法豆卷杏仁陳皮藿梗滑石赤苓桔梗半夏焦六曲川朴通草胡素有痰飲咳嗽今夏曾經吐血是肺受熱迫也茲六七日來伏暑內蘊涼風外襲病起先寒栗而後大熱熱有起伏表之汗不暢里之熱不退所以然者痰飲阻於胸中肺胃失其宣達故耳舌色底絳望之黏膩心苔白厚如豆大者一瓣此即伏暑挾痰飲之徵而況氣急痰嘶乎據云二十六日便泄數次至今大便不通按腹板窒卻不硬痛小溲先紅濁今則淡赤不渾乃濕熱痰濁聚於胸中因肺金失降不能下達膀胱故濕濁上逆為痰氣喘嗘之候病機在是病之凶險亦在是法當從此理會滌痰泄熱降氣清肺乃方中必需之事但清肅上焦尤為要務耳葶藶子鬱金川貝杏仁枳實羚羊角膽星連翹赤苓竹油枇杷葉滾痰丸入煎絹包陳餘邪余積留戀未清元氣元陰消耗欲竭暫停苦口之藥且投醒胃之方化氣生津忌夫重濁變湯蒸露法取輕清效東垣以化裁希弋獲以圖幸清暑益氣湯荷葉香稻葉蒸露每晨溫服四五杯淵按湯丸膏散古人各有意義非徒具虛文若變湯為露法取輕清惟大邪去而胃氣不勝苦藥者宜之此處恰合徐熱伏心胸濕蘊脾胃病起如瘧延今兩月胸中熱悶飲食不思從未得汗舌色底絳苔如醬瓣此即濕遏熱伏之驗也無汗者津液虧徒發其汗無益也生津徹熱化濕開胃胃氣敷布其汗自來川連黑山梔豆豉廣皮香薷麥冬赤苓薄荷生薑六一散此藥煎好露一宵早起溫服浦伏邪挾積阻塞中宮瘧發日輕日重重則神糊煩躁起臥如狂此乃食積蒸痰邪熱化火痰火上蒙包絡怕其風動痙厥脈沉實而舌苔黃邪積聚於陽明法當通下仿大柴胡例備商柴胡淡芩川朴枳實生大黃栝蔞仁半夏又下後熱淨神清竟若脫然無恙惟是病退太速仍恐變幻莫測擬方再望轉機川連薑汁炒陳皮半夏淡豆豉淡芩枳實鬱金栝蔞仁六神麯竹茹病退太速仍恐變幻老練之言宜省凡下後方法總以瀉心加減仍用栝蔞枳實何也蓋因胸痞未舒舌苔未化故耳又昨日瘧來手足寒冷即腹中氣撐上塞咽喉幾乎發厥但不昏狂耳此乃少陰瘧邪內陷厥陰上走心包為昏狂下乘脾土為腹撐脾與胃為表裡前日昏狂病機偏在陽明故法從下奪今腹脹舌白脈細病機偏在太陰法當辛溫通陽轉運中氣為要隨機應變急者為先莫道用寒用熱之不侔也淡芩半夏陳皮茯苓熟附子川朴丁香檳榔草果白蔻仁通草前方用寒後方用熱隨症用藥轉換敏捷不避俗嫌的是一腔熱血淵按少陰陰邪上凌君火下乘脾土經所謂有餘則制己所不勝而侮己所勝案亦老練必如此轉語方不為病家指摘否則雖有熱腸亦招謗怨又投薑附達原神香二陳合劑喉中汩汩痰聲頓時即平腹脹遂松今脈緩大神氣安和腹中微覺脹滿痰多黏膩脾臟陽氣雖通寒熱痰涎未化仍宗前法輕減其制前方去附子檳榔加大腹皮又腹中之氣稍平濕熱餘邪未盡所以微寒微熱仍歸瘧象頭脹身痛知飢能食法擬疏和兼調營衛二陳去甘草豆卷青蒿秦艽焦六曲穀芽生薑紅棗仁淵曰暑邪與溫邪異伏暑亦然當暑感而即發者為暑邪暑天受暑濕之邪不即發秋後復感涼風閉其汗孔欲發不能速發外則形寒內則發熱寒熱起伏無已有類乎瘧為伏暑古人謂往來寒熱屬少陽余謂暑濕伏邪往來寒熱全由脾胃為病少陽膽甲因脾胃失化波及之耳蓋脾為陰土惡濕喜燥澡則升化濕鬱之而不得升胃為陽土惡熱喜涼涼則順降熱阻之而不得降升降窒滯故多胸腹痞悶木寄土居土失溫涼木不條暢必然之勢濕重者多寒熱甚者多熱熱則消水而口渴濕鬱於中又渴不多飲濕熱互蒸胃濁不化舌苔每布白膩底絳者熱為濕遏也淡白者濕勝也化黃化燥化灰熱勝於濕濕亦化燥化火也胸腹痞滿板硬拒按或挾痰挾食視其人之本體及所感之輕重而為變遷論治初病以苦辛芳淡為正軌徒為發汗無益蓋苦能泄熱辛能通氣芳可解鬱淡可利水使中宮郁遏通解不汗自汗不便自便為邪在氣分治法入營則不然若初入營分猶可透營就氣仍從氣分而解已陷營分昏蒙狂囈犀地牛黃至寶之類亦所必需劫津化燥痞結硬滿邪實陽明救陰通腑與溫邪同治但溫邪從溫化火火退而病解伏暑從濕化燥燥去而濕或再來所以然者濕雖化燥終屬陰邪且濕最傷中中虛而陰濕易生故清到六七須為審顧下法亦有不同溫邪可下宜速伏暑可下宜緩溫邪下之邪清伏暑下之邪未必清溫屬火為陽性速暑夾濕多陰性遲溫邪陽明兼少陰者多伏暑兼太陰者多也甚有大便半月不通胸腹痞滿仍屬無形濕熱而不可下者總宜驗舌若厚白而未化黃燥者雖滿亦不可下下之不但邪勢不服中氣大傷更為難治須識氣通病解四字其於治伏暑思過半矣再者熱雖灼而汗少苔雖燥而灰黃若渴飲不多或多而胸痞涼苦可用須佐芳香若龜板鱉甲鮮石斛鮮生地等清滋沉降宜慎每見愈投愈燥者矣其故由暑必夾濕中氣不升化清滋抑遏而邪愈不化也瘧疾門嚴年屆六旬元氣素弱向有肝氣近患三瘧兩月以前先受伏暑小愈之後三瘧遂作脈弦肝胃尤甚木勝胃土惡谷厭納痰多嘔惡心跳少寐便閉溺赤蓋胃氣一虛百病叢生矣高年雖大便兩旬不通未可以通陽為務培養中氣啓胃化痰是為扼要調和營衛退其寒熱佐之黨參冬朮茯苓半夏陳皮當歸桂枝淡芩棗仁澤瀉穀芽鹿角霜生薑紅棗上方以六君子湯坐鎮中宮補脾健胃氣運則痰濕自化氣旺則津液自生合入當歸桂枝和營散邪更復鹿角霜之通陽者以治背獨惡寒再加黃芩以泄熱監製桂鹿之辛溫使無偏畸不失調和之義棗仁安神澤瀉去濕穀芽醒胃薑棗調和營衛皆佐使之助耳某大瘧百日營衛兩虛胃為衛之本脾乃營之源胃陽虛則胸腹時痛而吞酸脾陰虛則經事愆期而盜汗補脾胃以化其瘧痰和營衛而退其寒熱營衛一和盜汗自止黨參薑汁炒冬朮土炒半夏茯苓陳皮川連吳萸三分煎汁拌炒制首烏白芍桂枝三分煎汁拌炒煨姜紅棗吳三瘧一載有餘經停將及兩載腹中脹滿有塊作痛是血先凝結於前氣復阻滯於後加以寒痰積聚中氣失運法當先運其中六君子去炙草加木香當歸川朴生薑茺蔚子紅棗石三瘧久而痰涎聚肝膽逆而鬱火盛以致發狂今狂已退痰火猶未全除擬化胃經之痰平肝膽之火半夏茯苓橘紅牡蠣淡芩川貝牛膝鱉甲白朮土炒竹茹鉤鉤徐盜汗便溏心脾之病也脾氣不運則便溏心陰不守則盜汗大瘧日久寒熱仍作營衛不調補心脾和營衛歸脾湯加減治之黨參黃耆冬朮熟地白芍砂仁六曲棗仁歸身茯神木香牡蠣浮麥紅棗淵按運脾氣補脾陰和營衛溫督脈前數方皆虛瘧久瘧治法營久患瘡疥濕熱浸淫復因外感暑濕為瘧纏綿不已變為三瘧診脈濡小其濕仍戀而元氣漸傷慮加腹滿宜早圖之然須安逸忌口為要白朮半夏赤苓陳皮大腹皮川朴神麯藿梗蔻仁通草雞距子此用正氣散去甘桔蘇芷加通草蔻仁疏通氣分之濕用雞距子以解酒濕朱厥陰過升陽明失降瘧成煩悶痞嘔當變柴胡制而為瀉心法和陽明即所以和少陽也川連薑汁炒半夏廣皮藿梗白蔻仁竹茹薑汁炒此人舌苔半邊白如水晶粉團必有痰飲後於此方中加生薑三片其嘔即止淵按本不當去生薑若去之便失南陽制方之義矣莊但熱不寒此為牡瘧柴胡桂枝湯主之柴胡桂枝半夏伏苓陳皮川朴草果炙甘草生薑紅棗又瘧髮間日但熱不寒口膩多涎乃寒痰鬱於心下陽氣不得宣越故也蜀漆桂枝半夏陳皮茯苓羌活菖蒲另獨頭蒜六枚黃丹六分雄黃五分共研末為丸清晨朝向東分五服開水送又舌白胸悶背寒獨甚擬宣通陽氣以化痰濁麻黃湯合二陳湯加鹿角霜石菖蒲又瘧止當調胃氣半夏茯苓炙甘草陳皮白蔻仁生薑紅棗孫間瘧變為大瘧其寒也三日一作其熱也日無間斷此衛氣不得疏通邪痹不達是屬衛實而營虛營虛故內熱不止也擬和營衛以祛邪桂枝白芍柴胡半夏赤苓天花粉淡芩陳皮生薑紅棗徐左脈細弦肝腎虧也右脈軟弱脾胃虛也三瘧之後氣血兩虧補肝腎調脾胃養氣血必得安逸少勞而後可也黨參大熟地杜仲枸杞子冬朮茯神歸身陳皮白芍生薑紅棗王三瘧止作延及五年營衛之不調脾胃之不和肝腎之不足不言可知矣近今月經頻至且多而有血塊腹反脹滿何也夫血之與氣猶權衡也和則平偏則病一勝必一負血去多則血虛血虛則氣旺非真氣之旺也氣無血以涵之則氣肆橫而有似於旺耳蓋瘧久必傷脾脾傷則肝亢脾統血肝藏血肝亢則血不藏脾虛則血失統故經事頻來而仍有血塊者肝亢則火熾下焦衝任之血受其迫燥欲下而不盡下故凝而為瘀瘀則結塊也圖治之方藏統肝脾之血而固衝任之經一層調其氣之肆橫而致和平又一層是治月事與腹滿之法至於理脾胃調營衛又為三瘧久纏之治合而成劑不出求本之圖黨參元米炒冬朮川朴五分拌炒香附醋炒丹參陳皮茯苓烏藥鱉甲當歸炭白芍桂枝三分拌炒茜草炭烏賊骨漂淡鮮生地渣薑汁炒焦姜渣鮮生地汁炒焦鱉甲煎丸十五粒藥汁送下淵按因脾氣傷而血失統血去舍空其氣更失所依故腹益脹滿調養脾氣治脹即所以攝血潤養肝陰固血即所以涵氣妙在交加散清血熱而不寒滯通營氣而不辛散其心思識力超越尋常若辛香耗氣以治脹苦澀涼膩以治血則失之遠矣葉瘧為少陽病少陽者膽與三焦也膽失清寧則煩而不寐三焦失其輸轉故胸悶而大便帶溏口膩味甜熱甚煩悶熱處濕中故熱愈甚也擬溫膽法半夏茯苓陳皮棗仁枳殼天竺黃川朴青蒿秫米佩蘭竹茹曾浴出當風腠理閉塞水氣舍於皮膚之內與衛氣戀而不化變為三瘧瘧發不透濕熱內走經絡四肢無力微微內熱是半虛半實之症和脾胃化濕熱通經絡達肌表標本兼治茅朮半夏香薷茯苓秦艽獨活澤瀉防風川朴陳皮通草姜皮生苡仁奚三瘧發於夜而漸移至日中原有自陰出陽之象今屆春深陽氣升發當助其升舉參以化痰為法柴胡防風茯苓丹皮杜仲冬朮制首烏半夏陳皮牛膝黃大瘧十番寒熱雖輕而邪陷入於三陰治必從中以達外體質雖虛未可便投補藥仿王晉三加減達原飲柴胡川朴半夏茯苓當歸草果川貝花檳榔陳皮紅花童大瘧日久小愈復作寒熱雖輕其根不斷根者何水飲痰涎是也欲治其根必溫中土用四獸飲加減六君子湯加烏梅草果蜀漆炭尤久瘧之後脾虛木鬱痰阻氣滯胸悶噁心頭眩心嘈經事不調擬舒木鬱兼以化痰柴胡石決明半夏陳皮當歸炙甘草茯苓丹皮砂仁薄荷又投逍遙合二陳法木鬱稍舒痰氣稍化今從前法加減柴胡炙甘草杏仁冬朮陳皮半夏焦山梔茯神砂仁吳瘧不離乎少陽即兼陽明太陽亦必使其還返少陽而後已今預於瘧發之前先用柴胡引入少陽之界則邪氣從樞轉出矣小柴胡湯去參棗加知母草果陳皮淵按仲景小柴胡治傷寒往來寒熱非治風瘧往來寒熱風瘧與傷寒判若天淵後人往往借用積習深矣風瘧早用柴胡必糾纏難愈須中焦濕熱半化或秋深邪深乃合又瘧脈自弦弦大者為陽其邪易達今瘧來熱勢稍輕而短邪有退機矣仍從前法照前方加沙參茯苓通草又瘧勢漸衰當和中氣以化痰濁養心陰合病體標本而施治也沙參陳皮麥冬炙甘草冬朮半夏扁豆棗仁茯苓生薑淵按瘧病最忌扁豆想未知之耳奚三瘧變為日作延來兩月有餘今則熱發於夜口乾汗少邪戀營分其陰已虧而又胃弱納少懷孕半身恐其正虛不克支持姑擬和胃扶正達邪黨參制首烏冬朮茯苓川朴天花粉柴胡防風陳皮淡芩丁三瘧久延營衛兩傷復因産後下焦八脈空虛今病將九月而瘧仍未止腹中結塊偏左此瘧邪阻於血絡聚於肝募是屬瘧母淹纏不已慮成瘧勞夏至在邇乃陰陽剝復之際瘦人久病最怕陰傷趁此圖維迎機導竅和陽以生陰從産後立法稍佐搜絡以杜瘧邪之根制首烏冬朮白芍杞子當歸地骨皮青皮川芎香附烏梅另鱉甲煎丸每日服十粒用四物去地換首烏從産後血分立腳淵按産後陰血固屬虛耗然久瘧而至結塊必濕熱痰涎伏膜原未化此方宜斟酌之又三瘧日久腹中結癖夏至前和陽生陰通調營衛參入搜絡方法節後三瘧仍來但熱勢已減癖塊略小然口乾心跳營陰大虧情懷鬱勃多令化火傷陰木曰曲直曲直作酸瘧來多沃酸水蓋肝木鬱熱挾胃中之宿飲上泛使然夫養營陰須求肝潤理肝鬱必用苦辛久瘧堪截癖塊宜消惟是體虛胃弱諸宜加謹為上黨參冬朮鱉甲醋炒當歸茯神棗仁香附三稜醋炒川連吳萸炒牡蠣陳皮淵按膜原所伏之邪見矣又丸方川貝半夏知母共研細末薑汁醋各半泛丸每朝三錢開水送曹勞瘧因勞碌而發寒熱似瘧淹纏不已慮變瘧勞舌苔白而乾燥胃燥氣傷也法當益氣生津用益氣補中意黨參黃耆冬朮炙甘草麥冬歸身陳皮青蒿五加皮生熟穀芽張間瘧寒熱舌苔滿白用柴胡達原飲柴胡黃芩半夏青皮花檳榔草果川朴茯苓生薑舌苔滿白邪伏膜原必用檳榔草果若舌苔白而燥者忌用仁淵曰瘧證甚多所感不同命名各異內經言之詳矣而諸瘧中風瘧最多經謂夏暑汗不出者秋成風瘧乃暑天喜當風取涼露臥濕地受冷濕熱濕之邪不使隨汗泄出秋後涼風閉其汗孔瘧始發矣前哲云瘧不離少陽其實不然夫伏暑與瘧同一邪耳寒熱間斷者為瘧不斷者為伏暑但伏暑雖重於瘧其伏較淺瘧雖輕於伏暑其伏較深伏暑邪在太陰陽明不涉膜原者多瘧疾涉膜原者多惟邪伏膜原所以糾纏不清膜原二字古人多未講明夫膜在臟腑之外肌肉之裡乃肌肉之裡層皮也俗名膜壑原乃經穴六腑皆有之經謂橫連膜原言不但邪在臟腑並橫及於肌肉之裡而伏於膜壑之原伏甚深矣亦太陰陽明所主所謂少陽亦猶伏暑之寒熱往來脾胃升降失職木鬱不達耳惟脾胃失化濕濁阻遏所以瘧必有痰痰即濕飲故瘧發時能嘔出黃涎苦水其愈較易治能開其中焦化其濕飲最為先著觀古人清脾休瘧四獸等方無不為開中化痰立法即久而為瘧母為黃疸中滿皆濕熱痰濁糾結不化傷其脾胃所致即各種瘧疾所因不同所治各異要不離太陰陽明脾胃也脾胃一病痰濕自生諺云無痰不作瘧其信然歟痢疾門馬高年下痢一日夜百餘次舌苔白掯身熱噁心診脈細飲食不納痢下五色皆為忌款敗毒散法初起的是然須人參扶正和胃若喻氏痢疾門中五色噤口不治者多尚祈商政是荷參鬚敗毒散陳米荷葉包石菖蒲苗濕傷於下風傷於上熱處於中濕夾熱而成痢痢下紅血濕熱傷血分也風夾熱而咳嗽痰稠舌白風熱傷氣分也從手太陰陽明一臟一腑立法豆豉荊芥炭黃芩薄荷焦六曲桑葉黑山梔杏仁桔梗薤白頭赤芍通草孫濕溫邪陷厥陰下痢色紫後重左脈沉小右脈弦大舌黃晡熱是陽明積熱內戀而木來乘土高年體虛神怯防其厥脫沙參川連白頭翁升麻淡芩焦六曲川朴通草楂肉秦皮葛根金銀花白芍砂仁又前方升陽明泄厥陰以提下陷之邪今改用敗毒法祛其邪從表解即喻氏逆流挽舟之意也人參敗毒散去薄荷生薑加神麯陳米煎湯代水又舌苔灰黃腹痛下痢是陽明濕熱積滯而倦怠音低正氣大虛飲食不納慮延噤口重症仍以苦辛寒化腸胃之濕熱而開通其氣冀其谷進熱和痢減為妙北沙參川石斛川連木香石菖蒲川朴枳實滑石白芍淡芩焦楂肉陳皮荷葉鮮藕又下痢不減胃氣略開病將半月高年元氣內虧濕熱未化深恐生變沙參淡芩川連川朴枳實白芍廣木香木瓜西洋參茯苓通草荷梗又痢將半月色如敗醬腹痛後重舌苔灰黃濕熱膠滯腸胃不和納穀殊少高年防其虛脫西洋參川連陳皮六神麯穀芽青皮當歸白芍地榆炭淡芩砂仁茯苓皮又考治痢方法因於暑濕熱阻滯腸胃者不出苦辛寒藥疏通理氣若胃不納者謂之噤口痢九死一生今高年體弱胃不納穀舌色灰黃身熱腹痛既不可補又難用攻只得宣通化滯開其胃氣白頭翁湯加枳實紅曲白芍青皮楂肉炭木香荷葉蒂茉莉花蒂砂仁半生半熟炒研稻葉某紅痢日久脾氣必虛營氣必耗前方理中湯下駐車丸頗驗奈輕聽人言服紅曲滑石末致痢復劇脈遲緩而澀舌薄白而底絳渴不貪飲口惡甜味素體多濕今脾陽失運濕又動於中矣徐靈胎云血痢挾濕者胃風湯最妙醫歸痢疾門亦採是法八珍湯去地草加肉桂升麻粳米淵按理中湯溫運中陽駐車丸分導濕熱從脈象遲澀看出紅曲滑石適與相反李久吃洋烟脈沉而細病方三日微寒微熱頭略脹痛晝不痢痢在夜是屬寒邪而反色赤者寒傷營也當以和營散寒溫通陽氣為法勿與常痢同治防風根白朮陳皮木香白芍桂枝三分煎湯炒炮姜砂仁服二劑愈應手之至淵按脈細肢寒晝不痢痢在夜乃脾陽不能統攝營陰也蔡右脈細弦木侮土也左脈細弱腎水虧也病由肝氣而起水不涵木也茲患下痢赤白木勝土衰濕熱不化也華先生用補中升陽參入育陰從本求治極有見地鄙意再參溫化乃兼顧脾腎之陽氣也黨參茯苓冬朮歸身阿膠杜仲白芍炮姜木香川連神麯菟絲餅尤伏暑挾積濕熱內蘊胸痞嘔惡發熱舌燥通腑之後變為下痢痢色紅白膩凍飲食不納慮成噤口須得胃開谷納痢減不嘔為妙高年頗為重症川連淡芩白芍陳皮青皮茯苓焦楂肉川朴沙參砂仁穀芽玫瑰花此病兩脈虛濡脾胃元氣大弱似宜參入扶正為善然下痢古稱滯下起於濕熱居多早補早斂往往受纍此河間苦辛宣通腑滯之法所以為痢門必採之方若補陰陽治脾胃多為久痢而設也宋遠行傷飢飲酒傷胃而成休息下痢痢經兩載不愈許學士香茸丸最妙今師其意變湯服之杜仲菟絲餅丁香當歸白芍炮姜鹿角霜木香茯苓砂仁陸脈經云代則氣衰細則氣少多指陽氣為言今下痢而得促脈脾胃之陽微特著況形衰畏冷而小便清長者乎惟是下痢赤者屬血分腹中痛為有積立方從此設想尋其罅而通之補之亦治病之機巧也附子枳實理中湯送下駐車丸薛先患紅痢續加以瘧又變泄瀉瀉止仍痢兩月有餘脈弦硬晝無小便每交子後至辰便痢數次小溲亦得稍通此伏暑濕熱蘊於腸胃及厥陰厥陰之表便是少陽故先見熱痢後兼瘧象乃厥陰少陽表裡同病也瘧後大便溏泄者少陽木邪侮土也瀉止而瘧痢仍作者胃氣強旺土不受邪仍還厥少兩經也小便少者陰氣虧則滲愈少當滋其化源也今清厥陰之熱而舉清陽兼益腎之陰運脾之濕從白頭翁合胃風湯意白頭翁湯加防風白朮白芍五味子大熟地伏苓神麯穀芽北沙參淵按議論如秋月寒潭開後學心思不少方亦精妙王厥陰有寒腸中有熱少腹冷痛下痢紅黏身熱肢寒汗出舌膩噁心不食慮成噤口擬辛通厥陰之寒苦泄腸中之熱用姜萸當歸四逆湯加香連芩楂主之桂枝白芍吳茱萸炮姜炙甘草木通當歸川連木香黃芩楂肉炭砂仁淵按有熱深厥深之象乃濕熱積重遏腸胃氣機不得通化宜佐通因通用法使膠黏之邪速去範肝胃不和濕熱積滯為痢痢延半載仍脘腹脹痛噁心治以苦辛泄肝和胃佐以分消運化川連茯苓川朴木香楂肉青皮陳皮砂仁赤芍白芍另用駐車丸三錢烏梅丸一錢相和服又痢減腹仍痛肝胃未和也現值經來脈弦寒熱血虛木鬱擬養血疏肝八珍湯去草加香附木香陳皮神麯砂仁另駐車丸烏梅丸歸脾丸各一錢相和服張便痢白膩如水晶魚腦色小便不利少腹偏右板窒諸醫以為腸癰固以相似然考腸癰為病有寒有熱金匱並出二方如大黃牡丹湯苡仁附子敗醬散概可見矣但此症則屬寒積脈弦緊而數面色青而不渴宜用溫通肉桂五苓散加楂肉砂仁又溫通已效仍從前方加炮薑木香又欲溺不爽溺後氣向下墜便痢白膩雖稀然腰尻痠痛如折全屬陽虛氣陷之象仿東垣參入前法西黨參升麻冬朮肉桂茯苓澤瀉炮姜木香訶子煨砂仁生鹿角此方連三劑大便白膩全無脾胃已開按此症並非腸癰乃寒積下痢耳因諸醫皆云腸癰只得委曲周旋但從腸癰有寒有熱輕輕轉筆折入溫通方法既不礙醫又與病相合不得不然之事也故志之某休息痢將及五年腹中塊壘時痛痢下仍兼干糞脈弦遲苔灰白此虛而有寒積也本事方云痼冷在腸胃泄瀉腹痛宜先取去然後調理不可畏虛養病此症的是姑擬一方備採信則服之疑則勿服參鬚三錢熟附子三錢乾薑二錢炒甘草錢半當歸錢半酒炒大黃三錢酒炒川朴三錢枳實三錢土炒元明粉二錢共研細末蜜水泛丸每日三錢砂仁湯送下淵按痢疾濕熱未清早服兜澀往往延成休息用溫下法頗為合拍但大黃分量宜重一倍否則不但積不去且不敵薑附之溫燥耳張症有變遷治無一定痢疾多由積滯而煙客中氣素虧腎氣亦損小溲不利腎虛陽氣不化也舌紅無苔腎虛陰津不升也腹不痛無積可稽氣下注清陽下陷種種虛象所以淹纏不易奏功夫有胃則生古人是訓而大煙傷氣剝削可虞故煙痢一症醫家難以著手諸宜自愛謹慎為上熟地炭白芍川芎炭肉桂澤瀉歸身炭黨參元米炒冬朮茯苓蜜炙粟殼淵按熟地不宜炒炭某泄痢白膩腹不痛脈沉細此寒也宜溫之吳茱萸茯苓木香陳皮炮姜六神麯焦白朮訶子烏藥砂仁李河間論痢屬熱者多而景嶽論痢屬寒者不少此症腹不甚痛但肛痠且脹脈緊肢寒並不發熱兼素有寒疝苔白不渴寒象為多宗景嶽論治之吳茱萸茯苓炮姜木香炙甘草焦六曲陳皮砂仁邢休息痢必有積延來兩月近今發熱濕熱鬱蒸於腸胃痢色或白或赤化濕熱以運中州疏積滯以和氣血勿以為日既久遽投固澀也白朮川連白芍木香當歸茯苓廣皮楂炭升麻澤瀉防風另資生丸補中益氣丸駐車丸等分相和一處每朝服三錢開水送下徐紅痢匝月仍腹痛後重據云先曾發熱三次此屬中虛表邪傳裡現今脈細肢寒太陰陽氣已弱小便艱難膀胱氣化又鈍擬開其中焦化其濕熱兼升陽解表亦表裡雙解之法也柴胡桂枝茯苓澤瀉川連木香白朮黨參砂仁炮姜炙甘草張瘧後勞碌感寒瘧邪復發更加紅痢後重此中虛氣陷濕熱未楚也用敗毒散活人敗毒散加神麯楂炭陳皮許熱伏營中久痢純血腰疼腹痛舌苔薄白底絳兼有紫點此屬濕熱挾瘀之候病將一載法以鹹苦通澀兼施杜仲鹽水炒阿膠川連炒川斷鹽水炒黃柏鹽水炒地榆炭白芍防風根炙升麻當歸生熟砂仁又投鹹苦通澀之劑諸恙皆減仍宗前法增損原方去黃柏防風加熟地淡芩醋炒荷葉蒂高三瘧汗少邪不外達飲食不節變增泄瀉今竟下痢紅白黏膩自來體質氣虛多濕最怕淹纏急宜忌口為要羌獨活柴胡前胡川芎花檳榔萊蔔子陳皮炙甘草茯苓山楂炭焦六曲木香砂仁金紅痢三年腹左結塊板硬不移按之則痛漉漉作聲即便下痢此瘀凝寒積久留於腸腑當以溫藥下之蒼朮炭川熟附枳實炭地榆炭茯苓當歸通草桃仁炒黑研大黃酒炒仁淵曰潔古芍藥湯亦治痢要方濕熱積鬱結腸胃甚者宜通下以開壅塞使邪不久留正氣不致大傷何數十證無一及之者或未遇此等耳夫痢疾古名腸澼夏秋濕熱居多邪壅腸胃重而經絡輕者成痢腸胃輕而經絡重者為瘧疾伏暑亦有經腑同病寒熱痛痢並作者初宜苦辛芳淡通而化之挾表則活人敗毒散積重痛甚者因而竭之潔古芍藥湯病有寒熱虛實藥有補瀉溫涼非一法所能概也若噤口不納者難治乃濕熱傷胃邪勢捍格絶不思谷治法雖多須中氣尚有根柢猶或可治煙痢亦難治因久吸洋烟腎精脾氣先已告困逮痢疾一發勢即不支故諸藥不效耳初起視其正尚可支急為逐邪切勿倣徨輾轉三五日後臟真傷而津氣竭欲攻不能欲補不可即棘手矣若邪正並急尤宜舍邪顧正或溫補脾胃或清補氣液佐徹邪一二味能受即是生機否恐邪未化而正已脫但不可早用兜澀無益而害之蓋兜澀莫過洋烟洋烟不靈豈禹糧石脂訶粟榴皮能為力乎苟元氣津液可恃邪不自容痢中自有去邪邪化痢止必然之理虛不受補者死且胃氣亦不可恃平人能納穀者雖重可治煙痢脾腎臟真受傷雖能納穀不過稍延時日待胃敗則死耳蓋脾為倉廩後天之本腎為先天二陰鎖鑰故也根柢一壞神丹莫挽矣論脈弦急大者死緩弱者生須看其所下何如若虛坐努責或紫水敗醬雖腹痛後重虛象大著矣切勿再進苦寒傷胃宜溫運脾腎疏達肝木木達氣升其痛自止痢隨痛減胃氣亦醒達木用肉桂最妙蓋甘緩辛通發散為陽最能暢達鬱結也黃疸門王兩目身體皆黃小便自利色清此屬脾虛非濕熱也名曰虛黃黃耆一兩白芍三兩伏苓二兩地膚子二兩酒浸服周伏暑濕熱為黃疸腹微痛小便利身無汗用麻黃連翹赤小豆湯表而汗之麻黃連翹杏仁淡豆豉茵蔯草赤苓川朴枳殼通草六神麯炒赤小豆一兩煎湯代水朱濕熱內走太陰遍體發黃肌膚粟起小便黃赤與茵蔯梔子柏皮湯茵蔯連翹赤苓大黃澤瀉黑山梔黃柏淡芩通草曾脈形乍大乍小面色暗晦不澤似有一團陰氣阻遏於中苔黃而濕腹滿足腫小便黃赤又有濕遏熱伏之形色症合參是屬女勞黑疸變為腹滿在法難醫姑擬泄腎熱以去脾濕仿金匱法冬瓜皮桑白皮地骨皮生薑皮黃柏川朴茵蔯陳大麥柴煎湯代水施三瘧止而復作腹滿平而又發今目黃脈細面黑溺少防延黑疸然疸而腹滿者難治姑與分消製附子大腹皮陳皮麥芽綿茵蔯赤苓滑石焦山梔通草栝蔞皮淵按疸而腹滿前人未言其故余謂肝脾臟氣兩傷木土相剋也故難治又面色黎黑腹滿足腫脈沉而細此脾腎之陽不化水濕阻止於中證勢甚重且與通陽燥濕四苓散加肉桂川朴陳皮大腹皮焦六曲細辛香櫞皮麥芽黃面黃無力能食氣急脫力傷脾之證也用張雞峰伐木丸皂礬一兩泥土包固置糠火中煨一日夜取出候冷礬色已紅去泥土淨川朴五錢茅朮一兩米泔浸切炒製半夏一兩陳皮二兩鹽水炒茯苓一兩炙甘草五錢共研細末用大棗肉煮爛為丸每服二錢開水送飲酒者酒下此方頗效仁淵曰黃疸亦濕熱鬱遏之病與伏暑瘧疾同一來路古人謂如盦醬濕熱壅遏不泄所致但有陰黃陽黃女勞谷酒之分同是濕熱陽黃則黃色鮮明脈大口渴其證多實治如茵蔯五苓平胃梔子柏皮等甚則茵蔯大黃之類開化中宮分泄濕熱從小便而出其黃自退陰黃則脾腎陽氣素虛不能升化其邪黃色暗晦脈細皮寒口不渴分化濕熱宜佐通陽理脾如茵蔯五苓佐理中真武之類谷疸則食傷脾胃酒疸則酒傷肺脾皆濕熱阻而不化各有所主女勞黑疸最為難治乃內伏濕邪更傷女勞而得腎精大傷根本已壞濕熱之邪深伏厥少正氣不能勝任故也又有虛黃一證並非黃疸乃中虛木勝土色發見於外其黃色淡白小便不變脈弱口淡能食而無力俗名懶黃乃勞倦內傷之症宜崇土疏木調補中氣如補中益氣之類諸黃證雖以分泄濕熱為主尤須察其陰陽虛實有無兼證而調之始為盡善
