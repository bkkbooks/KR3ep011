body:
  text: 卷之四咳嗽門卜心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹蓋因風溫襲肺引動心包之火上逆故治法仍宜宣散肺經風邪參入寧心緩火之品仲景方法略示其端但語焉而未詳後人未細審耳前胡杏仁象貝桔梗射干遠志甘草湯制麥冬沙參小麥一兩煎湯代水微妙在此一味淵按非深入仲景堂奧不能道用宣散肺金風溫之方加小麥一兩清心熱即補心虛何等靈敏胡咳嗽嘔吐痰濃頭痛風熱上蘊肺胃失降前胡杏仁蘇子橘紅款冬花桑白皮防風桑葉冬瓜子丁形寒飲冷則傷肺兩寒相感中外皆傷故氣逆而為咳嗽自秋冬歷春夏每每夜甚氣升不得臥近來吐血數口是伏寒化熱而陽絡受傷矣祛其伏寒退其伏熱必兼降氣化痰紫菀杏仁款冬花橘紅川貝茯苓桂枝淡黃芩桔梗半夏桑白皮枇杷葉胡肺有風邪則咳胃有濕痰則滿腎虛則腰痛肝虛則目花既不可徒散亦未可徒補擬兩顧法蘇子降氣湯去桂枝加茯苓玉竹穭豆衣桑葉胡桃肉枇杷葉某素有寒嗽時發時止上年歲底發時寒熱六七日方止至春初喉痛三日聲音遂啞而咳嗽作總因風溫襲於肺部宜宣邪降氣冀免喘急旋覆花荊芥杏仁款冬花前胡蘇子枳殼川貝川芎桔梗蛤殼枇杷葉許寒嗽交冬則發兼患頸項強急大熟地六錢麻黃一錢煎汁浸炒鬆茯苓三錢細辛五分煎汁浸炒胡桃肉四錢五味子八分淡姜一錢同炒陳皮二錢鹽水炒半夏錢半炒川貝三錢款冬花三錢苡仁四錢杏仁霜三錢歸身三錢酒炒黨參三錢元米炒上藥為末煉蜜為丸每晨開水送下三錢淵按久嗽宜此方若頸項強急未免有外風襲三陽經也何不以湯劑兼治之僧咳嗽七八年咳甚必汗出近半年以來痰中見血兩次肺氣腎陰虧損矣慮加內熱延成勞怯大熟地歸身蛤殼北沙參麥冬川貝甜杏仁蘇子桑白皮炙甘草枇杷葉又久嗽肺腎交虛猶幸胃氣尚旺法以金水同治冀精氣漸生大熟地歸身炙甘草潞黨參桂枝款冬花炮姜麥冬半夏阿膠蛤殼此方炙甘草合麥門冬湯病由寒伏肺底致成咳嗽日久傷及精氣故於滋補中兼化痰又久嗽汗出諸藥不效用寧肺散粟殼一兩六錢醋炒炙烏梅肉四錢共研末每服三錢下午開水調服朝服金水六君子丸四錢開水送下張十年前三瘧之後盜汗常出陰津大傷去秋咳嗽氣升痰中帶血至今行動氣喘內熱多汗食少無力脈虛細數勞損根深四君子湯加五味子熟地焦六曲粟殼紫石英熟附子黃耆白芍麥冬又肺主出氣腎主納氣腎虛不能納氣氣反上逆而喘痰飲留中加以汗出陽虛咳血陰虛內熱食少肺腎虛勞之候四君子湯加麥冬紫石英熟附子丹皮大熟地半夏白芍沉香五味子粟殼烏梅淵按奪血毋汗奪汗毋血血陰也汗亦陰也何以言陰虛陽虛蓋汗出為陽氣失衛咳血為陰火所迫故有陰陽之分又盜汗氣喘咳嗽脈細精氣兩虛舍補攝肺腎之外更將何法以治景嶽云大虛之症即微補尚難見效而況於不補乎前方加歸身牡蠣龍骨黃耆姚咳嗽將及一年陰陽之氣各造其偏陽虛則外寒陰虛生內熱夏令濕熱用事邇日寒暄不調脾胃傷戕恐致成勞毋忽沙參茯苓五味子麥冬黃耆川貝苡仁沙苑子玉竹枇杷葉又脈數未退陰虛未復咳嗽不止肺氣日虛夏暑將臨病尚未穩仍宜小心安養為要大生地生洋參麥冬川貝玉竹五味子黃耆沙參茯苓枇杷露唐七旬有六之年面色紅潤脈形堅搏外似有餘裡實不足屢患咳嗽嬌臟暗傷本月初旬微感風溫咳嗽又作舌苔薄白底有裂紋飲食略減風溫久戀劫胃津灼肺陰不可再投辛散當以甘潤生津花粉沙參玉竹麥冬苡仁杏仁川貝桑葉李咳嗽喉癢痰或稀或濃濃則腥臭脈象右弦而滑左弦小數肝經有鬱勃之熱肺家有膠黏之痰此痰為火鬱而臭並非肺癰可比當以平肝開鬱參清金化痰沙參橘紅蘇子杏仁石決明川貝茯苓丹皮蛤殼枇杷葉陳海蜇漂淡地栗許咳嗽面白為金傷脈數而洪屬虛火是脈克色而火勝金也夏至一陰生正屬火令為剝極則復之際倘若剝而不復頗有火灼金銷之慮黨參黃耆炙甘草茯苓懷山藥麥冬沙參五味子紫菀陳皮此生脈散合六君子湯加紫菀夫四君去朮加黃耆山藥陳皮亦名六君在醫方集解中王暑風從背俞而內薄於肺濕熱從胃脈而上注於肺外內合邪其氣並於胸中氣不得通因而上逆氣升作咳舌苔薄白口膩不渴治屬飲家半夏陳皮枳殼馬兜鈴杏仁射干通草冬瓜子枇杷葉淵按宜佐開泄暑風之藥一二味如香薷蘇梗之類闕體弱素虧頻年屢患咳嗽今春産後悲傷咳嗽復作背寒內熱氣逆痰多脈虛數大便溏延今百日病成蓐勞按産後血舍空虛八脈之氣先傷於下加以悲哀傷肺咳嗽震動衝脈之氣上逆經云衝脈為病逆氣裡急陽維為病苦寒熱頻進疏風清熱脾胃再傷以致腹痛便溏食減無味斯皆見咳治咳之弊越人謂上損及脾下損過胃俱屬難治姑擬通補奇經鎮攝衝脈復入扶脾理肺未能免俗聊復爾爾大熟地砂仁炒炭當歸小茴三分拌炒紫石英白芍桂枝三分拌炒白茯苓川貝牛膝鹽水炒張稚齡形瘦色黃痰多食少晝日微咳夜寐則喉中嗘吼有聲病已半載性畏服藥此脾虛濕熱蒸痰阻肺也商用藥棗法人參炙甘草冬朮茯苓制川朴蒼朮宋半夏陳皮川貝棐子上藥各研末和一處用好大棗一百枚去核將藥末納入棗中以線扎好每棗一枚大約納藥二分為準再用甜葶藶一兩河水兩大碗用棗煮候棗軟熟不可太爛取出曬乾候飢時將棗細嚼一枚一日可用五六枚余棗湯去葶藶將湯煎濃至一茶杯分三次先溫服此平胃六君子湯加川貝棐子也製法極好治脾虛濕熱蒸痰阻肺喉中痰多者從葛可久白鳳膏化出頗有巧意服之遂愈淵按心思巧妙觸發後學不少畢勞心苦志耗損營陰陰虛生內熱熱勝則風動由是心悸少寐頭眩咳嗽晡熱朝涼種種病情相因而至前議甘涼生津微苦泄熱服後熱減咳稀原得小效而或謂外感改投辛散雜入消導苦寒以致咳頻汗多猶云邪未盡達再欲發汗大言不慚豈非癡人說夢耶余今仍用甘涼竊恐見此方者又訾議於後也呵呵沙參玉竹麥冬地骨皮茯苓川貝穭豆衣茯神鐘乳石雪梨肉紅棗奚風邪襲肺肺氣失宣一月以來咳嗽上引頭痛乃振動肝膽之陽也幸胃旺能食邪未延及於中第久戀於肺者勢必漸化為熱乃咳而喉痛音啞肺陰為熱耗矣宣風散熱潤肺化痰是其治法然非數劑所能治蓋風入肺系祛之亦不易也牛蒡子馬兜鈴川貝桔梗杏仁生甘草海浮石蛤殼阿膠桑葉枇杷葉另蛤粉一兩青黛二錢蟬蛻七分共三味研為細末分七服藥汁調下每日一服肺陰已傷引動肝陽咳作頭痛青蛤散頗合皂莢子不可用恐劫液也戴五臟皆有咳總不離乎肺肺為嬌臟不耐邪侵感寒則咳受熱則咳初起微有寒熱必夾表邪邪戀肺虛脈形空大前方降氣化痰保肺滌飲俱無少效據云得汗則身體輕快想由肺氣雖虛留邪未盡補虛而兼化邪亦一法也用錢氏法牛蒡子元米炒馬兜鈴杏仁阿膠蛤粉炒蘇子桑白皮款冬花炙甘草茯苓桑葉枇杷葉沈脈虛軟而似數內傷虛弱奚疑夫邪之所湊其氣必虛虛處受邪其病則實咳嗽雖由外感而實則因於氣虛以為風寒固不可以為虛損未必可玉竹飲子主之玉竹杏仁蘇子桑白皮款冬花旋覆花沙參元米炒象貝橘紅枇杷葉岑煩勞疲極則傷肝肝傷則氣逆而上迫為脅痛為咳嗽秦氏所謂先脅痛而後咳者肝傷肺也治法不在肺而在於肝夏令將臨恐有失血之虞旋覆花桃仁炭杏仁川貝蘇子冬瓜子黑山梔丹皮鬱金苡仁枇杷露祝咳嗽夜重風寒傷於肺勞碌傷於腎腎氣上逆故重咳於夜也前胡杏仁象貝橘紅半夏旋覆花紫菀茯苓沉香沙苑子淵按治風寒則可矣治腎虛則未也某咳嗽白痰味鹹是腎虛水泛為痰也小便黃陰虛內熱初起雖有風寒日久亦從熱化而元氣漸虛矣今從肺腎圖治沙參玉竹橘紅甜杏仁茯苓川貝紫菀蛤殼金狗脊十大功勞平病起傷風咳嗽邪留肺系久咳傷陰火起於腎上衝於心心中熱癢則咳甚而膚熱逮火降則熱亦退而稍平其所以發熱者由於陰虛也惟胃納甚少滋陰之藥不宜過當以金土水三臟皆調立夏在前冀其熱減為妙大生地蛤粉拌搗阿膠米粉拌炒懷山藥炙甘草川貝五味子茯苓牛蒡子丹皮炒焦橘紅紫菀枇杷葉仁淵曰咳嗽一證最為難治外感固不可擅用清滋即內傷之咳亦未可擅用冬地須察其病因在何臟腑而施治療久咳必先顧其胃氣未有胃不順而咳可愈者經謂十二經皆有咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃則肺寒肺寒則內外合邪因而客之則為肺咳此言外感之咳從感寒飲寒而起邪由皮毛而內合於肺或散或溫或涼從肺主治其飲熱受熱者亦可隅反若內傷之咳則五臟十二經皆有斷不可專治其肺蓋咳在肺所以致咳不在肺五臟六腑苟有一氣之逆觸動肺氣即能作咳醫經旨聚於胃關於肺二語深得咳嗽要言夫胃有五竅如閭里門戶水穀入胃渣滓由下脘傳小腸水液即從旁竅而出傳布三焦由中焦蒸化至上焦為津液滲下焦為便溺今臟腑之氣失順逆擊於肺作咳胃竅之水飲不能盡化津液聚於上脘而為痰涎寒則痰稀熱則痰濃前人論脾乃生痰之源肺為貯痰之器今讀西國醫書謂咳痰不從肺出即從胃脘而來證以經文聚於胃關於肺二語始知前人所論非是按前賢論咳嗽者甚多至聚於胃三字從未論及豈內經此言漫無著落耶今得西醫剖視之書益見內經之精至何臟何腑之逆虛實之辨當詳參脈證經文於此尤為精細不難按證用藥茲集外感內傷為一編讀者宜細繹之勿混治也疝氣門某先天不足腎氣虛寒膀胱失化腎囊脹大疝氣上攻嘔吐不止防其發厥肉桂金鈴子烏藥巴戟肉胡蘆巴半夏吳茱萸澤瀉小茴香荔枝核又末藥方棉子肉四兩炒小茴香二兩鹽水炒糯米半升炒黃共研末砂糖調服淵按水盛凌土之象須崇土御水為主曾嗜酒之人多濕濕注下焦而成㿗疝腫脹久而不已慮其變釀囊癰濕漏等疾是屬淹纏萆薢橘核桃仁茯苓焦白朮海藻洗清昆布洗清澤瀉延胡索川黃柏川楝子炒打通草附丸方金鈴子一兩炒打萆薢一兩炒茯苓一兩烘澤瀉一兩炒防己一兩焦山梔一兩白朮八錢炒黑白醜各二錢炒黃柏五錢炒川連三錢吳萸二錢煎汁炒苡仁一兩炒茅朮八錢米泔水浸昆布一兩洗淡炒橘核一兩炒打海藻五錢洗淡炒上藥共研細末用老絲瓜筋三兩砂仁三錢通草三錢煎湯泛丸每朝三錢開水送下秦濕熱素盛下注小腸厥陰之絡囊腫胯筋脹痛小有寒熱已經匝月擬泄肝絡兼通小腸金鈴子散加柴胡青皮穿山甲全蠍龍膽草枳殼山楂肉黑山梔沉香吳茱萸橘核又疝本屬寒久則化熱其熱為標其寒為本當標本兼治金鈴子散加木香烏藥吳茱萸橘核小茴香車前子川黃柏枸杞子胡蘆巴吳子和論七疝都隸於肝近因遠行勞倦奔走傷筋元氣下陷其疝益大蓋筋者肝之合也睪丸者筋之所聚也大凡治疝不越辛溫苦泄然勞碌氣陷者苦泄則氣益陷今先舉其陷下之氣稍佐辛溫是亦標本兼治之法補中益氣湯加茯苓茴香延胡全蠍木香又丸方黨參白朮茯苓吳茱萸烏藥木香小茴香當歸枸杞子川楝子淡蓯蓉上藥研末用荔枝半斤去殼煮爛取肉搗爛另將核炙脆研末連前藥末共搗成丸朝暮用鹽花湯送下三錢周中氣不足濕熱下注厥陰之絡胯凹腎囊之間每逢勞碌必發疝氣攻痛兼有寒熱前用搜絡方法未獲效驗今用補中益氣湯加搜絡清裡之藥補中益氣湯去黃耆炙草加黃柏茴香全蠍吳茱萸黑山梔川楝子橘核絲瓜絡又藥酒方枸杞子沙苑子茴香仙茅川楝子熟地菟絲子吳茱萸杜仲巴戟肉黨參燒酒十斤浸夏五冬十日飲勿醉王肝經久有濕熱伏於下焦經絡之中疝氣交春而發夏甚秋衰至冬而平發時每有寒熱是屬濕火無疑斷非寒疝可比去冬迄今患瘧兼以咳嗽舌底紅裂而苔黃掯此瘧邪濕熱傷陰之象法以養陰化痰和胃泄肝為治制首烏鱉甲陳皮杏仁桃仁川楝子青皮延胡川貝沙參紅棗生薑仁淵曰古人謂七疝都隸於肝以少腹前陰皆厥陰經脈部位故也濕熱寒邪襲郁厥少而成疝此言誠是然余謂病標在肝病本在脾腎蓋厥陰風木寄體在土滋灌賴水苟日暄雨潤燥濕得宜欣欣向榮何疝之有惟水寒土濕木失其榮藏舍空而經絡虛始寒濕熱濕之邪乘虛襲入邪郁不化木不條達愈郁愈橫於是將軍之性猝發難遏其氣不得升達橫塞本位經脈之間而作疝也所以不涉他部者他臟尚不虛耳衝心則死亦以心陽大虛寒邪得以直犯君主耳氣體實而標邪盛者其治尚易惟積年纍月邪雖不重而臟真大虛一切苦寒辛通之藥未可徑施施亦未必效驗最為難療若治疝都用辛通溫散入方者不獨散其寒亦所以通其氣耳通則不痛痛則不通是之謂乎遺精淋濁門嚴淋濁三年不止腎虛濕熱不化陰頭碎癢筋骨微疼六味補腎能化濕熱耐心久服莫計效遲大生地懷山藥茯苓山萸肉五味子麥冬益智仁丹皮澤瀉湘蓮肉須精濁連年不斷兼有血塊淋漓肝腎大虛八脈無以固攝濕熱混亂不清舌苔白膩法當脾腎雙補固攝下焦懷山藥茯苓菟絲子阿膠赤石脂炒血餘炭五味子杜仲沙苑子金櫻子蓮鬚旱蓮草淵按肝腎八脈之虛由濕濁混淆精血頻下若不先清濕熱以寧相火徒事補腎固精所謂不清其源而欲塞其流能乎否乎顧遺精無夢為腎虛咳嗽寒熱乃風邪腹脹納少兼肝氣此三者當先何治曰咳嗽盜汗出不宜治肺肝氣橫不宜伐肝然則治其腎乎六味丸去澤瀉加陳皮白芍沉香牡蠣芡實湘蓮肉又遺精屬腎不寐屬心心火刑金則咳心陽下陷則遺陰虛則盜汗肝虛則結瘕法當交濟坎離大生地遠志芡實茯苓白芍黨參龍齒棗仁懷山藥龜板六神麯麥冬牡蠣五味子丹皮建蓮肉丁水竅精竅異路同門二竅不並開水竅開則濕熱常泄相火常寧精竅常閉若水竅為敗精瘀濁阻塞不通則濕熱不泄病已二載頗服滋補使濕熱敗濁漫無出路致下焦濁氣上攻及胃時時噯氣腹中不和二便不爽失下行為順之理診脈細肢寒腎陽與胃陽不布法宜通陽滲濕益腎化濁補故紙韭菜子茯苓萆薢小茴香菟絲子又症勢仍然前方加減照前方加桂枝白芍龍齒牡蠣又雜藥亂投諸病不除中氣早戕故腹中不和大便不暢至於本病清濁淆混亦脾虛濕熱所致萆薢益智仁半夏陳皮黨參黃柏石菖蒲烏藥砂仁又九竅不和腸胃病也胃以下行為順腸以傳導為職腸胃失司則噯氣腸鳴頭眩大便難小溲渾濁肛門溺竅皆癢白朮苦參茯苓陳皮香附澤瀉六神麯桃仁火麻仁檳榔青皮茵蔯草又濕熱濁邪混入清氣之中無路可出外則肌膚生瘰如粟且癢上則頭眩下則溺竅後陰俱癢精濁時流大便艱澀三焦俱受其邪虛實混淆之病也疏泄濁邪從下而出復入交濟坎離虛實同治朝服控涎丹十四粒陳皮湯送下暮服磁朱丸三錢沙苑子湯下淵按借控涎丹以瀉中焦濕熱痰濁磁朱丸以交濟坎離可謂善於騰挪王病起膏淋變為石淋今又成血淋矣蓋腎虛精不藏聚濕熱相火蒸灼致精化為濁濁凝成塊陰傷日久血亦下注故見血塊也填補陰髓以化濕熱法當滑澀兼施大熟地阿膠龜板天冬血餘炭芡實秋石沙苑子冬葵子韭菜子炒湘蓮肉李北門之籥得守則陽氣固坤土之陽得運則濕濁化濕濁化則精旺陽氣固則精守所嫌肌肉盡削夫肌肉猶城垣也元氣猶主宰也城垣傾頽主宰困窮然則非大補元氣不可大熟地西黨參冬朮枸杞子厚杜仲麥冬懷山藥淡蓯蓉當歸半夏陳皮茯苓穀芽蕭據述病情多系情懷鬱勃肝腎下虛小溲頻數澄腳遍體機關骨節不利頭面覺麻此由陰液內虧風陽繞絡源泉不足膀胱不化使然養陰液以熄風陽救源泉以通氣化又須怡情安養庶幾可瘳大生地二冬龜板沙苑子五味子川斷茯神沙參覆盆子家韭子淵按既從七情鬱結而來乃心火不能下交於腎水致腎關不固似宜心腎兼治張男子十四發身太早保真不固究竟外豐內虧不時內熱身倦乏力恐其延成勞損培補先天兼理後天尤宜自知愛惜為上黨參大熟地懷山藥丹皮茯苓陳皮沙苑子苡仁杜仲金狗脊薛左尺極細寸關微而似數右三部俱弦滑下有遺精暗疾肛門癢而出水上則頭眩耳鳴舌苔粉白以脈合症腎陰下虧濕熱相火下淫上混清竅為之蒙閉法當補腎之陰而清相火清金和胃分利膀胱以化濕熱萆薢大生地蛤粉炒知母澤瀉龜板麥冬黃柏赤苓半夏丹皮牡蠣懷山藥又丸方大生地砂仁陳酒拌蒸冬朮土炒黃連鹽水炒苦參天麻懷山藥丹皮鹽水炒川芎芡實龜板酥炙牡蠣煅澤瀉鹽水炒黃柏鹽水炒知母鹽水炒半夏萆薢鹽水炒赤苓麥冬元米炒上藥為末用建蓮粉四兩神麯四兩煮糊搗丸淵按此方治腎虛濕熱遺精極妙然須胃納尚旺者若穀食式微連柏等苦寒宜斟酌高淋濁而兼遺滑耳聾目花肝腎大虛不宜滲利法當固攝沙苑子懷山藥補故紙茯神家韭子芡實龍骨牡蠣朝暮服威喜丸三錢淵按純屬虛象宜加熟地山茱萸蔣腎藏精肝藏血膀胱主疏泄故前陰一物也而有二竅二竅不並開水竅開則濕熱常泄相火常寧若房事過度則相火旺而精血不藏混入水竅為血淋竅痛焉大生地元精石丹皮龜板五味子川黃柏血餘炭沙參知母麥冬茯苓阿膠高脈細固屬陰虛若下垂尺澤是相火下淫故精血下流小溲便數溺竅疼痛大便乾結也補養腎陰兼清相火為法大生地龜板黃柏大黃酒炒木通小薊炭阿膠蒲黃炒焦山梔甘草梢知母茯苓元明粉車前子牛膝陳遺精無夢不特陰虛陽亦衰矣乾咳無痰不特肺虛胃亦弱矣補精納氣溫煦真陽治其腎也補土生金清肅高源治其肺也若夫救本之圖在於息心無妄無妄二字所該者廣心君鎮定自無震撼之虞大熟地黨參五味子枸杞子茯神菟絲子龍骨沙苑子懷山藥牡蠣龜板丹皮杜仲芡實華病由喪子憂怒抑鬱肝火亢甚小溲淋濁漸至遺精一載有餘日無虛度今年新正左少腹睪丸氣上攻胸心神狂亂齦血目青皆肝火亢盛莫制也經云腎主閉藏肝司疏泄二臟皆有相火其繫上屬於心心為君火君不制相相火妄動雖不交會亦暗流走泄矣當制肝之亢益腎之虛宗越人東實西虛瀉南補北例川連焦山梔延胡索鮮生地赤苓沙參川楝子知母黃柏龜板芡實另當歸龍薈丸一錢開水送下附丸方川連鹽水炒苦參白朮米泔浸曬牡蠣共研末用雄豬肚一枚將藥末納入肚中以線扎好用水酒各半煎爛將酒藥末共搗如嫌爛加建蓮粉拌干作丸每朝三錢開水送下張操觚蓮幕形逸心勞腎水下虧不能上承於心心陽內亢而反下趨於腎即坎離之不交也不交則諸病生由是而下為淋濁尿血宗筋絆痛上為眩暈咳嗽心中震躍診脈左小右大內傷虛症何疑今遠道初歸跋涉勞頓且擬和平補益庶無畸重畸輕之病馬料豆甘草梢茯神懷山藥麥冬建蓮肉沙參紅棗鮮藕枇杷葉又心陰耗損君不制相相火妄動強陽常舉精濁時流肛門氣墜大便溏薄心中嘈辣干嗽無痰右脈空大兩尺皆虛法宜補心陰以制相火益腎氣以固元精西洋參黃柏五味子知母牡蠣大生地龜板麥冬另補故紙鹽水炒韭菜子鹽水炒研末煉蜜為丸每服三錢淵按相火旺而腎陰虧極矣二味為丸專助腎陽恐與此證不合包勞碌氣虛濕熱隨之下陷淋濁初起覺痛今而不疼但覺氣墜小便頻數色黃而渾濁不清仿東垣補脾胃去濕濁瀉陰火升清陽方法黃耆鹽水炒柴胡升麻沙參茯苓芡實萆薢黃柏知母燈心食鹽沖服一捻仁淵曰遺精淋濁古人每連類稱之其實三者因不同病不同治亦不同未可一概論也夫遺精乃精關之病少年者多起於意淫或色欲過度中年者或由用心太過心火不能下交致腎精下溜不夢而泄甚則不寐亦泄亦有濕熱阻中致肝木升陽之氣不能上達郁陷於至陰之下蒸煽精關而病古人以有夢無夢分虛實未必盡然大抵從濕熱來者多實從意淫多欲用心太過來者多虛惟同一虛也須分陰虛陽虛及陰陽兩虛虛中夾實今世醫治此多不效者由未辨明陰陽虛實一味以補腎固精了事及病者未能養心寡欲耳蓋相火妄動致遺精腎陽不能固攝亦致遺精試觀古方其義自明若淋症全由膀胱溺竅為患雖分五證半由濕熱而來前人辨之甚詳即勞淋虛淋或從色欲起見乃敗精阻於溺管溺管傷損或淋久膀胱氣虛致腎亦虛乃由標及本由腑及臟非病起於腎也至濁證則腎與膀胱臟腑兼病然臟病多而腑病少小便短赤塞而不通者為膀胱濕熱小便清通膿濁時流者為腎虛精不固濁色黃厚為虛熱色白而清為虛寒小便清通但短數時時欲便亦屬腎氣虛寒前人於淋濁二證不甚分別都以為濕熱余少時執其說而治之多不驗今閲歷有年始知淋屬膀胱溺竅濁屬腎臟精竅濁證雖有夾濕熱兼膀胱病者總屬臟多腑少臟主腑賓俟濕熱清而小便暢即專益氣固精若陽氣虛者佐扶陽升陽蓋濁徵大都色欲時忍精不泄精管受傷致精關不固腎液與陰精同下病久則陰傷及陽陽不攝陰耳前案兼病俱多方亦不能一例讀者神而明之痙厥門陳嘔惡數日止而發痙每日必三五次此肝逆犯胃聚液成痰內風陽氣弛張痰亦從之為患擬以和胃熄風羚羊角鉤鉤半夏陳皮黑山梔石決明池菊花元參竹茹又痙厥日數發口噤不能言而心中了了病不在心而在肝夫心為君主肝為將軍當其氣火風相煽之際一如將在外君命有所不受則君主雖明安能遽禁其強暴哉況胃為心子胃家之痰與肝家之風相助為虐舌紅碎痛一派炎炎之勢莫遏欲化胃痰先清肝火羚羊角大生地犀角茯苓生山梔天竺黃石決明元參鉤鉤金箔棗仁川連炒竹油沖服薑汁沖服錢肝苦急急食甘以緩之生甘草一斤研末紅棗一斤煮爛去皮核與甘草打和為丸每服三錢開水送下此人並無表證又不內熱一月數十痙服此二料即愈仁淵曰胃虛生痰肝旺生火火煽其痰胃不能御必至上逆而為嘔吐吐極而胃益虛肝益強不至風動痙厥不已夫所謂胃虛者胃之降氣不順也肝旺者肝之鬱熱上升也氣逆化火呼之為肝風肝火肝氣者以肝屬巽木為生風生火之臟其性急暴為將軍之官凡逆升之氣都主於肝故也治以涼降者以秋金之氣逆折其春木之太過也夫痙厥之證不止嘔吐一端若痙厥為木旺賊土霍亂多有之外如溫邪液涸中風痰阻關竅小兒痰熱矇蔽吳鞠通有痙因質疑論內經諸痙項強皆屬於濕謂濕字乃風字之誤余謂風不得痰尚不至痙內經濕字當作痰字解者甚多然痰不得風亦不為痙大抵風火痰三者相因為患今時痙厥與瘛瘲不分夫痙則角弓反張戛齒吐沫瘛瘲則筋絡抽掣四指搐捻痙乃風火痰交煽閉其機關多實證瘛瘲則液涸血空經絡失養多虛證補瀉不同治法大異不可不詳辨之雜病門某風邪入絡小續命湯此症病後一日數次不能言語只要自己捏肩背即可漸漸而言也某久虛不能統血並不能轉運其氣是以便血時作而又腹微滿也吐出之痰結硬此為老痰乃濕熱所結法當兼理四物湯去川芎加黨參冬朮懷山藥陳皮龜板蛤殼荸薺海蜇淵按不統血不轉運其氣腹微滿皆脾虛也某久病之軀去冬常患火升交春木旺肝膽升陽無制倏忽寒熱頭面紅腫延及四肢焮熱癢痛殆即所謂遊火遊風之類歟匝月以來腫勢大減四五日前偶然裸體傷風遂增咳嗽音啞痰多口乾舌白續發寒熱胃氣從此不醒元氣愈覺難支風火交煽痰濁復甚陰津消涸陽不潛藏清火養陰計非不善抑恐滋則礙脾化痰扶正勢所必需又恐燥則傷液法取輕靈立方但求無過北沙參知母鮮生地蛤殼蟬衣海浮石豆卷青果海蟄地栗百合另珠粉朝晨用燕窩湯下三分上方金匱百合知母地黃湯合本事神效雪羹取其清火化痰不傷脾胃生津養液不礙痰濕酌古參今歸於平正袁瘍膿之後氣血必虛奔走烈日之中汗出招風風與熱毒舍於皮膚脈絡之間至秋涼氣外束熱鬱於皮中遂覺遍體瘙癢幾及兩月近來面色帶黑而浮少腹略滿據云奇癢之時唇舌俱麻是外風引動內風也經云面腫曰風夫風行必燥木勝剋土此症現為風癩久防腹滿理勢所必然也羚羊角秦艽地骨皮陳皮通草北沙參丹皮苡仁黃耆防風又洗方紫背浮萍杜牛膝側柏葉巴豆殼煎湯洗淵按面黑腹滿乃脾腎兩虛見症又古有風癩一症周身瘙癢擬用千金法生石膏防風麻黃茯苓生甘草白朮鮮生地百部沈腎為缺胃虛亦缺缺之一症屬腎胃二經大抵陽氣欲升陰氣欲降腎虛則陽欲升而遲胃虛則陰欲降而緩故內經曰陰陽相引故數缺此兼胸背多汗足跟時脹氣血兩虧法當兼顧西黨參歸身黃耆冬朮茯神大熟地枸杞子麥冬川石斛蛤殼胡脈軟無力屬氣虛便溏食少屬脾虛乾咳無痰屬肺虛時覺口苦屬心熱移脾也宜十補一清四君子湯加川連防風懷山藥陳皮澤瀉六神麯砂仁潘年近六旬天癸久去而反頻來是謂脫營脫營者元氣極虛不能固攝血從外脫也又名下竭故腰痛如折下竭者必上厥故面赤火升發熱也血屬陰陰虛則陽亢故脈弦硬無情其脈愈數其陰愈虛夏令一交陽亢無制恐致水涸龍飛難為力矣阿膠赤石脂拌炒牡蠣海參線魚膠米粉炒元精石沙苑子貢菜洗淡豬腰子酒洗茯神龜板膠餘糧石拌炒生洋參元米炒朝服震靈丹二錢暮服威喜丸二錢淵按吳鞠通法也妙以咸降有情之物補下焦精血舒乳房屬胃乳汁血之所化無孩子而乳房膨脹亦下乳汁非血之有餘乃不循其道為月水反隨肝氣上入乳房變為乳汁非細故矣夫血猶水也氣猶風也血隨氣行如水得風而作波瀾也然則順其氣而使下行如風回波轉不必參堵截之法澀其源而止其流噫可與知者道難為俗人言也元精石赤石脂紫石英牡蠣烏藥寒水石郁李仁大生地白芍茯神歸身焦麥芽某茹素精枯液涸更兼便血傷陰去冬骨骱疼酸今又心懸如墜時或口不能言心中恐怖必大聲驚叫而後醒此風陽內擾震動君主火溢沖激也病出於肝關於心乘於脾故又腹脹也擬養陰柔肝而熄風陽佐安神和中久病宜緩調又宜常服膏滋方大生地八兩茯神三兩陳皮一兩五錢炙甘草一兩歸身二兩炒天冬二兩去心柏子仁三兩炒研沙苑子三兩龍齒三兩煅棗仁三兩炒研洋參三兩枸杞子三兩石決明六兩煅焦六曲三兩紅棗四兩桂圓肉四兩五味子一兩五錢炒研牡蠣三兩煅上藥煎濃汁用川貝末二兩蓮心粉二兩白密四兩收膏朝暮開水沖服一羹杓淵按精血兩枯肝燥火動故見證如是某易曰男女媾精萬物化生內經曰兩精相搏為之神兩神相搏合而成形是為精是知男女媾精必神氣交而後生育也若精神不足之體或臨事而興已闌或對壘而戈忽倒雖有藍田實難種玉滋陰補陽各造其偏揠苗助長日就枯耗然則如何而後可曰天地無心而成化得春氣者多生得冬氣者多寂欲補其精先養其神欲養其神先補其氣而必兼壯其膽膽為甲木春生之氣也神為陽光氣為陽氣陰津者猶甘露也陽和氣至甘露滋之草木欣欣向榮生意源源不息人身一小天地也豈猶子嗣為然哉若徒切切於子嗣百憂感其心萬事勞其形有動乎中必搖其精念誰為之戕賊亦何恨乎藥之不靈西黨參冬朮茯神炙甘草桔梗酸棗仁黃耆遠志苦參牡蠣懷山藥豬膽汁為丸每日開水送下三錢淵按抵得一篇求子論惟膽汁恐苦寒傷胃太甚婦人門王經來半月不止有紫血塊少腹疼痛氣墜陰門診脈沉澀下午惡寒陽陷入陰營虛失守法以升陽收攝其陰黨參熟地黃耆升麻歸身阿膠蒲黃炒冬朮白芍柴胡淡芩血餘炭陸營分有熱則經至而淋漓衛分有寒則脈小而遲緩脾為營之本胃為衛之源經至而舌苔反布胸無痞悶是胃陽虛而無氣以化濁也擬醒胃陽以攝脾陰為法歸芍六君子加神麯又經行過多血氣兩衰肝腎失固麗翁所論包括盡矣然治病之道有相機從事之權夫舌白多痰胃有濁也咽乾色紅陰虛而火浮也脈細遲緩中氣不足也考古人腎虛有痰濁者金水六君煎氣虛而上有浮火者生脈四君子合而參之似覺不可擅易還祈曬政大熟地半夏五味子歸身炭陳皮於朮茯苓麥冬人參穀芽建蓮肉又肝腎與脾胃同治經漏仍然不止左脈稍覺有力原得歸地之功右脈更覺細微脾氣虛衰不振許學士謂補腎不如補脾蓋謂脾胃虛者言之今心跳食少心脾不足可知經血如漏卮不息衝任不得不固腹中微痛氣虛且滯不得不補不得不通仿黑歸脾法熟地炭黃耆炒焦茯神棗仁白芍廣木香歸身炭冬朮人參陳皮炙草淵按既云固衝任而無固衝任之藥仍用歸脾恐漏仍不止古人治崩漏急證自有專方如血餘棕炭百草霜倒掛塵等殊有效驗且脈小遲緩其漏未必屬熱或脾腎陽虛不能固攝其血尤非固而兼溫不效未可見血即以為熱也張營血不足經事愆期肝氣有餘瘀凝停滯心蕩頭眩腹鳴脹滿是其徵也脹滿能食病在肝而不在脾擬舒肝化瘀和營養陰方法金鈴子吳茱萸當歸延胡索陳皮沙苑子茯苓香附大麥芽青皮曹經事來多去少似崩非崩是血虛有熱也所謂天暑地熱則經水沸溢用白薇湯加阿膠主之女貞子白薇阿膠米粉炒淡芩炭醋炒黃柏沙苑子鹽水炒白芍蓮心歸身炭旱蓮草奚肝為藏血之臟脾為生血之源肝氣鬱則營血失藏脾氣弱則生源不足腹中結瘕肝氣所結也經事先期肝血失藏也飲食少納脾氣弱也便後帶血脾失統也氣弱血虛宜乎不孕矣調補肝脾則衝任充足自然有孕西黨參大熟地冬朮人乳拌白芍香附醋炒杜仲鹽水炒茯神辰砂拌菟絲子歸身木香川斷艾葉炭阿膠米粉炒烏賊骨丁經事參前而色淡淡則為虛參前屬熱是血虛而有熱也四物湯加香附阿膠黨參冬朮丹皮炮薑炭玫瑰花淵按佐炮姜以行四物之滯非溫經也可謂得旨朱痛而經來肝氣橫也經事參前血分熱也色黑有瘀和而化之可也金鈴子延胡索香附當歸丹皮山楂肉澤蘭葉白芍木香茯苓砂仁陸營虛發熱瘀阻經停心中若嘈飲食厭納時吐酸水是脾胃不足而夾痰飲者也夫心生血脾統血肝藏血胃為氣血之總司調治之方以和脾胃為第一脾胃健則營血自生停飲自運瘀凝自化半夏陳皮川連吳萸炒茯神辰砂拌桃仁旋覆花新絳丹參野薔薇花白扁豆孫經期一載不來大便時常祕結每月胸中不舒數日此肝血虛而胃氣不和也理氣之方不在平肝而在養血和胃之法不在破氣而在補氣氣血充而肝胃自和矣西黨參熟地砂仁拌棗仁陳皮歸身製半夏丹參於朮人乳拌炒茯苓白芍沙苑子橘餅穀芽又肝腎素虧氣鬱胃氣不舒脾陰不足飲食知味而不能多進經事不來二便時常不利肩膝痠疼舌苔或黃或白此有濕熱夾雜其中補養氣血之方雖穩當然無理氣化濁之品未能奏效今擬一方以觀驗否制首烏懷山藥棗仁牛膝焦山梔柏子仁茅朮炭陳皮半夏建蓮肉常服苡仁紅棗煮食某經停少腹痛小溲淋塞有血縷此肝火與瘀凝交阻當通而導之龍膽草小薊炭車前子丹皮桃仁大黃酒炒冬葵子海金砂延胡焦山梔徐咽乾乾咳全由津液之虧內熱經停已見虛勞之候設欲生津降火以養其陰而飲食減少者適以傷脾計惟調其中氣俾飲食增而津液旺以復其真陰之不足蓋津液生成於水穀水穀轉輸於脾胃舍此別無良法也白扁豆茯苓白芍玉竹炙甘草懷山藥苡仁金石斛玫瑰花枇杷葉陸驚恐飢飽勞碌內傷氣血血凝氣滯經停不來已及八月內熱食少慮成乾血勞損肉桂一錢二分桃仁二錢三分川斷一錢麝香五釐當歸二錢五分大黃醋炒一錢三分砂仁四分牛膝酒炒三錢乳香去油五分沒藥一錢五靈脂醋炒錢半共研細末分五服每日一服陳酒送下淵按此調經散加減法頗得古人遺意元氣可支者用之徐經行後奔走急路冷粥療飢少腹疼痛連腰脅兼及前陰此肝腎受傷又被寒侵而熱鬱也經云遠行則陽氣內伐熱舍於腎冷粥入胃則熱鬱不得伸故痛也遵寒熱錯雜例兼腹痛治法川連酒炒炮薑炭桂枝白芍吳萸三分煎汁炒木通全當歸香附山楂炭焦山梔旋覆花新絳屑王經後少腹痛連腰股肛門氣墜大便不通小便赤澀熱痛擬宣肝經之鬱熱通絡脈之凝澀柴胡川楝子焦山梔郁李仁延胡索新絳旋覆花歸尾龍膽草青蔥管淵按此經未盡而行房過度所致乃經血乘虛入絡衝任入脈受傷也張形壯面色紫黑經事或數月或數十日而後來來亦色淡不多今經行後少腹攻痛痛在左則左股酸而無力痛在右亦如之兼有淋帶如膏此瘀凝化濁衝任失調也通絡泄濁治之五靈脂香附丹參金鈴子延胡當歸尾冬葵子吳茱萸旋覆花新絳青蔥管何漏下淋瀝不斷少腹板痛微寒微熱口渴不欲飲此有瘀血著於臍下擬化瘀生新法小生地當歸丹參桃仁泥澤瀉延胡旋覆花柴胡大黃炭酒炒地鱉蟲酒浸又漏下淋漓少腹板痛化瘀和營未能奏效食少無力微寒微熱治在肝脾緩之調之柴胡當歸丹參茯苓澤瀉赤芍白朮香附地鱉蟲山楂炭某寒熱無序脈促數下有淋帶上則心跳又少腹痛大便堅面色萎黃血瘀之候也慮延勞損大生地桃仁茯苓冬葵子當歸柏子仁丹參白芍穭豆衣玫瑰花王向有淋帶月前血崩崩止淋滯不斷少腹板痛脈象細數身發寒熱脾胃大虛此血瘀未盡復兼肝氣夾寒也法當通補鮮生地渣薑汁炒焦當歸炭荊芥炭杜仲陳皮生薑渣鮮地汁炒焦香附炭醋炒香穀芽淵按鮮地生薑互炒名交加散能通瘀調氣和寒熱而不傷血耗氣女科之妙方也陳經行作嘔血虛肝旺也嘔止而腹中結塊經事四五月不來當臍跳動疑為有孕恐其不然想由瘀凝氣聚與痰涎互結成塊耳內經腸覃石瘕二證狀如懷子病根皆在乎血雖不敢大攻當氣血兼理仿婦科正元散法黨參白朮川芎茯苓陳皮半夏當歸砂仁木香枳殼香附有孕無孕最難辨別此症斷乎非孕服此二十餘帖至八九月而經始行李婦人之病首重調經經事初起不來狀如懷子以後來而略少但腹漸大三載有餘尚疑有孕豈非癡人說夢耶內經謂腸覃石瘕皆腹大如懷子石瘕則月事不來腸覃則月事仍來而提其要曰皆生於女子可導而下夫豈徒有虛文而無斯症哉余曾見過下紅白垢汙如豬油粉皮樣者無數調理得宜亦有愈者藉曰不然則天下盡有高才博學之醫就有道而正焉無煩余之多贅也大黃䗪蟲丸每朝三十粒炒大麥芽泡湯送下蘇石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子此段經文明指石瘕一症由於寒氣瘀凝夾阻而成今腹痛泄瀉食少脾胃虛寒肝木橫逆病延半載元氣已衰理脾胃兼溫中下尚恐莫及備候主裁肉桂冬朮土炒陳皮木香金鈴子訶子茯苓乾薑澤瀉延胡索生熟穀芽吳內經有石瘕石水之證多屬陽氣不布水道阻塞少腹有塊堅硬者為石瘕水氣上攻而腹滿者為石水此症初起小便不利今反小便不禁而腹漸脹滿是石水之象考古石水治法不越通陽利水淺則治膀胱深則治腎久則治脾茲以一方備採四苓散去豬苓加大腹皮陳皮川朴桑白皮烏藥桂枝雞內金朝服腎氣丸三錢仁淵曰婦科首重調經夫經乃心血與腎液相合而成為天一之真水故名天癸按月而下猶月魄之有盈虛故名月信不差時日猶海水之有潮汐故名月潮夫月也潮也癸也皆陰類也然月魄不得日光麗照則不明潮汐不得陽氣鼓蕩則不盛其質雖陰其用則陽婦人經水之盛衰亦猶是耳葉天士云婦女以心脾為立命之本心生血脾統血心氣旺則陰血自足脾氣盛則統馭有權無愆期崩塞之病今世醫調經動曰衝任八脈皆言末而忘其本耳夫沖為血海任主胞胎在女科原不可不講而經水之所以盛衰通塞其根源不在乎是內經言奇經之於十二經猶江河之於溝渠也江河充足溝渠自盈溢可知江河不充足則溝渠涸竭窒塞矣又可知江河充足溝渠偶有不通不足欲通之足之亦甚易矣能知此理斷不以通瘀養血套劑了事即帶下一證雖有陰虛濕熱之辨亦莫非心脾之氣不通不化而來即癥瘕癖疝鬼胎腸覃等疾雖由痰凝血滯風寒閉塞肝膽生陽不能布化其因甚多其根亦莫非心脾鬱結所致蓋男子用陽而體陰女手用陰而體陽男子以腎為先天女子以心為先天心陽足則脾陽亦旺陽生陰長血氣充沛乃宜男之兆若心陽不振則脾陽亦弱肝木生生之氣少布飲食少化聚濕生飲肝氣鬱陷而逆升為氣撐飽脹為脘痛作嘔或錯經妄行而鼻衄或脾氣下陷而崩漏或風寒瘀汙客於子門衝任為鬼胎石瘕種種病情相引而至蓋有形之病皆屬陰邪大抵陽氣不化而生斷非通瘀行血所能了事也産後門丁因瘧小産瘀凝未盡衝任受傷少腹結瘕上攻疼痛大便常溏內熱不已迄今半載不渴不嗽病在下焦通補衝任和營化瘀不越産後治例與陰虧勞損有歧當歸小茴香炒川楝子延胡香附肉桂心研沖白芍吳萸炒紫石英砂仁茺蔚子玫瑰花淵按從瘧而起脾氣先傷大便常溏即其徵據徒治下焦血分無益又産後蓐勞已經八月內熱瘕痛病在衝任當歸酒炒白芍桂枝三分炒桃仁泥丹參黨參炒丹皮穭豆衣廣皮玫瑰花張寒氣客於下焦瘀凝停於小腹中央乃膀胱之部也寒氣瘀凝阻塞胞門膀胱陽氣失化以致癃閉産後八日而小溲不通脈細肢寒腹中覺冷恐其氣逆上攻發厥法以溫通下焦化瘀利水全當歸八錢川芎四錢山楂炭五錢炮姜五分桃仁三錢車前子五錢益母草湯陳酒各一碗煎藥另研桂心五分血珀五分甘遂三分為末藥汁調下淵按從生化湯加通瘀祛寒藥可法又小溲癃閉已通惡露瘀凝未下少腹板痛再以溫通肉桂延胡索紅花桃仁丹參歸尾山楂炭牛膝炮薑炭冬葵子兩頭尖車前子張産後營虛發熱已經數月多汗心跳營陰大虧也大熟地黨參黃耆茯神歸身酸棗仁冬朮陳皮玉竹白芍砂仁某産後營虛內熱日久近感風邪發熱更甚胸悶心跳氣滯血虧顯然可見香豆豉炒黃耆防風全當歸白芍白朮棗仁茯神玉竹桑葉淵按虛多邪少從補營方中加輕散藥一二味即可祛邪重加發散邪轉不服反多變證趙病後小産産後感邪咳嗽寒熱似瘧服解散疏和藥五六劑邪退未盡夜猶微熱然頭暈心跳寐則驚惕虛象見矣擬養營化邪法四物湯合二賢加蘇子蘇梗蘇葉川貝杏仁枳殼茯苓款冬花用三蘇二賢四物意在泄血分之風和血中之氣加化痰止咳藥佐使之耳又補肺阿膠合金水六君去半夏加川貝款冬花某左脈細數營陰虧也右脈細軟脾氣虛也産後不能安息反加勞碌氣血傷而不復致身常內熱心蕩若嘈久延慮成勞損人參養營湯加減黨參大熟地冬朮白朮丹參香附遠志甘草湯制砂仁歸身酒炒陳皮茯神棗仁孫前年小産惡露數日即止因而腹中作痛結塊心神妄亂言語如癲此謂血風病也胞絡下連血海上繫心包血凝動火火熾生風故見諸症診脈弦搏肝陽有上亢之象防加吐血為治之法當以化瘀為先清火化痰為佐川貝赤苓丹參蒲黃炭五靈脂川連香附延胡焦山梔茺蔚子另回生丹一粒開水化服淵按血風病有數種此因産後瘀凝而得病在衝任血海上及心包不脫産後著筆毛産後腹痛一載有餘營虛木鬱脾胃受戕時作惡心時吐酸水用千金當歸建中湯法當歸炮薑炭炙甘草肉桂川椒白芍吳萸炒橘餅南棗又前投建中法腹痛已止復因經行之後勞碌受寒腹中又痛加以晡熱飲食減少舌苔乾白此屬血虛肝鬱脾虛木橫用歸脾法加減黃耆黨參冬朮茯苓砂仁炮姜木香陳皮歸身白芍吳萸炒橘餅胡小産半月感邪發熱又遭驚恐衝任受傷少腹脹痛白帶淋濁眼花口苦腰膝拘攣證逾半月飲食不納慮其昏厥姑仿南陽以濁攻濁法兼達邪化瘀備商淡豆豉白前澤蘭葉延胡索焦山梔當歸丹參焦楂肉竹茹交加散兩頭尖另舊褲襠一方燒灰存性藥汁調下淵按此名燒褲散仲聖治陰陽易病章先痙厥半日而後産産後厥仍不醒痙仍不止惡露稀少湯水不能納納則仍復吐出面赤身溫脈洪而荒肝風熾張營虛氣耗虛陽外越冷汗遂出恐其厥而不返奈何奈何姑擬一方希冀萬一肉桂五分當歸三錢煎湯沖童便一杯化下回生丹一丸淵按脈荒者亂也究屬杜撰虛風挾痰上逆化痰降火衝入童便最妙又前方勉灌三分之一惡露稍多面赤稍退脈大稍軟而厥仍不醒舌色灰黃時沃涎沫兩日飲食不進營虛氣滯胃虛濁泛必得溫通化濁以冀陽回厥醒為妙肉桂炮姜半夏全當歸丹參山楂肉陳皮茯苓紫石英童便衝入又厥醒進粥半盞諸無所苦惟周身疼痛不能轉側舌苔白口不渴擬溫養氣血兼和胃氣肉桂炮姜黃耆半夏當歸丹參茯苓陳皮桑枝丁産後瘀凝未盡新血不生身熱日久少腹疼痛小溲淋濁帶下血筋此肝經鬱熱兼夾瘀凝為患殊非小恙姑擬泄肝化瘀和營為法鮮地渣薑汁拌炒焦金鈴子延胡索丹參焦山梔生薑渣鮮地汁拌炒焦龍膽草當歸赤苓甘草梢青蔥管新絳屑範産未滿月操作猝遇大雨淋身水寒之氣自毛竅而入於骨節內舍於腎外達太陽陽明是以始病腰疼繼而上攻頭痛遍體機關不利也脈沉而寒熱寐少而恐懼納少而噁心邪氣留連於胃腎據云頭痛甚則汗出太陽之表虛矣用許學士法香豆豉牛蒡子豆卷杜仲磁石藁本白芷川芎金狗脊赤苓半夏甘菊花淵按太陽表虛風藥未免太過況得之産後乎又前投益腎通經和胃泄濕頭項腰脊之痛原有松機今産後兩月有餘經水適來而心跳恐懼是營氣虛而不攝也擬和營止痛仍佐理胃泄濕黨參桂枝秦艽棗仁杜仲豆卷半夏赤苓苡仁金狗脊歸身陳皮桑枝酒炒又産後營虛雨濕寒氣襲入經絡機關不利前投宣通養血兩法俱無少效雖頭痛略鬆而右半之腿臂轉增痛熱猶幸脾胃稍旺今惡風發熱口乾是寒濕漸化為熱矣擬疏泄濕熱以通經絡再議羚羊角丹參防風秦艽苡仁陳皮羌活絲瓜絡防己當歸白芷木通桑枝忍冬藤王産未百日骨蒸發熱淹延匝月熱勢漸加迄今五十日矣診左寸關輕取虛小中按之數重按數而且堅知其熱在陰中心肝之火獨亢右寸關虛軟而數則知脾肺氣虛兩尺皆虛腎陰虧也陰虛陽盛熱氣熏於胸中蒸動水穀之濕上泛故舌苔反見濁厚耳耳鳴而聾者腎虛肝陽上逆也據述服參耆則熱勢愈甚投膠地則胃氣益憊節近清明地中陽氣大泄陰虛陽亢莫制恐其交夏加劇刻下用藥以脾胃為要土旺四季各十八日清明節后土氣司權趁此培土冀其脾胃漸醒飲食漸加佐以清金平木必須熱退為妙北沙參地骨皮丹皮歸身懷山藥白扁豆茯苓白芍生熟穀芽白薔薇露仁淵曰産後病最難治最多變證難以殫述朱丹溪云産後以大補為主雖有別證從未治之此言雖是亦未可泥有少壯之婦素體不虛或兼外感六淫內阻瘀滯當見證治證若執産後須補之論不但本病不退勢必轉增他變蓋新産百脈雖虛感邪則實急去其邪即所以養其正也倘遇可攻可下之證即白虎承氣不為過胎前亦然惟下筆切宜仔細未可率意輕忽心中須念此産後虛體若一擊而中便與輕鬆調理果是純虛自當大補補之有方不可集幾味養血套劑便為了事再者胎前溫藥宜慎産後涼藥宜慎諺云胎前一把火産後一塊冰雖未盡然卻也不差蓋胎前多實實者多熱産後多虛虛者多寒理固然也幼科門李胎驚之病得之於母腹胎孕之後其母有所大驚氣應於胎驚氣入肝故數月嬰孩即有胎驚之患往往不能愈姑擬一方備採羚羊角天竺黃陳膽星石菖蒲大黃共研末或竹油或鉤鉤湯調服五分許音啞喘咳痰聲嗘咯風痰襲肺肺脹夾驚險候麻黃杏仁射干桔梗桑白皮菖蒲枳殼前胡白前紫菀白蘿蔔汁沖服朱痧後夾積移熱於大腸腹中熱痛每交寅卯二時則痛甚擬開肺金之郁仿丹溪論參越桃意高良薑桔梗川連通草滑石焦山梔山楂炭焦六曲砂仁又痧後腹痛甚於黎明陽氣為陰寒凝遏欲升而不得升故痛甚於黎明也前用溫寒並進見效今仍前法加減桂枝炮姜吳茱萸木香延胡索香附山楂炭花檳榔赤苓焦山梔白蔻仁方痧後肺火不清移熱於大腸之絡腹痛便溏手腕內外腫痛防發痧毒治以清解升麻葛根赤芍焦山梔甘草高良薑丹皮桔梗忍冬藤淵按此方非夷所思庸者必與清肺健脾化積解毒套劑矣又前方已效輕減其制防風焦楂肉銀花砂仁桔梗甘草陳皮赤芍仁淵曰幼兒不能明告病情脈亦難憑雖以一指按寸口惟得浮沉遲數大略而已故稱啞科四診只得其二惟察聲望色詢之乳母得其梗概最為難看而難中亦有易焉易者何乃三因之中絶少內因大都外感六淫內傷乳食而已即有內傷亦因病致虛非七情六欲因虛致病者可比苟仔細詳審不難得其要領近世風氣之最壞者莫若挑驚不問外感內傷概以驚風呼之非推即挑繼以牛黃腦麝香開之藥明理之家亦蹈此習不知冤殺多少嬰兒矣夫驚病偶亦有之兒體脆弱魂魄未堅猝見異言異服及奇怪之物驚恐惶駭此必有因須將驚風二字拆開驚自驚風自風斷不可混治夫驚乃驚駭受病風為溫熱所化或感觸風邪治判天淵喻氏云幼科與大方一理苟請傷寒名家視之斷無錯誤此乃見道之言夫六淫之邪皆能化火幼兒病熱者多病寒者少由陰氣未充生陽正旺化火尤易耳為父母者每未寒先衣未飢先食食不化即變為痰痰與風熱相併最易痙厥俗醫即呼為驚風病家亦認為驚風非一日矣吾願同志大發慈悲相與挽此頽風功德無量外瘍門吳足大趾屬厥陰肝經太陰脾經由此起今足大趾干爛乃肝經血枯脾經濕熱也延及數月防成脫疽兼上唇麻木亦脾虛風動殊非易治萆薢當歸牛膝枸杞子苡仁丹參川斷茯苓桑枝孫痧回熱減溫邪初退之餘咽喉反腐虛火又從而起良由久患喉痹陰虛火亢熱淫搖動亢焰復張用方最宜加謹過清恐傷脾胃早滋恐戀餘邪姑擬甘涼平調肺胃冀其上焦清肅鮮石斛大貝母元參生甘草丹皮沙參羚羊角扁豆穭豆衣雪梨劉偏腦疽自右延及於左三候有餘偏右穿潰膿少偏左木腫未腐頭頂平塌根腳散蔓此氣虛不能引血化腐成膿托毒外出高年殊慮內陷至舌苔白膩大便閉結在瘍科指為火毒內閉濕熱上蘊而用內疏黃連等法閲倪先生方案謂內夾雜氣邪伏膜原引用達原三消數劑異想超出尋常今大便已通舌苔稍化然右脈軟弱胃氣殘憊瘍不甚腫色不甚紅深恐陽變為陰大凡外瘍起發膿腐須賴元氣承載所謂元氣者衛外捍禦之氣胃中衝和之氣三焦升降之氣也虧則膿腐不克依期從此生變故黃耆為外瘍托毒之聖藥即兼別症再參他方古法有攻補兼施補瀉同用者拙見欲托毒必扶正生黃耆當歸赤苓陳皮藿梗法半夏香附穀芽又腦疽將四候起發膿俱遲欲問真消息陰陽各半推陽多方是吉陰長便生危頂不高兮根不束皮不腐兮膿不足凡此皆因氣血衰順逆安危有結局乃若瘡流鮮血即為變陷之端況夫年逾六旬尤宜加謹為要茲當補托佐以疏通補其正而托其毒疏其氣而通其壅俾脹滿寬而加谷期陽毒化而收功聊以解嘲非敢說夢黃耆當歸制殭蠶皂角刺陳皮川朴赤苓法半夏香附某暑邪熱毒走入營中遍身紫黑爛斑鼻血齦腐此發斑牙疳之險症也倘至壯熱神昏不可挽矣犀角地黃湯加羚羊角連翹鮮石斛黑山梔銀花淡黃芩蘆根某瘧久陰傷項發痰核頭傾不舉腹中有塊年逾二八天癸未通慮延勞損大生地制首烏茯苓丹皮懷山藥軟柴胡白芍當歸陳皮十大功勞某肝經鬱火乘犯陽明牙齦癢痛出血而發牙疳舌紅碎裂頭眩心煩營陰內虧而納穀氣撐又屬脾氣虛也猶喜大便燥結可用清滋先平其炎上之火羚羊角鮮生地鮮石斛元參麥冬茯苓石決明女貞子棗仁某陰虧火亢繞頸生痰寒熱似瘧而實非瘧也少陰水虧不能涵木少陽火亢更來灼金金木交戰乃生寒熱飲食少脾胃弱慮延勞損六味地黃湯加牡蠣黨參麥冬柴胡白芍五味子某結喉癰生於咽喉之上視之不見脹塞不通湯水難進極為險重急以化痰宣竅開通肺氣方法射干牛蒡子殭蠶薄荷荊芥桔梗山豆根貫仲生甘草茅柴根洲按吹喉之藥必不可缺某對口生疽足根發疔此二處皆屬太陽膀胱之絡濕熱內聚風熱外侵勿得輕視羌活防風連翹歸尾萆薢乳香沒藥土貝母銀花甘草梢桑枝某牙齦滲膿二載不愈此屬牙漏腎虛胃有濕熱所致六味丸三錢資生丸二錢相和每朝服四錢淡鹽湯送下某馬脾風極重險症危生倏忽姑與牛黃奪命散大黃生切四錢檳榔一錢五分黑牽牛三錢共研末分二服白蘿蔔汁溫調服某肺癰咳吐膿痰肺葉已傷勢屬重候羚羊角冬瓜子桔梗葶藶子苡仁生甘草桃仁泥野茭根川石斛蘆根又痰臭雖減咳嗽未除羚羊角川貝母杏仁苡仁桃仁桔梗蘇子甘草冬瓜子蘆根野茭根張怒則肝氣逆而血苑於上章門結塊硬痛寒熱脈數小便短少症屬肝癰防其內潰咳吐膿血而劇紫菀鬱金新絳柴胡天花粉桃仁旋覆花當歸穿山甲忍冬藤降香青蔥管繆病起微寒微熱右肋章門穴痠疼兩月後痛處略腫食少便溏面浮足腫腰脊痠痛脈附骨極細而鋭此脾家有濕熱瘀傷症屬脾癰日久正虛胃弱恐其不克支持黨參炙甘草陳皮白朮川朴木香吳茱萸乾薑當歸川芎白芍六神麯茯苓肉果砂仁敷方官桂吳茱萸乾薑川烏生半夏獨活乳香沒藥南星白芥子當歸各一錢研末用陳酒乾麵調和燉溫敷痛處某盤腸癰腹痛已久二三日來驟然脹滿連及腰脅小便莖中亦痛勢已有膿擬用牡丹湯排膿逐毒從大腸導下之所慮飲食極少胃氣不克支持耳丹皮桃仁皂角刺冬瓜子紅花大黃制延胡索廣橘皮山楂肉赤苓歸尾又盤腸癰已成膿不得不從大腸導下之法生黃耆皂角刺歸尾桃仁紅花土貝母金銀花甘草丹皮山甲片冬瓜子廣皮又腸內癰膿將足脈細食少治以托裡冀其外潰為妙黃耆銀花穿山甲肉桂當歸赤苓澤瀉皂角刺苡仁廣皮血珀屑許寒氣入於厥陰濕熱隨經下注睪丸腫脹少腹結硬腫痛防成縮腳小腸癰重症川楝子吳茱萸枳殼歸尾焦楂肉橘核小茴香萆薢焦黑梔蔥白頭某環跳臀股之間從前曾患外瘍今戽水傷筋受水寒之氣襲筋骨之中臀股胯凹腓腨痠痛大便燥結小便不利氣墜尻酸病在太陽少陰二經防發附骨陰疽六味地黃湯去山藥加細辛麻仁獨活川熟附另東垣資腎丸二錢開水送下淵按辛獨二味發少陰之寒從太陽而散佐附子以溫之六味以補之泄之任濕熱伏邪內蘊引動宿毒遍發廣痘亦曰廣風恐其肢節酸強殊難速效防風當歸赤芍皂莢子銀花天花粉連翹甘草陳皮土茯苓許腎岩翻花在法不治怡情安養帶疾延年鮮首烏馬料豆銀花生甘草朝服六味丸三錢淡鹽花湯送劉腎俞漫腫色白脈虛微熱此腎俞發也屬三陰虧損濕熱入絡氣血凝滯而生最為淹纏姑與消散法當歸防風杜仲秦艽金狗脊丹參廣皮萆薢獨活胡桃肉桑枝胡胃脘生癰脈虛形瘦初起寒熱延今四十餘日晨必泄瀉無度是中氣大虛不勝攻消之任也今與內托法倘仍作瀉則難矣黨參木香法半夏茯苓枳殼砂仁當歸冬朮乾薑陳皮某面顴毒乃陽明鬱火所結今已穿潰孔如豆大雖比顴骨疽較輕然收功亦遲須忌一切發風動火之物羚羊角白芷茯苓土貝母廣皮黨參連翹丹皮銀花甘草劉平日豪飲胃濕必甚去冬齦腫咳嗽仍不節飲以致音啞齦腐蔓延及唇此沿牙毒也雖非牙岩之比然亦不易收功甘露飲去甘草天冬加赤苓黃芩雞距子葛根蟬衣茅柴根淵按陽明濕火所致陸本原不足兼挾風溫發熱頸間結核成痰二十餘日不紅不腫不消散亦不作膿屬半虛半實慎柔方有良法用四君子加牛蒡子世所未知余曾驗過四君子加牛蒡子象貝母桑葉淵按四君補虛佐蒡貝以消風痰桑葉清肺通絡從補虛中想出祛邪之法心思靈敏又昨用慎柔方是托散法服下若汗出熱退則數劑可消若汗不出仍發熱則數劑成膿且易潰斂前方加鉤鉤又三歲孩童但哺乳汁不進穀食脾胃虛弱可知頸結痰核而有寒熱必挾風溫屬半虛半實今將一月熱退復熱其塊不消不作膿大便溏脾胃不足氣血兩虛黨參冬朮陳皮荊芥黃耆歸身防風葛根砂仁桑葉周立齊云外瘍經久不消散亦不作膿氣虛也徒用攻消恐無所益黃耆黨參防風歸身澤蘭葉穿山甲殭蠶丹參廣皮桑枝朱結毒穿破不斂在於當額眉稜俱屬陽明部位已及半載當養氣血以化毒大熟地黨參川芎皂莢子茯苓土貝母黃耆當歸生甘草銀花土茯苓陳本體陰虧四月間濕熱成瘍潰膿而愈愈後正虛肝風升動眩暈跌僕以致腿股環跳受傷漫腫色白而生附骨痰疽今二便阻塞少腹脹滿將有腸癰之變忍冬藤丹皮桃仁延胡索鮮首烏車前子歸身牛膝血珀五分研末藥汁調下某濕熱積聚阻於少陽病起發熱便少腹偏右板痛足屈不伸小腸癰也身熱不止防其成膿甘草桔梗枳殼蘇梗赤苓土貝母砂仁延胡索焦楂肉川楝子澤蘭葉許肝膽鬱火凝結成痰腮頰硬腫牙關不開此骨槽痰也脈象郁澀氣失利暢藥力不易見效柴胡黑山梔香附秦艽制殭蠶石決明土貝母丹皮桑葉鬱金骨碎補刺蒺藜鉤鉤某鼓槌多骨流痰膿孔甚多手掌及腕皆腫硬而色紫不痛已出過多骨出骨之處已斂而餘外仍腫此風毒濕熱錮結手經延來五月收功不易當歸防風苡仁丹皮連翹廣皮生甘草紅花桑枝另蜣蜋蟲炙五錢研末摻汪內經云一陰一陽結謂之喉痹指少陰君火合少陽相火上逆而為病也病由內生非關外感風溫故治之不易速效養陰降火化痰每相須為法惟嫌脈息太細系素稟六陰真陽不足然清藥亦宜酌用恐陰未足而陽先傷耳慎之沙參石決明白扁豆元參懷山藥蛤殼川石斛生甘草茯苓川貝桔梗另元明粉一錢硃砂五釐冰片二分研細末吹某腎主骨膝者骨之溪谷也腎虛則骨髓空而寒濕乘之兩足跟痛及於膝久而不已防成鶴膝風痹大熟地萆薢苡仁牛膝桂枝枸杞子川斷防風獨活另虎潛丸每朝三錢某心火與濕熱交結而成痰核上則舌下中則脘間下則陰頭皆結小核如棉子此皆火鬱之所致川連二錢酒炒陳皮一兩鹽水炒甘遂三錢麵包煨去心半夏一兩五錢茯苓二兩澤瀉一兩蛤殼二兩研粉紅芽大戟三錢洗淡炒上藥共研細末水泛為丸每朝一錢開水送下淵按直搗其巢非膽識兼優不能然虛者未可漫試某風毒內攻入腦走入耳竅疼痛出膿膿出不爽盤及耳後頸間硬腫不消此盤耳癰也已延兩月症無頭面牙關不痛恐滋蔓骨槽等變殊非易治羚羊角元參磁石甘菊花細生地牛蒡子制殭蠶菖蒲鉤鉤蔥白頭某舌根邊僵木不痛已經數月防變舌疳此屬心脾鬱火治以清養營陰稍參苦降鮮生地川連元參丹參麥冬生甘草丹皮桔梗又川連三分蒲黃一錢冰片二分五靈脂一錢人中白四分煅上味共研細末吹舌根吳暑熱蒸迫心火暴甚喉舌腫痛及今旬日勢防成膿用涼膈散加犀羚解上焦以泄君火之燔牛蒡子犀角連翹焦山梔生軍水浸大貝母元明粉竹葉蘆根薄荷又消管丸胡黃連一兩刺蝟皮一兩炙象牙屑一兩五倍子一兩炙蟾酥酒化三錢陳硬明角燈二兩炙上藥為末煉蜜丸用上好雄精三錢泛上為衣每朝三錢金銀花湯送下淵按方極佳惟蟾酥大毒走竄之品每日服分余未知可否減半則穩當矣此治外症久而成管者某足丫碎爛南方濕熱之常病也患者甚多今足趾碎爛掌心皮厚而燥非徒濕熱血亦枯矣經云手得血而能握足得血而能步碎爛不愈恐成風濕夫治風先治血血行風自滅祛濕先治脾脾旺濕自絶所謂治病必求其本也制首烏丹參當歸防風苡仁懷山藥茯苓萆薢豨蘞草紅棗三角胡麻周咳吐臭痰已延三月脈數而虛其陰已傷面白無華飲食漸減肺失所恃防成肺痿沙參黃耆麥冬白芨茯苓元參大生地杏仁百合蘆根尖又咳痰腥臭面色青晦脈數而虛納穀大減此木火乘金金傷及土臟氣克賊恐延不治北沙參桑白皮麥冬苡仁茯苓白扁豆野茭根橘紅紫菀元參蘆根尖楊一陰一陽結謂之喉痹一陰者厥陰也一陽者少陽也相火寄於肝膽君火一動相火隨熾上炎灼金痹喉之症作矣鮮生地元參麥冬焦山梔大生地石決明沙參桔梗生甘草穭豆衣梨肉王寒痰凝阻頰車不利高而腫硬色白不紅此屬陰寒骨槽與色紅身熱者不同大熟地麻黃桂枝秦艽防風制殭蠶當歸白芥子趙脾虛濕熱入絡兩手指節手腕皆木腫此乃鼓槌流痰不易速愈黃耆白朮防風秦艽川貝母當歸茯苓馮臍風由乎脾腎濕熱而成今腹痛便泄先運其中白朮赤芍茯苓陳皮木香當歸六神麯龍齒砂仁某營行脈中衛行脈外體肥濕勝之人衛恆虛冷營多盛熱故肥人當暑往往肌膚常冷而易生外瘍也瘍發背脊三候內膿已結外腐未透營中之火極熾衛弱失於敷布不能引血化腐載毒外出漸顯內陷之機頗為可慮非溫不能助衛陽以鼓舞非清不能解營熱以化毒經曰血實宜決之氣虛宜掣引之此法是矣黃耆附子煎汁炒鮮生地穿山甲地丁草連翹皂角刺制殭蠶金銀花另以三角風熏淵按三角風未詳是否三角胡麻趙咽喉腫及上齶的屬喉癰湯水難咽痰多便閉症交四日邪火熾張秀翁主以清化滌痰極是鄙意竟用涼膈散通徹表裡尤為簡淨仍候裁正涼膈散加牛蒡子桔梗蘆根仁淵曰欲為瘍科名家須多讀內科方書蓋外科之難治在內傷陰證然亦不外表里陰陽虛實寒熱八字能明此八字生死難易胸中自然了了夫人身營衛環周不息一有壅逆即腫硬作痛而生外瘍外科書分五善七惡以定吉凶無非在陰陽兩字推求謂五善不宜少四七惡不宜有三陽多即吉陰盛即凶若善惡兼見可死可生是在善治者得治則生失治則死即奇怪之證方書師傳所未及苟學問精深定其六經部位審其陰陽虛實生死吉凶胸中自有把握而膏丹敷摻之藥宜不吝金錢誠心虔制自可應手取效蓋有形跡可求較內科有捉摸耳若手法刀法須有師傳否恐動手便錯及至回頭其人已吃虧不小矣
